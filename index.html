    {q:"Type I error = rejecting H₀ when H₀ is true. Type II error = failing to reject H₀ when H₁ is true. What is power?",a:"Power = P(reject H₀ | H₁ true) = 1 − β",sol:"α = P(Type I error). β = P(Type II error). Power = 1−β = probability of correctly detecting H₁. Increasing α increases power but also increases Type I errors."},
  ],
  t2:[
    {q:"One-sample t-test: H₀:μ=0, data: 2.1, 1.8, 2.4, 2.0, 1.7. Test at α=0.05.",a:"Reject H₀",sol:"X̄=2.0, s=√0.085≈0.291, n=5. T=(2.0−0)/(0.291/√5)=2.0/0.130=15.4. t_{4,0.025}=2.776. |T|=15.4>>2.776. Reject H₀."},
    {q:"What is the connection between a 95% CI and a two-sided hypothesis test at α=0.05?",a:"H₀ is rejected iff μ₀ is outside the 95% CI",sol:"CI: X̄±z·σ/√n. Reject H₀:μ=μ₀ iff |X̄−μ₀|>z·σ/√n iff μ₀ outside CI. They are dual: the CI is the set of all μ₀ values that would NOT be rejected."},
  ],
  t3:[
    {q:"Derive the likelihood ratio test (LRT) for H₀:μ=μ₀ vs H₁:μ≠μ₀ for Normal data with known σ. Show it reduces to the Z-test.",a:"LRT derivation.",sol:"Λ=L(μ₀)/max_μ L(μ). L(μ)∝exp(−Σ(xᵢ−μ)²/(2σ²)). max_μ L(μ) achieved at μ̂=X̄. So Λ=exp(−Σ(xᵢ−μ₀)²/(2σ²)+Σ(xᵢ−X̄)²/(2σ²)). By algebra: Σ(xᵢ−μ₀)²=Σ(xᵢ−X̄)²+n(X̄−μ₀)². So Λ=exp(−n(X̄−μ₀)²/(2σ²)). Reject when Λ<c ⟺ n(X̄−μ₀)²/σ²>k ⟺ |Z|>z_{α/2} where Z=(X̄−μ₀)/(σ/√n). □"},
  ],
  traps:["p-value < α means reject H₀. p-value ≥ α means FAIL TO REJECT (not 'accept H₀').","'Statistically significant' ≠ 'practically significant'. With large n, tiny effects become significant.","The t-test assumes Normal distribution or large n (CLT). For small n with non-Normal data, use non-parametric tests."],
  links:["stat.ci","stat.pval","stat.anova","prob.clt"],
},
"stat.pval":{
  hook:"The p-value is widely misunderstood. It is not the probability that H₀ is true. It is the probability of seeing data this extreme or more, given H₀ is true.",
  def:"p-value = P(T≥t_obs | H₀). Reject H₀ when p<α. Type I error rate α. Type II error rate β. Power=1−β. For a fixed effect size, power increases with n (more data makes it easier to detect real effects).",
  insight:"The Neyman-Pearson framework: choose α before seeing the data; then follow the decision rule mechanically. The p-value approach: report p and let the reader decide. Both are valid but different. People sometimes blur them together — know both. The most common error: interpreting p=0.03 as 'probability H₀ is false = 97%'.",
  t1:[
    {q:"Z=1.8 for a one-sided test (H₁:μ>μ₀). Find the p-value.",a:"p≈0.036",sol:"p=P(Z≥1.8)=1−Φ(1.8)≈1−0.964=0.036."},
    {q:"α=0.05, β=0.20. What is the power? What is the probability of a Type I error?",a:"Power=0.80; Type I error rate=0.05",sol:"Power=1−β=0.80. Type I error rate=α=0.05. These are set by design, not computed from data."},
  ],
  t2:[
    {q:"A test has α=0.01 and power=0.85 for a specific alternative. The null is true. What is P(reject H₀)?",a:"0.01",sol:"H₀ is true ⟹ P(reject H₀)=α=0.01. Power only applies when H₁ is true. Under H₀, the rejection rate is exactly α by definition."},
    {q:"LOOCV (Leave-One-Out Cross-Validation) with n=100 samples. How many models are trained? How many training samples does each use?",a:"100 models, each with 99 training samples",sol:"LOOCV leaves out 1 sample at a time. n_splits=n=100. Each model trains on n−1=99 samples and tests on 1. This is the exact conceptual trap: 'n_splits = training_size' is wrong. n_splits=n (total), training_size=n−1."},
  ],
  t3:[
    {q:"Show that under H₀ with continuous test statistic T, the p-value is Uniform[0,1]. Hence p<α has probability exactly α under H₀.",a:"Proof via probability integral transform.",sol:"p=P(T≥t_obs|H₀)=1−F₀(t_obs) where F₀ is CDF of T under H₀. p=g(t_obs). g is a monotone decreasing function of t_obs. Distribution of p under H₀: P(p≤u)=P(g(T)≤u)=P(T≥g⁻¹(u))=P(T≥F₀⁻¹(1−u))=1−F₀(F₀⁻¹(1−u))=1−(1−u)=u. So P(p≤u)=u, i.e., p~Uniform[0,1] under H₀. Therefore P(p<α)=α. □"},
  ],
  traps:["p<0.05 does NOT mean H₀ is false with 95% probability — this requires Bayesian reasoning with a prior.","Multiple testing: if you run 20 tests at α=0.05, expect ~1 false positive by chance. Use Bonferroni correction.","Effect size and p-value are independent. A tiny effect can be 'significant' with large n; a large effect can be non-significant with small n."],
  links:["stat.ht","stat.ci","stat.anova"],
},
"stat.anova":{
  hook:"ANOVA tests whether multiple group means are equal. It uses the F-statistic: ratio of between-group variance to within-group variance. If groups differ, between-group variance is large relative to within-group noise.",
  def:"One-way ANOVA: H₀:μ₁=...=μₖ. F=MSB/MSW where MSB=SSB/(k−1) (between-group mean square), MSW=SSW/(N−k) (within-group mean square). Under H₀: F~F(k−1,N−k). Reject H₀ if F>F_{critical}.",
  insight:"ANOVA is the law of total variance in disguise: SST=SSB+SSW (total=between+within). R²=SSB/SST = fraction of variance explained by group membership. ANOVA with k=2 groups is equivalent to a two-sample t-test squared: F=t². This connection makes ANOVA and regression deeply unified.",
  t1:[
    {q:"3 groups, n=5 each. SSB=40, SSW=30. Find F and decide at α=0.05 (critical F(2,12)≈3.89).",a:"F=8>3.89, reject H₀",sol:"MSB=SSB/(k−1)=40/2=20. MSW=SSW/(N−k)=30/12=2.5. F=20/2.5=8. Since 8>3.89, reject H₀: group means are not all equal."},
    {q:"What is R² in the ANOVA context? How is it interpreted?",a:"R²=SSB/SST, proportion of variance explained by groups",sol:"SST=SSB+SSW=40+30=70. R²=40/70≈0.57. Group membership explains 57% of the total variance in the response."},
  ],
  t2:[
    {q:"Show that for k=2 groups, one-way ANOVA F-test is equivalent to the two-sample t-test squared.",a:"F=t²",sol:"With k=2: MSB=(n₁n₂/(n₁+n₂))·(X̄₁−X̄₂)². MSW=pooled variance s_p². F=MSB/MSW=[(n₁n₂/(n₁+n₂))(X̄₁−X̄₂)²]/s_p²=[(X̄₁−X̄₂)/s_p√(1/n₁+1/n₂)]²=t². So F_{1,N−2}=t²_{N−2}. ✓"},
    {q:"ANOVA assumptions: what are the three main assumptions that must hold for valid F-test conclusions?",a:"Independence, normality, homoscedasticity",sol:"(1) Independence: observations are independent (within and between groups). (2) Normality: within each group, residuals are Normal. (3) Homoscedasticity: all groups have equal variance σ² (equal variances). Violations: (1) is most critical; (2) robust for large n (CLT); (3) can use Welch's ANOVA."},
  ],
  t3:[
    {q:"Prove the ANOVA decomposition SST=SSB+SSW algebraically.",a:"Proof.",sol:"SST=Σᵢⱼ(yᵢⱼ−ȳ)². Write yᵢⱼ−ȳ=(ȳᵢ−ȳ)+(yᵢⱼ−ȳᵢ). SST=Σᵢⱼ[(ȳᵢ−ȳ)+(yᵢⱼ−ȳᵢ)]²=Σᵢⱼ(ȳᵢ−ȳ)²+2Σᵢⱼ(ȳᵢ−ȳ)(yᵢⱼ−ȳᵢ)+Σᵢⱼ(yᵢⱼ−ȳᵢ)². Cross term: Σᵢ(ȳᵢ−ȳ)·Σⱼ(yᵢⱼ−ȳᵢ)=0 (deviations from group mean sum to 0). First term: nᵢΣᵢ(ȳᵢ−ȳ)²=SSB. Third term: SSW. □"},
  ],
  traps:["ANOVA tells you THAT at least one group differs, but NOT which groups differ. Use post-hoc tests (Tukey's HSD) to identify which pairs differ.","F>1 does NOT automatically mean significance — compare to the F-distribution critical value at your α.","SST=SSB+SSW, so SSW=SST−SSB. Given any two of the three, you can compute the third."],
  links:["stat.ht","stat.ci","cond.tvar","ml.eval"],
},

"lin.spaces":{
  hook:"Vector spaces provide the abstract language for everything in linear algebra. Understanding subspaces, spans, and bases lets you reason about what a matrix 'can reach' — its column space.",
  def:"Vector space V over ℝ: closed under addition and scalar multiplication, has a zero vector. Subspace S⊆V: closed under addition and scalar multiplication, contains 0. Span({v₁,...,vₖ})={Σcᵢvᵢ:cᵢ∈ℝ}. Basis: linearly independent spanning set.",
  insight:"The column space col(A) = span of columns of A = set of all Ax. A system Ax=b has a solution iff b∈col(A). The null space null(A)={x:Ax=0} captures what A collapses to zero. Rank-nullity: dim(col(A))+dim(null(A))=n (number of columns). These two subspaces are orthogonal complements in ℝⁿ.",
  t1:[
    {q:"Is {v₁=[1,0,1], v₂=[0,1,1], v₃=[1,1,2]} a basis for ℝ³?",a:"No — they are linearly dependent",sol:"v₃=v₁+v₂. Linearly dependent ⟹ not a basis. The span is at most 2-dimensional. rank=2."},
    {q:"A = [[1,2],[2,4]]. Find a basis for null(A).",a:"[−2, 1]",sol:"Ax=0: x₁+2x₂=0 (same equation, rank 1). null(A)=span([−2,1]). dim(null(A))=2−rank=2−1=1. ✓"},
  ],
  t2:[
    {q:"Prove: the intersection of two subspaces is a subspace.",a:"Proof.",sol:"Let S₁,S₂ be subspaces of V. Let S=S₁∩S₂. (1) 0∈S₁ and 0∈S₂ ⟹ 0∈S. (2) If u,v∈S, then u,v∈S₁ ⟹ u+v∈S₁; similarly u+v∈S₂ ⟹ u+v∈S. (3) If u∈S, c∈ℝ: cu∈S₁ and cu∈S₂ ⟹ cu∈S. S is a subspace. □"},
    {q:"What is the dimension of the column space of a 4×6 matrix with rank 3?",a:"dim(col)=3, dim(null)=3",sol:"rank(A)=dim(col(A))=3. Rank-nullity: dim(null(A))=6−3=3. Column space is 3-dimensional in ℝ⁴."},
  ],
  t3:[
    {q:"Prove the rank-nullity theorem: rank(A)+nullity(A)=n for A:ℝⁿ→ℝᵐ.",a:"Proof.",sol:"Let {v₁,...,vₖ} be a basis for null(A) (nullity=k). Extend to a basis {v₁,...,vₖ,u₁,...,uᵣ} for ℝⁿ (so n=k+r). Claim: {Au₁,...,Auᵣ} is a basis for col(A). Spanning: any Ax=A(Σcᵢvᵢ+Σdⱼuⱼ)=Σdⱼ(Auⱼ) ✓. Independence: if ΣdⱼAuⱼ=0 then A(Σdⱼuⱼ)=0 ⟹ Σdⱼuⱼ∈null(A) ⟹ Σdⱼuⱼ=Σeᵢvᵢ ⟹ all coefficients=0 (basis independence). So rank(A)=r=n−k=n−nullity. □"},
  ],
  traps:["Column space ≠ row space. col(A)⊆ℝᵐ; row(A)⊆ℝⁿ. They have the same dimension (=rank) but live in different spaces.","Rank of A = rank of Aᵀ = number of linearly independent columns = number of linearly independent rows.","Zero vector is in EVERY subspace. A set not containing 0 cannot be a subspace."],
  links:["eig.linear","lin.rank","lin.det","lin.svd"],
},
"lin.rank":{
  hook:"Rank determines how many dimensions a matrix 'fills'. It controls the existence and uniqueness of solutions to linear systems: full rank means unique solution, rank deficiency means either no solution or infinitely many.",
  def:"rank(A) = dim(col(A)) = dim(row(A)) = number of pivots in row echelon form. System Ax=b: consistent iff rank(A)=rank([A|b]). Unique solution iff rank(A)=n. Infinitely many solutions iff rank(A)<n and consistent.",
  insight:"For square A (n×n): A is invertible iff rank(A)=n iff det(A)≠0 iff 0 is not an eigenvalue iff Ax=b has unique solution for every b. All these conditions are equivalent — knowing any one of them lets you conclude all the others.",
  t1:[
    {q:"A=[[1,2,3],[2,4,6],[0,1,0]]. Find rank(A).",a:"2",sol:"Row 2 = 2·Row 1 ⟹ dependent. After elimination: two pivot rows. rank=2."},
    {q:"Ax=b with A(3×4), rank(A)=3. How many solutions exist?",a:"Infinitely many",sol:"rank(A)=3=number of rows ⟹ system is consistent for any b. nullity=4−3=1 ⟹ 1-dimensional solution set ⟹ infinitely many solutions."},
  ],
  t2:[
    {q:"Prove: rank(AB)≤min(rank(A),rank(B)).",a:"Proof.",sol:"col(AB)⊆col(A): Ax=(AB)y for any y, so col(AB)⊆col(A) ⟹ dim(col(AB))≤dim(col(A)) ⟹ rank(AB)≤rank(A). For rank(AB)≤rank(B): consider rows. row(AB)⊆row(B) ⟹ rank(AB)≤rank(B). Combining: rank(AB)≤min(rank(A),rank(B)). □"},
    {q:"A is m×n, rank r. The least squares solution to Ax=b (possibly inconsistent) is x̂=(AᵀA)⁻¹Aᵀb. When does AᵀA fail to be invertible?",a:"When rank(A)<n",sol:"rank(AᵀA)=rank(A). AᵀA is invertible iff rank(A)=n (full column rank). If rank(A)<n, AᵀA is singular and the least squares solution is not unique — use pseudoinverse Aᵀ instead."},
  ],
  t3:[
    {q:"Prove: for A (m×n) and B (n×k), rank(A)+rank(B)−n ≤ rank(AB) ≤ min(rank(A),rank(B)). (Sylvester's rank inequality.)",a:"Proof.",sol:"Upper bound: shown above. Lower bound: rank(AB)≥rank(A)+rank(B)−n. Proof: null(AB)⊆null(B)⊕{x:Bx∈null(A)}. dim(null(AB))≤dim(null(B))+dim(null(A)) [using rank-nullity for each]. nullity(AB)≤nullity(A)+nullity(B)=(m−rank(A))+(n−rank(B)). Rank-nullity for AB: rank(AB)=k−nullity(AB)≥k−(m−rank(A))−(n−rank(B))=rank(A)+rank(B)−n+(k−m)... [complete carefully]. □"},
  ],
  traps:["rank(A)=rank(Aᵀ): row and column ranks are always equal. This is non-trivial and fundamental.","rank(A+B)≤rank(A)+rank(B) — rank is subadditive but not additive.","A square matrix is invertible iff ALL of: rank=n, det≠0, 0 is not an eigenvalue, columns are LI. These are equivalent."],
  links:["lin.spaces","lin.det","lin.diag","lin.svd"],
},
"lin.det":{
  hook:"The determinant measures the signed volume scaling factor of a linear transformation. It is zero iff the transformation is rank-deficient (collapses space).",
  def:"det(A) for n×n matrix: Laplace expansion along any row/column. Key properties: det(AB)=det(A)det(B), det(Aᵀ)=det(A), det(A⁻¹)=1/det(A). Row operations: scaling row by c → det scales by c; swapping rows → det negates; adding multiple of one row to another → det unchanged.",
  insight:"det(A)=Πᵢλᵢ (product of all eigenvalues). Combined with tr(A)=Σᵢλᵢ, you can find eigenvalues of 2×2 matrices instantly without the characteristic polynomial. For 3×3+, use these properties to simplify before expanding.",
  t1:[
    {q:"A=[[3,1],[2,4]]. Find det(A) and A⁻¹.",a:"det=10; A⁻¹=[[4,−1],[−2,3]]/10",sol:"det=3·4−1·2=10. A⁻¹=(1/det)·[[d,−b],[−c,a]]=(1/10)·[[4,−1],[−2,3]]."},
    {q:"A has eigenvalues 2,3,−1. Find det(A) and tr(A).",a:"det=−6, tr=4",sol:"det=2·3·(−1)=−6. tr=2+3+(−1)=4."},
  ],
  t2:[
    {q:"det([[1,2,3],[0,4,5],[0,0,6]])=?",a:"24",sol:"Upper triangular: det=product of diagonal=1·4·6=24."},
    {q:"A is 5×5 with det(A)=3. Find det(2A).",a:"96",sol:"det(cA)=cⁿ·det(A). det(2A)=2⁵·3=32·3=96."},
  ],
  t3:[
    {q:"Prove det(AB)=det(A)det(B) for square matrices. (Sketch using elementary matrices.)",a:"Proof via elementary matrices.",sol:"Every invertible matrix is a product of elementary matrices E₁...Eₖ (row swap, scaling, row addition). Each elementary operation has a known determinant effect: swap→−1, scale→c, row-add→1. A=E₁...Eₖ (if invertible) ⟹ det(A)=det(E₁)...det(Eₖ). det(AB)=det(E₁...EₖB)=det(E₁)...det(Eₖ)det(B)=det(A)det(B). For singular A: det(A)=0 and det(AB)=0 (col(AB)⊆col(A), rank drops). So det(AB)=0=det(A)det(B). □"},
  ],
  traps:["det(A+B)≠det(A)+det(B). Determinant is NOT linear in the whole matrix (only linear in each row separately).","det(cA)=cⁿ·det(A) for n×n matrix. NOT c·det(A).","A matrix is invertible iff det≠0. det=0 means rank<n means singular means no inverse."],
  links:["lin.rank","lin.diag","eig.eigen","lin.svd"],
},
"lin.diag":{
  hook:"Diagonalization writes A=PDP⁻¹ where D is diagonal. This makes computing powers and functions of A trivial and reveals the geometric action of A through its eigenvectors.",
  def:"A is diagonalizable iff it has n linearly independent eigenvectors. Then A=PDP⁻¹ where P=[v₁|...|vₙ] (eigenvectors as columns), D=diag(λ₁,...,λₙ). A^k=PDᵏP⁻¹. All real symmetric matrices are diagonalizable (with orthogonal P).",
  insight:"Rotation matrix M^2026: if you find M^5=I, then M^2026=M^(5·405+1)=(M^5)^405·M=I·M=M. This is a clean periodicity exercise. The key: reduce the exponent mod the period. The period of M is the smallest k with M^k=I — determined by the eigenvalues.",
  t1:[
    {q:"A=[[4,1],[2,3]]. Find P and D such that A=PDP⁻¹.",a:"λ=5,2; P=[[1,1],[1,−2]]",sol:"Eigenvalues: tr=7, det=10 ⟹ λ=5,2. For λ=5: (A−5I)v=0 ⟹ v=[1,1]. For λ=2: (A−2I)v=0 ⟹ v=[1,−2]. P=[[1,1],[1,−2]], D=diag(5,2)."},
    {q:"M=[[0,−1],[1,0]] (rotation by 90°). Find M^2026.",a:"M^2026=I",sol:"M^4=I (rotation by 360°). 2026=4·506+2. M^2026=M^2=[[−1,0],[0,−1]]=−I."},
  ],
  t2:[
    {q:"A=[[2,1],[0,2]]. Is A diagonalizable?",a:"No — only one LI eigenvector",sol:"λ=2 (repeated). (A−2I)=[[0,1],[0,0]]. null(A−2I)=span([1,0]) — only 1 LI eigenvector, but algebraic multiplicity=2. Geometric multiplicity < algebraic multiplicity ⟹ NOT diagonalizable. This is a defective matrix."},
    {q:"A rotation matrix M has M^5=I. Find M^2026.",a:"M",sol:"M^2026=M^(5·405+1)=(M^5)^405·M^1=I^405·M=M."},
  ],
  t3:[
    {q:"Prove: A is diagonalizable iff the geometric multiplicity equals the algebraic multiplicity for every eigenvalue.",a:"Proof.",sol:"(⟹) If A=PDP⁻¹ with P invertible, then for eigenvalue λᵢ with algebraic multiplicity mᵢ, the columns of P corresponding to λᵢ form mᵢ independent eigenvectors ⟹ geometric multiplicity = mᵢ. (⟸) If geo.mult=alg.mult for all eigenvalues, we can collect n total independent eigenvectors (mᵢ independent ones for each λᵢ). Eigenvectors for distinct eigenvalues are independent (proved in eig.eigen). So all n eigenvectors are LI ⟹ P is invertible ⟹ A is diagonalizable. □"},
  ],
  traps:["Diagonalizable ≠ diagonal. Diagonalizable means SIMILAR to a diagonal matrix (via similarity transform P).","Symmetric ⟹ diagonalizable (spectral theorem). Not symmetric ≠ not diagonalizable — just might not be.","A^k=PDᵏP⁻¹ requires P to be invertible. For symmetric A, use A^k=QΛᵏQᵀ where Qᵀ=Q⁻¹."],
  links:["eig.eigen","eig.symm","lin.det","lin.svd"],
},
"lin.svd":{
  hook:"The Singular Value Decomposition (SVD) is the master factorization of linear algebra. It works for ANY matrix (not just square), reveals the geometry of any linear map, and underlies PCA, pseudoinverse, and low-rank approximation.",
  def:"A=UΣVᵀ where U (m×m orthogonal), Σ (m×n diagonal with σ₁≥...≥σᵣ>0), V (n×n orthogonal). Singular values σᵢ=√λᵢ(AᵀA). rank(A)=number of nonzero singular values. Pseudoinverse: A⁺=VΣ⁺Uᵀ.",
  insight:"Truncated SVD: Aₖ=Σᵢ₌₁ᵏ σᵢuᵢvᵢᵀ is the best rank-k approximation to A (in Frobenius norm). This is the mathematical foundation of data compression, topic modeling (LSA), and dimensionality reduction. PCA is SVD of the centered data matrix.",
  t1:[
    {q:"A=[[3,0],[0,2]]. What is the SVD? What are the singular values?",a:"U=I, Σ=diag(3,2), V=I; σ₁=3, σ₂=2",sol:"A is already diagonal with positive entries. SVD=A itself. Singular values are the diagonal entries."},
    {q:"rank(A)=3 for a 5×7 matrix. How many nonzero singular values does A have?",a:"3",sol:"Number of nonzero singular values = rank(A) = 3."},
  ],
  t2:[
    {q:"A=[[1,1],[0,0]]. Compute the SVD.",a:"σ₁=√2, U=[[1,0],[0,1]], V=[[1/√2,−1/√2],[1/√2,1/√2]]ᵀ",sol:"AᵀA=[[1,1],[1,1]]. Eigenvalues of AᵀA: 2 and 0. σ₁=√2, σ₂=0. v₁=[1,1]/√2, v₂=[−1,1]/√2. u₁=Av₁/σ₁=[1,1]ᵀ·√2/(√2·√2)=[1,0]? No: Av₁=A·[1/√2,1/√2]=[2/√2,0]/... Let me redo: A·[1/√2,1/√2]ᵀ=[2/√2,0]ᵀ. u₁=[2/√2,0]/√2=[1,0]ᵀ. So A=u₁·σ₁·v₁ᵀ=[[1],[0]]·√2·[1/√2,1/√2]=[[1,1],[0,0]]. ✓"},
    {q:"The pseudoinverse A⁺ of a rank-r matrix: when does A⁺b give the minimum-norm least-squares solution?",a:"Always — A⁺b minimizes ‖Ax−b‖ and among those, has minimum ‖x‖",sol:"x̂=A⁺b=VΣ⁺Uᵀb. This minimizes ‖Ax−b‖² (least squares). Among all least-squares solutions, x̂ has minimum ‖x‖. When A has full column rank, A⁺=(AᵀA)⁻¹Aᵀ (normal equations). When A is square invertible, A⁺=A⁻¹."},
  ],
  t3:[
    {q:"Prove the Eckart-Young theorem: the best rank-k approximation to A in Frobenius norm is Aₖ=Σᵢ₌₁ᵏ σᵢuᵢvᵢᵀ.",a:"Proof sketch.",sol:"‖A−B‖_F² where rank(B)≤k. Write B=UΣ_BVᵀ with at most k nonzero singular values. ‖A−B‖_F²=‖UΣVᵀ−B‖_F²=‖ΣVᵀ−UᵀB‖_F² (orthogonal invariance). Let C=UᵀB (rank≤k). ‖ΣVᵀ−C‖_F² is minimized (by Cauchy interlacing / unitary invariance argument) when C picks the top k singular values. Minimum value: σₖ₊₁²+...+σᵣ². Achieved at B=Aₖ. □"},
  ],
  traps:["Singular values σᵢ are always ≥ 0 (square roots of eigenvalues of AᵀA, which is PSD). Eigenvalues can be negative; singular values cannot.","SVD exists for ANY matrix (rectangular or square, any rank). Eigendecomposition requires square and may not exist (defective matrices).","‖A‖_F=√(Σσᵢ²). ‖A‖_2=σ₁ (largest singular value = spectral norm)."],
  links:["eig.symm","eig.proj","lin.diag","lin.rank","ml.unsup"],
},
}); /* end subjects prob/stat/lin */

Object.assign(window.CONTENT, {
"opt.gd":{
  hook:"Momentum and Adam fix the two main failures of vanilla gradient descent: oscillation in ravines (momentum), and ill-scaled gradients across parameters (Adam's per-parameter learning rates).",
  def:"Momentum: vₜ=βvₜ₋₁+(1−β)gₜ; xₜ₊₁=xₜ−αvₜ. Adam: mₜ=β₁mₜ₋₁+(1−β₁)gₜ (first moment), vₜ=β₂vₜ₋₁+(1−β₂)gₜ² (second moment). m̂=mₜ/(1−β₁ᵗ), v̂=vₜ/(1−β₂ᵗ). Update: θ−α·m̂/√(v̂+ε).",
  insight:"Adam adapts the learning rate per parameter: slow-moving dimensions (small gradient) get a larger effective step; fast-moving ones (large gradient) get a smaller step. This is like a diagonal preconditioner. Default hyperparameters (β₁=0.9, β₂=0.999, ε=10⁻⁸) work remarkably well across domains.",
  t1:[
    {q:"Momentum update with β=0.9, α=0.1. v₀=0, g₁=4. Compute v₁ and x₁ starting from x₀=3.",a:"v₁=0.4, x₁=2.96",sol:"v₁=0.9·0+0.1·4=0.4. x₁=3−0.1·0.4=3−0.04=2.96. (With original GD: x₁=3−0.1·4=2.6 — momentum takes smaller step but accumulates.)"},
    {q:"Why does bias correction divide mₜ by (1−β₁ᵗ) in Adam?",a:"To correct for zero initialization",sol:"m₀=0. E[m₁]=(1−β₁)g≠g. E[mₜ]=(1−β₁ᵗ)g. Dividing by (1−β₁ᵗ) gives E[m̂ₜ]=g. Without correction, early steps are too small because the running average hasn't 'warmed up'."},
  ],
  t2:[
    {q:"Compare SGD, Momentum, RMSProp, and Adam. What does each one fix?",a:"Progressive improvements",sol:"SGD: high variance from single-sample gradients. Momentum: reduces variance via exponential smoothing, accelerates in consistent directions. RMSProp: adapts lr per parameter (normalize by √(E[g²])). Adam: combines Momentum (first moment) + RMSProp (second moment) + bias correction. Adam is the most robust general-purpose optimizer."},
    {q:"Nesterov momentum: compute gradient at x+βv (lookahead). How does this improve regular momentum?",a:"Lookahead prevents overshoot",sol:"Regular momentum applies gradient at current x, then moves. Nesterov evaluates gradient AFTER the momentum step: xₜ₊₁=xₜ−α∇f(xₜ+βvₜ)+βvₜ. This sees where you're going before committing. Convergence rate improves from O(1/t) to O(1/t²) for convex problems (Nesterov's accelerated gradient)."},
  ],
  t3:[
    {q:"Show that the optimal momentum coefficient for a quadratic f(x)=½xᵀAx is β*=(√κ−1)/(√κ+1) where κ=L/μ, reducing the convergence rate from ((κ−1)/(κ+1))^t to ((√κ−1)/(√κ+1))^{2t}.",a:"Convergence analysis.",sol:"For quadratic f, the momentum method with optimal β reduces the 'effective condition number' from κ to √κ. The error after t steps scales as ((√κ−1)/(√κ+1))^{2t}. Compare: GD has rate ((κ−1)/(κ+1))^t. Momentum gains because it models second-order information implicitly through the velocity term. For κ=100: GD rate≈0.98, Momentum rate≈(9/11)²≈0.67 — much faster convergence. This is Polyak's heavy ball method analysis."},
  ],
  traps:["Adam doesn't always converge for non-convex objectives — there exist cases where Adam diverges and SGD converges.","Large β₁ (close to 1) means very smooth gradient estimates but slow adaptation to gradient changes.","Learning rate for Adam is typically 10⁻³ (vs 10⁻² or 10⁻¹ for SGD) — they are NOT interchangeable."],
  links:["grad.descent","opt.lag","opt.newton","ml.nn"],
},
"opt.lag":{
  hook:"Lagrange multipliers convert constrained optimization into unconstrained — by adding the constraint to the objective with a 'price' λ. At the optimum, the gradient of the objective is parallel to the gradient of the constraint.",
  def:"min f(x) s.t. g(x)=0. Lagrangian: L(x,λ)=f(x)+λg(x). Necessary conditions: ∇_x L=0, ∂L/∂λ=0 (which gives g(x)=0). For multiple constraints: L=f(x)+Σᵢλᵢgᵢ(x). Geometric meaning: at optimum, ∇f=−λ∇g.",
  insight:"Geometric intuition: the optimal x occurs where a level curve of f is tangent to the constraint surface g=0. Tangency means the gradients are parallel: ∇f=−λ∇g. The Lagrange multiplier λ is the 'shadow price' — the rate of change of the optimum with respect to the constraint level.",
  t1:[
    {q:"Minimize x²+y² subject to x+y=1.",a:"x=y=1/2, min=1/2",sol:"L=x²+y²+λ(x+y−1). ∂L/∂x=2x+λ=0, ∂L/∂y=2y+λ=0 ⟹ x=y=−λ/2. Constraint: x+y=1 ⟹ −λ=1 ⟹ x=y=1/2. Min value=1/4+1/4=1/2."},
    {q:"Maximize xᵀw subject to ‖w‖²=1 (for fixed x). This is the projection problem.",a:"w=x/‖x‖, max=‖x‖",sol:"L=xᵀw+λ(wᵀw−1). ∂L/∂w=x+2λw=0 ⟹ w=−x/(2λ). Constraint: ‖w‖=1 ⟹ 2|λ|=‖x‖ ⟹ w=x/‖x‖. Max value=xᵀ(x/‖x‖)=‖x‖."},
  ],
  t2:[
    {q:"PCA: maximize wᵀΣw subject to ‖w‖=1. Use Lagrange multipliers to show the solution is the top eigenvector of Σ.",a:"w=top eigenvector of Σ",sol:"L=wᵀΣw+λ(1−wᵀw). ∂L/∂w=2Σw−2λw=0 ⟹ Σw=λw. So w must be an eigenvector of Σ! The objective value is wᵀΣw=λ. To maximize: choose eigenvector with largest eigenvalue λ_max. □"},
    {q:"Ridge regression: minimize ‖y−Xβ‖²+λ‖β‖². Show the solution is β̂=(XᵀX+λI)⁻¹Xᵀy.",a:"Closed-form solution",sol:"This is unconstrained — take gradient directly. ∇_β=−2Xᵀ(y−Xβ)+2λβ=0 ⟹ XᵀXβ+λβ=Xᵀy ⟹ β̂=(XᵀX+λI)⁻¹Xᵀy. Equivalently: Lagrange formulation of minimize ‖y−Xβ‖² subject to ‖β‖²≤t (for some t that corresponds to λ)."},
  ],
  t3:[
    {q:"Prove that at the Lagrange optimum of min f(x) s.t. g(x)=0 (with LICQ), ∇f is perpendicular to the constraint surface, and derive the multiplier condition ∇f=−λ∇g.",a:"Proof via tangent space.",sol:"The constraint surface S={x:g(x)=0} has tangent space T_x S=null(∇g(x)ᵀ) at any x∈S. At the constrained minimum, for all directions d in T_x S: ∇f(x)ᵀd=0 (otherwise we could improve f by moving along d on S). So ∇f(x)⊥T_x S = ∇f(x)∈span(∇g(x)) (by orthogonality of null and row space). Therefore ∃λ: ∇f(x)=−λ∇g(x). The Lagrangian condition ∇_x L=∇f+λ∇g=0 captures this. □"},
  ],
  traps:["Lagrange conditions are NECESSARY but not sufficient in general. Check second-order conditions or boundary to confirm minimum.","Multiple constraints: one multiplier per constraint. Equality constraints always have multipliers; inequality requires KKT.","The shadow price λ tells you: if the constraint g=0 is relaxed to g=c, the optimal value changes by approximately −λc."],
  links:["grad.convex","opt.kkt","opt.newton","eig.rayleigh"],
},
"opt.kkt":{
  hook:"KKT conditions extend Lagrange multipliers to inequality constraints. They are the necessary conditions for optimality in constrained nonlinear programming and the theoretical foundation of SVMs.",
  def:"min f(x) s.t. gᵢ(x)≤0 (inequalities), hⱼ(x)=0 (equalities). KKT: ∇f+Σμᵢ∇gᵢ+Σλⱼ∇hⱼ=0 (stationarity), gᵢ(x*)≤0 (primal feasibility), μᵢ≥0 (dual feasibility), μᵢgᵢ(x*)=0 (complementary slackness).",
  insight:"Complementary slackness: μᵢgᵢ(x*)=0 means either (a) the constraint is inactive (gᵢ<0) and μᵢ=0 (constraint doesn't affect the optimum), or (b) the constraint is active (gᵢ=0) and μᵢ≥0 (constraint matters). SVM: support vectors have active constraints μᵢ>0; non-support vectors have μᵢ=0. Removing non-support vectors doesn't change the margin.",
  t1:[
    {q:"min x² s.t. x≥1. Apply KKT.",a:"x*=1",sol:"Rewrite: min x² s.t. −x+1≤0. L=x²+μ(−x+1). KKT: 2x−μ=0 (stat), −x+1≤0 (prim feas), μ≥0 (dual feas), μ(−x+1)=0 (comp slack). If x>1: μ=0 ⟹ 2x=0 ⟹ x=0 contradiction. So x=1, μ=2≥0. ✓ x*=1."},
    {q:"In SVM, why doesn't removing a non-support vector change the margin?",a:"Non-support vectors have μᵢ=0 — they don't appear in the dual",sol:"SVM dual: maximize Σμᵢ−½ΣᵢΣⱼμᵢμⱼyᵢyⱼxᵢᵀxⱼ. Optimal decision boundary: w=Σμᵢyᵢxᵢ. For non-support vectors, complementary slackness gives μᵢ=0, so they don't contribute to w. Removing them leaves the dual solution unchanged."},
  ],
  t2:[
    {q:"min xᵀAx s.t. xᵀx≤1 for PD matrix A. Find the solution using KKT.",a:"x*=eigenvector of A with smallest eigenvalue",sol:"L=xᵀAx+μ(xᵀx−1). KKT: 2Ax+2μx=0 ⟹ Ax=−μx ⟹ x is an eigenvector of A with eigenvalue −μ. Primal feas: ‖x‖≤1. Min of xᵀAx subject to ‖x‖=1 is λ_min (comp slack forces ‖x‖=1 at optimum). So x*=eigenvector for λ_min."},
    {q:"SVM hard-margin primal: min ½‖w‖² s.t. yᵢ(wᵀxᵢ+b)≥1 ∀i. Write the KKT conditions.",a:"Stationarity + complementary slackness",sol:"L=½‖w‖²−Σμᵢ(yᵢ(wᵀxᵢ+b)−1). Stationarity: ∂L/∂w=w−Σμᵢyᵢxᵢ=0 ⟹ w=Σμᵢyᵢxᵢ. ∂L/∂b=−Σμᵢyᵢ=0. Primal feas: yᵢ(wᵀxᵢ+b)≥1. Dual feas: μᵢ≥0. Comp slack: μᵢ(yᵢ(wᵀxᵢ+b)−1)=0 — non-SVs have μᵢ=0."},
  ],
  t3:[
    {q:"Prove: for a convex optimization problem with convex inequality constraints and affine equality constraints, KKT conditions are both necessary AND sufficient for global optimality (strong duality holds — Slater's condition).",a:"Proof via strong duality.",sol:"Slater's condition: ∃ strictly feasible point (gᵢ(x)<0 for all i). Under Slater's condition, strong duality holds: duality gap=0, and dual optimum is attained. At (x*,μ*,λ*) satisfying KKT: f(x*)=L(x*,μ*,λ*)≥min_x L(x,μ*,λ*)=g(μ*,λ*)=f(x*) (last equality by strong duality). So x* minimizes L(x,μ*,λ*) (since stationarity + convexity of L in x). Since L(x,μ*,λ*)≤f(x) for all feasible x (dual feasibility), x* minimizes f over feasible x. □"},
  ],
  traps:["KKT conditions are necessary for ALL smooth constrained problems, but sufficient only for convex problems.","Complementary slackness: μᵢgᵢ=0 means ONE of them is zero, not both.","For minimization with inequality g≤0: dual variables μᵢ≥0 (sign matters!). For maximization, flip the sign."],
  links:["opt.lag","opt.cvx","eig.quad","ml.cls"],
},
"opt.newton":{
  hook:"Newton's method uses curvature information (the Hessian) to adapt step sizes, achieving quadratic convergence near the optimum — far faster than gradient descent's linear convergence.",
  def:"Newton step: Δx=−[∇²f(x)]⁻¹∇f(x). Update: x_{t+1}=xₜ+Δxₜ. Convergence: ‖xₜ−x*‖=O(‖xₜ₋₁−x*‖²) near x* (quadratic). Quasi-Newton methods (BFGS, L-BFGS) approximate H⁻¹ without computing it exactly.",
  insight:"Newton is exact in one step for quadratics (H is constant → perfect correction). For general smooth f, it converges quadratically once in the 'region of attraction'. L-BFGS (limited-memory BFGS) stores only the last m gradient differences to approximate H⁻¹ — standard in practice for large-scale optimization.",
  t1:[
    {q:"f(x)=x²−4x+4=(x−2)². Apply Newton's method from x₀=0.",a:"x₁=2 (one step to exact solution)",sol:"f'(x)=2x−4, f''(x)=2. Δx=−f'(0)/f''(0)=−(−4)/2=2. x₁=0+2=2. ✓ Newton is exact in one step for quadratics."},
    {q:"Why is Newton's method not always used instead of gradient descent in ML?",a:"Hessian is O(n²) to store and O(n³) to invert",sol:"For n parameters: storing H costs O(n²) memory. Inverting H costs O(n³). For neural nets with n=10⁷ parameters, this is completely intractable. L-BFGS reduces to O(mn) where m~20 past gradients, making it practical for smaller models."},
  ],
  t2:[
    {q:"Derive Newton's method for logistic regression: logistic loss L=Σlog(1+e^{−yᵢwᵀxᵢ}). Find the Hessian.",a:"H=XᵀDX where D=diag(σᵢ(1−σᵢ))",sol:"σᵢ=σ(yᵢwᵀxᵢ). Gradient: ∇L=−Σyᵢxᵢ(1−σᵢ). Hessian: H=∂²L/∂w∂wᵀ=Σσᵢ(1−σᵢ)xᵢxᵢᵀ=XᵀDX where D=diag(σᵢ(1−σᵢ))∈[0,1/4]. This is PSD, confirming logistic loss is convex."},
    {q:"BFGS update: H_{t+1}⁻¹=(I−ρsyᵀ)H_t⁻¹(I−ρysᵀ)+ρssᵀ where s=xₜ₊₁−xₜ, y=∇f_{t+1}−∇f_t, ρ=1/(yᵀs). Explain why the secant condition yᵀs>0 is required.",a:"H_{t+1}s=y requires H PD ⟹ sᵀH_{t+1}s>0 ⟹ yᵀs>0",sol:"For H_{t+1} to be PD (ensuring Newton step is a descent direction): sᵀH_{t+1}s=sᵀy=yᵀs>0. For strongly convex f: yᵀs=∇f(xₜ₊₁)−∇f(xₜ))ᵀ(xₜ₊₁−xₜ)>0 always (strong convexity implies monotone gradient). Without this, the inverse Hessian approximation may become indefinite."},
  ],
  t3:[
    {q:"Prove Newton's method has quadratic convergence near a strictly convex minimum x* with Lipschitz Hessian.",a:"Quadratic convergence proof.",sol:"Let eₜ=xₜ−x*. Taylor: ∇f(xₜ)=∇f(x*)+∇²f(x*)eₜ+O(‖eₜ‖²)=∇²f(x*)eₜ+O(‖eₜ‖²). Newton step: eₜ₊₁=eₜ−[∇²f(xₜ)]⁻¹∇f(xₜ). Substituting: eₜ₊₁=[∇²f(xₜ)]⁻¹([∇²f(xₜ)−∇²f(x*)]eₜ+O(‖eₜ‖²)). Since ‖∇²f(xₜ)−∇²f(x*)‖≤L‖eₜ‖ (Lipschitz Hessian): ‖eₜ₊₁‖≤C‖eₜ‖². Quadratic convergence. □"},
  ],
  traps:["Newton's method finds critical points (∇f=0), not necessarily minima. Near a saddle point, it may converge to the saddle.","The Hessian must be positive definite for Newton's step to be a descent direction. Add μI damping if H is indefinite.","Quadratic convergence requires being 'close enough' to x* first. Far away, Newton's method may not converge."],
  links:["grad.descent","opt.lag","opt.kkt","opt.cvx"],
},
"opt.cvx":{
  hook:"Convex optimization is the dividing line between tractable and intractable. Any convex problem can be solved globally and efficiently. Recognizing convex structure is the core skill.",
  def:"Convex program: min f(x) s.t. gᵢ(x)≤0 (convex), hⱼ(x)=0 (affine). Strong duality: dual optimal = primal optimal (under Slater's). LP, QP, SOCP, SDP are all convex. Non-convex: neural net training, combinatorial problems.",
  insight:"Most ML models have convex loss: linear/logistic/ridge/lasso regression, SVMs. Neural networks are NOT convex but are often 'benign' nonconvex (overparameterized nets have no bad local minima in practice). The Lasso (L1 penalty) is convex despite being non-smooth — solved via ADMM or coordinate descent.",
  t1:[
    {q:"Is minimizing ‖Xβ−y‖²+λ‖β‖₁ (Lasso) a convex problem?",a:"Yes",sol:"‖Xβ−y‖² is convex (quadratic, PSD Hessian). ‖β‖₁=Σ|βᵢ| is convex (sum of absolute values, which are convex). Sum of convex functions is convex. Lasso is convex, but non-smooth."},
    {q:"SVM dual: maximize Σμᵢ−½ΣΣμᵢμⱼyᵢyⱼK(xᵢ,xⱼ) s.t. μᵢ≥0, Σμᵢyᵢ=0. Is this convex?",a:"Yes — quadratic concave objective = convex when negated",sol:"The quadratic term −½μᵀQμ where Q_{ij}=yᵢyⱼK(xᵢ,xⱼ). If K is a valid kernel, Q is PSD ⟹ −½μᵀQμ is concave ⟹ maximizing a concave function = convex optimization problem."},
  ],
  t2:[
    {q:"Subgradient method for Lasso: why can't we use standard gradient descent, and what's the fix?",a:"‖β‖₁ is non-differentiable at 0 — use subgradient or proximal gradient",sol:"L1 norm is not differentiable when any βᵢ=0 (the derivative of |βᵢ| at 0 is the interval [−1,1]). Fix: (1) Subgradient: replace ∇ with subgradient ∂. Convergence O(1/√t). (2) Proximal gradient: solve prox_λ‖·‖₁(β−α∇loss) = soft-threshold: sign(β)·max(|β|−αλ, 0) per coordinate. Convergence O(1/t)."},
    {q:"What makes a kernel K(x,x') valid (Mercer's theorem)?",a:"K must be symmetric and PSD (as a matrix for any finite set of points)",sol:"Mercer's theorem: K is valid iff for any finite set {x₁,...,xₙ}, the Gram matrix K_{ij}=K(xᵢ,xⱼ) is PSD. Valid kernels: linear xᵀx', polynomial (xᵀx'+c)^d, RBF exp(−‖x−x'‖²/(2σ²)). Invalid: arbitrary asymmetric functions."},
  ],
  t3:[
    {q:"Prove that the dual of an LP is also an LP, and state weak and strong duality. Derive the dual of min cᵀx s.t. Ax≥b.",a:"LP duality derivation.",sol:"Primal: min cᵀx s.t. Ax≥b, x≥0. Lagrangian: L=cᵀx−λᵀ(Ax−b)−μᵀx=(c−Aᵀλ−μ)ᵀx+λᵀb. Dual: max_λ min_x L. For finite minimum: c−Aᵀλ−μ=0 ⟹ μ=c−Aᵀλ≥0 (dual feas). So dual: max λᵀb s.t. Aᵀλ≤c, λ≥0. This is again an LP. Weak duality: cᵀx≥bᵀλ for primal/dual feasible (x,λ). Strong duality (strong LP duality): cᵀx*=bᵀλ* at optimum. □"},
  ],
  traps:["Convex + unconstrained ⟹ any local min is global. But convex + constrained ⟹ still need to check feasibility.","Quasiconvex ≠ convex. f is quasiconvex if sublevel sets are convex, but f(λx+(1−λ)y) ≤ max(f(x),f(y)).","L1 regularization promotes sparsity; L2 promotes small norms. Elastic net combines both."],
  links:["opt.kkt","opt.lag","grad.convex","ml.cls","ml.reg"],
},

"dsa.arrays":{
  hook:"Arrays and hash tables are the workhorses of algorithm design. Understanding their complexity profiles — especially the amortized O(1) of dynamic arrays and expected O(1) of hash tables — determines algorithm efficiency.",
  def:"Array: O(1) random access, O(n) insert/delete at arbitrary position, O(1) amortized append. Hash table: O(1) average insert/lookup/delete (open addressing or chaining), O(n) worst case. Load factor α = n/m (n=elements, m=buckets).",
  insight:"Hash collision handling: chaining (each bucket is a linked list, O(1+α) average) vs open addressing (linear/quadratic probing, clustering issues). Python dict uses open addressing. For competitive programming: use hash tables for membership testing instead of sorted arrays — O(1) vs O(log n) per query.",
  t1:[
    {q:"An array of n integers. Find the two elements that sum to a target T. Best time complexity?",a:"O(n) using a hash set",sol:"Scan array: for each x, check if T−x is in the hash set. Add x to the set. O(n) time, O(n) space. Naive: O(n²). Sorted + two-pointer: O(n log n) time, O(1) extra space."},
    {q:"Dynamic array doubles when full. Starting with capacity 1, what is the total number of copy operations after n insertions?",a:"< 2n",sol:"Doublings at sizes 1,2,4,...,n/2. Total copies: 1+2+4+...+n/2 < n. So total work < 3n = O(n). Amortized O(1) per insert."},
  ],
  t2:[
    {q:"Implement a hash map using chaining. What is the expected time for lookup when load factor α=0.75?",a:"O(1+α)=O(1.75)=O(1)",sol:"Expected chain length at any bucket = α = n/m. Lookup: hash(key) + traverse chain of expected length α. With α<1, this is O(1). Python dict resizes at α≈0.67 to maintain performance."},
    {q:"Rolling hash for pattern matching (Rabin-Karp): compute hash of a window in O(1) after preprocessing. How?",a:"hash(s[i+1..i+m]) = (hash(s[i..i+m-1]) - s[i]*base^{m-1}) * base + s[i+m]",sol:"Choose base B and modulus M. Hash of window: h=Σs[i+k]·B^{m-1-k} mod M. Sliding: remove leftmost character (subtract s[i]·B^{m-1}), shift (multiply by B), add new character. Each slide is O(1). Total: O(n+m) for searching pattern of length m in text of length n."},
  ],
  t3:[
    {q:"Prove: for a hash table with chaining and n keys, m buckets, and uniform hashing, the expected time for a successful search is Θ(1+α) where α=n/m.",a:"Proof via linearity of expectation.",sol:"For a successful search of key k: k is the i-th key inserted (1≤i≤n). Expected elements in k's chain: 1 (k itself) + expected # of keys inserted AFTER k that hash to same bucket = 1 + (n−i)/m (each of the n−i later keys has 1/m probability of same bucket). Average over all k: (1/n)Σᵢ₌₁ⁿ(1+(n−i)/m)=1+(1/m)·(1/n)Σᵢ₌₁ⁿ(n−i)=1+(n−1)/(2m)=Θ(1+α). □"},
  ],
  traps:["Hash table lookup: O(1) AVERAGE, O(n) WORST CASE (all keys collide). Assume uniform hashing unless told otherwise.","Python dict: insertion order preserved (3.7+). Iteration is O(n). Getting a key is O(1) average.","Array slice a[i:j] creates a NEW array in Python — O(j−i) time and space. Not O(1)."],
  links:["dsa.trees","dsa.graph","pyth.ds","algo.complex"],
},
"dsa.trees":{
  hook:"Trees are the fundamental hierarchical structure. Binary search trees give O(log n) search; heaps give O(log n) priority access; B-trees power databases. Balance is the key property that prevents O(n) worst case.",
  def:"BST: left subtree < node < right subtree. Search/insert/delete: O(h) where h=height. Balanced BST (AVL, Red-Black): h=O(log n), all operations O(log n). Min-heap: parent≤children. Heap operations: insert O(log n), extract-min O(log n), build-heap O(n).",
  insight:"Heap build is O(n) not O(n log n): heapify-down from the last non-leaf node up. At height h, there are ≤n/2^{h+1} nodes and each heapify costs O(h). Total: Σh·n/2^{h+1}=O(n). This is a classic build-heap exercise: 'Build-heap is O(n)' with the proof using the geometric series.",
  t1:[
    {q:"Binary search tree with 5 nodes in worst case (sorted insertion). What is the height?",a:"4 (degenerates to linked list)",sol:"Inserting 1,2,3,4,5 in order: each node goes to the right child of the previous. Height=n−1=4. BST without balancing can degenerate to O(n) for sorted input."},
    {q:"Min-heap: [1,3,5,7,9,11]. Insert 4. Show the final heap.",a:"[1,3,4,7,9,11,5]",sol:"Insert 4 at end: [1,3,5,7,9,11,4]. 4's parent is 5 (index 2). 4<5 ⟹ swap: [1,3,4,7,9,11,5]. 4's parent is 1. 4>1 ⟹ stop. Heap: [1,3,4,7,9,11,5]."},
  ],
  t2:[
    {q:"Prove build-heap is O(n) using the summation analysis.",a:"O(n) proof.",sol:"Build-heap: call heapify-down on nodes from index n/2 down to 1. At depth d from the bottom, each node needs O(d) work. Nodes at height h: ≤⌈n/2^{h+1}⌉. Total work: Σ_{h=0}^{log n} ⌈n/2^{h+1}⌉·O(h) = O(n·Σ_{h=0}^∞ h/2^h) = O(n·2) = O(n). (Σh/2^h = 2, a geometric series identity.) □"},
    {q:"B+ tree with order k (max 2k keys per node). Find max pointers in an internal node with k=194.",a:"195 pointers",sol:"Internal node with k keys has k+1 child pointers. For k=194: 195 pointers. For example: B+ node size 4096 bytes, each key 11 bytes, each pointer 10 bytes. (k+1)·10+k·11≤4096 ⟹ 21k≤4086 ⟹ k≤194.57 ⟹ k=194, pointers=195."},
  ],
  t3:[
    {q:"Prove: the height of a Red-Black tree with n nodes is at most 2log₂(n+1).",a:"Proof via black-height.",sol:"Red-Black properties: (1) every path root-to-leaf has same black height bh. (2) No two consecutive red nodes. A subtree rooted at any node x has ≥2^{bh(x)}−1 internal nodes (prove by induction: if bh=0, tree is empty, 0≥0 ✓; bh(x)>0: each child has bh≥bh(x)−1, so ≥2^{bh(x)−1}−1 nodes each, giving ≥2(2^{bh(x)−1}−1)+1=2^{bh(x)}−1 total). So n≥2^{bh}−1 ⟹ bh≤log₂(n+1). Height ≤ 2·bh ≤ 2log₂(n+1) (since at most half the nodes on any path are red). □"},
  ],
  traps:["BST search is O(h), not O(log n) in general. Only O(log n) for BALANCED BSTs.","Heap is NOT a BST — it only guarantees parent≤child, not left-right ordering. Can't search in O(log n).","Heapify-up (insert): O(log n). Heapify-down (extract-min): O(log n). Build-heap: O(n) — NOT O(n log n)."],
  links:["dsa.arrays","dsa.graph","algo.amort","db.index"],
},
"dsa.graph":{
  hook:"BFS explores layer by layer (optimal for shortest paths in unweighted graphs). DFS explores as deep as possible (backbone of cycle detection, topological sort, strongly connected components).",
  def:"BFS: queue-based, O(V+E). Shortest path in unweighted graph. DFS: stack/recursive, O(V+E). Topological sort (DAG): reverse DFS finish order, or Kahn's algorithm (BFS-based). Cycle detection: DFS with color marking (white/gray/black).",
  insight:"Topological sort exists iff the graph is a DAG (directed acyclic graph). Kahn's algorithm: maintain queue of nodes with in-degree 0; repeatedly remove a node and decrement neighbors' in-degrees; if queue becomes empty before all nodes are processed, a cycle exists. This is the clean way to check for cycles.",
  t1:[
    {q:"BFS on an unweighted graph finds the shortest path. Why doesn't DFS guarantee shortest path?",a:"DFS may explore long paths before short ones",sol:"BFS explores nodes in order of distance from source — level 1, then level 2, etc. First time DFS visits a node, it may have gone through a long path (DFS doesn't track distances). BFS is guaranteed to find shortest path; DFS gives A path, not necessarily shortest."},
    {q:"Topological sort of: A→C, B→C, C→D, B→D. What are valid orderings?",a:"[A,B,C,D] or [B,A,C,D]",sol:"In-degrees: A=0, B=0, C=2, D=2. Start with {A,B} (both in-degree 0). Process A: C's in-degree→1. Process B: C's→0, D's→1. Process C: D's→0. Process D. Both [A,B,C,D] and [B,A,C,D] valid."},
  ],
  t2:[
    {q:"Detect a cycle in a directed graph using DFS. Describe the algorithm.",a:"Gray/white/black coloring in DFS",sol:"Color nodes: white (unvisited), gray (in current path), black (done). DFS: when visiting node u, mark gray. For each neighbor v: if v is gray → cycle detected. If v is white → recurse. Mark u black when done. Cycle exists iff DFS ever finds a gray neighbor (a back edge). Time: O(V+E)."},
    {q:"BFS tree on graph: A-B, A-C, B-D, C-D, D-E. Starting from A. Find BFS layers.",a:"Layer 0:{A}, Layer 1:{B,C}, Layer 2:{D}, Layer 3:{E}",sol:"Queue: A. Process A → add B,C. Process B → add D (C already queued). Process C → D already queued. Process D → add E. Process E. BFS tree layers: {A},{B,C},{D},{E}."},
  ],
  t3:[
    {q:"Prove: BFS from source s correctly computes shortest-path distances d[v]=δ(s,v) for all v in an unweighted graph.",a:"Proof by induction on distance.",sol:"Claim: when v is dequeued, d[v]=δ(s,v). Base: s is enqueued with d[s]=0=δ(s,s). Inductive step: v dequeued, d[v]=k. For any neighbor w not yet visited: d[w]=k+1. Claim d[w]=k+1=δ(s,w). Lower bound: δ(s,w)≥k+1 (any path to w must go through some node at distance k first... formal argument uses the BFS layering). Upper bound: δ(s,w)≤k+1 (the path s→...→v→w has length k+1). Once w is enqueued with d[w]=k+1, future encounters find it already visited. □"},
  ],
  traps:["BFS shortest path: unweighted graphs only. For weighted graphs, use Dijkstra (non-negative weights) or Bellman-Ford (negative weights).","Topological sort requires a DAG. If the graph has a cycle, no topological order exists.","DFS time stamps: discovery time d[v] and finish time f[v]. An edge (u,v) is a back edge iff d[v]<d[u] and f[v]>f[u] (v is an ancestor of u in the DFS tree)."],
  links:["dsa.arrays","dsa.trees","dsa.short","algo.complex"],
},
"dsa.short":{
  hook:"Shortest path algorithms are classified by whether edge weights can be negative. Dijkstra requires non-negative. Bellman-Ford handles negatives. Floyd-Warshall handles all-pairs. Choose based on the problem constraints.",
  def:"Dijkstra: greedy, O((V+E)log V) with binary heap. Requires non-negative weights. Bellman-Ford: DP, O(VE), detects negative cycles. Floyd-Warshall: O(V³), all-pairs shortest paths. MST: Prim's O((V+E)log V), Kruskal's O(E log E).",
  insight:"Dijkstra's correctness relies on the greedy choice property: once a node is extracted from the priority queue, its distance is finalized (because all future relaxations increase distance). This fails with negative edges — a later path could be shorter. Bellman-Ford relaxes all edges V−1 times, guaranteed to converge for graphs without negative cycles.",
  t1:[
    {q:"Dijkstra from S: S-A(4), S-B(1), B-A(2), A-T(3), B-T(6). Find shortest path S→T.",a:"S→B→A→T with distance 6",sol:"Start: d[S]=0. Extract S: d[A]=4, d[B]=1. Extract B(1): d[A]=min(4,1+2)=3, d[T]=min(∞,1+6)=7. Extract A(3): d[T]=min(7,3+3)=6. Extract T(6). Done. Shortest: S→B→A→T, distance=6."},
    {q:"Kruskal's MST: sort edges by weight; add edge if it doesn't create a cycle. Use Union-Find to check cycles. Time complexity?",a:"O(E log E)",sol:"Sort: O(E log E). Each Union-Find operation: O(α(V))≈O(1). E operations: O(E). Total: O(E log E). MST has V−1 edges."},
  ],
  t2:[
    {q:"Bellman-Ford: why do V−1 iterations suffice to find shortest paths (in graphs without negative cycles)?",a:"Longest shortest path has at most V−1 edges",sol:"A shortest path (without negative cycles) visits each vertex at most once, so has at most V−1 edges. After k iterations of Bellman-Ford, we've found optimal paths using at most k edges. After V−1 iterations, all shortest paths are found. If V-th iteration still improves a distance: negative cycle exists."},
    {q:"All-pairs shortest paths with Floyd-Warshall: dp[i][j][k]=shortest path from i to j using only vertices {1,...,k} as intermediates. Write the recurrence.",a:"dp[i][j][k]=min(dp[i][j][k-1], dp[i][k][k-1]+dp[k][j][k-1])",sol:"Either the path i→j doesn't use vertex k (dp[i][j][k-1]) or it does (i→k→j via dp[i][k][k-1]+dp[k][j][k-1]). Base: dp[i][j][0]=weight(i,j) if edge exists, ∞ otherwise, 0 if i=j. After k=V: dp[i][j][V]=δ(i,j)."},
  ],
  t3:[
    {q:"Prove: Prim's algorithm produces a minimum spanning tree. (Sketch using the cut property.)",a:"Proof via cut property.",sol:"Cut property: for any cut (S, V\\S), the minimum-weight edge crossing the cut is in some MST. Prim's: at each step, the set S of visited nodes grows by adding the cheapest edge from S to V\\S. Claim: the edges chosen form an MST. By the cut property, each chosen edge (minimum crossing the cut at that step) is in some MST. Since MSTs have V−1 edges and Prim's chooses V−1 edges forming a connected spanning tree, it must be an MST. (Full proof requires showing the algorithm doesn't create cycles and that the greedy choice doesn't conflict with the cut property.) □"},
  ],
  traps:["Dijkstra with negative edges: may give wrong answers (greedy finalization fails). Use Bellman-Ford.","MST ≠ shortest path tree. Shortest path from s minimizes distance; MST minimizes total edge weight.","Floyd-Warshall: dp[i][i][k] should be 0 always (or 0 initially, then negative cycles are detected when it becomes negative)."],
  links:["dsa.graph","algo.dp","dsa.dp2","ai.search"],
},
"dsa.dp2":{
  hook:"DP applications are where the theory meets reality. The key problems — LIS, coin change, knapsack variants, string DP — appear with slight variations. Recognizing the underlying structure instantly is the distinguishing skill.",
  def:"LIS: dp[i]=length of LIS ending at i. O(n²) or O(n log n) with patience sorting. Coin change: dp[i]=min coins for amount i. Partition DP: dp[i][j] for intervals. Bitmask DP: dp[mask]=state for small sets.",
  insight:"The LIS length in O(n log n): maintain a 'tails' array where tails[i] = smallest tail element of LIS of length i+1 seen so far. For each new element, binary search in tails to find where it fits. Replacing an element in tails doesn't change the LIS length — it improves future extensibility.",
  t1:[
    {q:"Coin change: denominations [1,3,4], target=6. Find minimum coins.",a:"2 coins: [3,3]",sol:"dp[0]=0. dp[1]=1 (1). dp[2]=2 (1+1). dp[3]=1 (3). dp[4]=1 (4). dp[5]=2 (4+1 or 3+1+1? min is 4+1=2). dp[6]=2 (3+3). Answer: 2."},
    {q:"LIS of [3,1,4,1,5,9,2,6]: compute the length.",a:"4 (e.g., 1,4,5,9 or 1,2,6 extended)",sol:"dp: [1,1,2,1,3,4,2,4]. Wait: 3→1, 1→1, 4→2(after 1 or 3), 1→1, 5→3(after 1,4), 9→4, 2→2(after 1), 6→3(after 1,4,5 or 1,2). LIS length=4 (1,4,5,9)."},
  ],
  t2:[
    {q:"Longest Palindromic Subsequence of 'AGBDBA'. Find its length.",a:"5 (ABDBA)",sol:"LPS(s)=LCS(s, reverse(s)). reverse='ABDBGA'. LCS of 'AGBDBA' and 'ABDBGA': use DP table. LCS='ABDB' or 'ADBA'? Actually ABDBA — length 5. DP: LCS[i][j] where i indexes s, j indexes rev(s)."},
    {q:"Count the number of ways to tile a 2×n board with 1×2 dominoes.",a:"f(n)=Fibonacci: f(n)=f(n-1)+f(n-2), f(1)=1, f(2)=2",sol:"Either the last column has a vertical domino (reducing to 2×(n−1)) or the last two columns have two horizontal dominoes (reducing to 2×(n−2)). Recurrence: f(n)=f(n−1)+f(n−2). f(1)=1, f(2)=2. This is the Fibonacci sequence offset by 1."},
  ],
  t3:[
    {q:"Optimal BST problem: given keys k₁<...<kₙ with access probabilities p₁,...,pₙ, find the BST minimizing expected search cost. Give the DP recurrence and time complexity.",a:"O(n³) DP.",sol:"Let e[i,j]=expected search cost for optimal BST containing keys kᵢ,...,kⱼ. w(i,j)=Σₖ₌ᵢʲ pₖ. If kᵣ is the root: e[i,j]=e[i,r-1]+e[r+1,j]+w(i,j). Minimum over all r: e[i,j]=min_{r=i}^{j}(e[i,r-1]+e[r+1,j])+w(i,j). Base: e[i,i]=pᵢ. Fill by increasing interval length j-i. O(n²) states, O(n) per state → O(n³). (Knuth's optimization reduces to O(n²) using monotone root property.)"},
  ],
  traps:["Coin change: greedy is NOT always optimal. [1,3,4] target=6: greedy gives 4+1+1=3 coins; DP gives 3+3=2.","LIS in O(n²) vs O(n log n): for large n, the log factor matters. O(n log n) uses binary search on the 'tails' array.","Bitmask DP: feasible only for n≤20-25 since 2^n states. For n>25, exponential."],
  links:["algo.dp","dsa.graph","dsa.short","ai.mdp"],
},

"db.schema":{
  hook:"Schema design is about eliminating redundancy while preserving information. Normalization formalizes this using functional dependencies — the mathematical theory of what determines what.",
  def:"Functional dependency (FD): X→Y means knowing X uniquely determines Y. Trivial FD: Y⊆X. Armstrong's axioms: Reflexivity (Y⊆X ⟹ X→Y), Augmentation (X→Y ⟹ XZ→YZ), Transitivity (X→Y∧Y→Z ⟹ X→Z). Closure X⁺ = all attributes determined by X.",
  insight:"Normal forms prevent anomalies. 1NF: atomic attributes. 2NF: no partial dependency (non-prime depends on full key). 3NF: no transitive dependency. BCNF: for every non-trivial FD X→Y, X must be a superkey. BCNF is stricter than 3NF; BCNF may not always preserve all dependencies.",
  t1:[
    {q:"Given FDs: A→B, B→C. Find A⁺ (closure of A).",a:"{A,B,C}",sol:"Start: {A}. A→B ⟹ add B: {A,B}. B→C ⟹ add C: {A,B,C}. No more FDs apply. A⁺={A,B,C}."},
    {q:"Relation R(A,B,C,D) with FDs: AB→C, C→D. Is AB a superkey?",a:"Yes, AB is a superkey",sol:"(AB)⁺: start {A,B}. AB→C: add C → {A,B,C}. C→D: add D → {A,B,C,D}. (AB)⁺=all attributes ⟹ AB is a superkey (actually the key)."},
  ],
  t2:[
    {q:"R(A,B,C,D) with FDs: A→B, B→C, C→D. Identify all candidate keys and determine normal form.",a:"Key=A; 1NF (has transitive deps A→B→C→D, not in 2NF if composite key, but A is simple; not in BCNF if B,C are not superkeys)",sol:"A⁺={A,B,C,D}=all ⟹ A is a candidate key. 3NF check: for each FD X→Y where Y not in X, X must be a superkey or Y must be prime (in a key). A→B: A is superkey ✓. B→C: B is not superkey, C not prime → violates 3NF. Not in 3NF. Not in BCNF (B→C: B not superkey)."},
    {q:"Decompose R(A,B,C,D) with A→B, B→C, C→D into BCNF. Is the decomposition lossless?",a:"R1(A,B), R2(B,C), R3(C,D) — lossless",sol:"Find BCNF violation: B→C (B not superkey). Decompose: R1(B,C), R2(A,B,D). Check R2: FDs on A,B,D: A→B, and C→D but C not in R2. R2 in BCNF? A is key of R2: A→BD ✓. Then R3(A,B,D) is in BCNF. Alternatively: R1(A,B), R2(B,C), R3(C,D). Join via B and C."},
  ],
  t3:[
    {q:"Prove: BCNF decomposition is always lossless-join but may NOT preserve all functional dependencies. Give an example.",a:"Proof and counterexample.",sol:"Lossless: if R is decomposed using a BCNF violation X→Y by splitting into R1=XY and R2=R−Y+X, then R1∩R2=X and X→R1 (since X→XY), satisfying the lossless-join condition. Dependency preservation failure: R(A,B,C) with FDs AB→C, C→B. Keys: {A,C} and {AB}. BCNF decomposition on C→B: R1(B,C), R2(A,C). Now AB→C is not preserved (A and B are in different relations). 3NF preserves all dependencies; BCNF may sacrifice dependency preservation for stricter redundancy elimination. □"},
  ],
  traps:["3NF allows some redundancy that BCNF eliminates. BCNF is stricter but may lose FD preservation.","A→A is trivial (always holds). A→B where B⊆A is trivial. Non-trivial FDs drive normalization.","Lossless join ≠ dependency preserving. A BCNF decomposition can be lossless but lose FDs."],
  links:["db.index","db.sql","db.rel","db.tx"],
},
"db.index":{
  hook:"Indexes speed up queries by orders of magnitude — from O(n) table scan to O(log n) or O(1) lookup. B+ trees are the universal index structure: balanced, sorted, efficient for range queries.",
  def:"B+ tree of order k: each internal node has 2k to k children, k−1 to 2k−1 keys. Leaves contain all data records and are linked. Height: O(log_k n). All data in leaves; internal nodes only guide search. Cluster index: data sorted by key. Non-cluster: separate index pointing to data.",
  insight:"Worked example: B+ tree with 4096-byte nodes, 11-byte keys, 10-byte pointers. Compute max order: (k+1)·10+k·11=10k+10+11k=21k+10≤4096 ⟹ k≤(4086)/21=194.57 ⟹ k=194, max pointers=195. This arithmetic-in-context question tests whether you know the formula (k+1 pointers, k keys) and can set up the inequality.",
  t1:[
    {q:"B+ tree of order 3 (min 3, max 6 children per internal node). With 1000 data records, what is the maximum height?",a:"≈4",sol:"Each node has at least ⌈k/2⌉ children for internal nodes. Min children per internal node = 3 (order 3). Height h: at least 3^{h-1} leaves ≥ 1000/node_capacity. Log base 3 of ~200 ≈ 5. More precisely: with max keys per node = 2k−1=5 and max order 6 children: height ≈ ⌈log₃(1000)⌉≈7? Need exact formula. Asymptotically: h = O(log_k n)."},
    {q:"What is the difference between a clustered and non-clustered index?",a:"Clustered: data physically sorted. Non-clustered: separate structure pointing to data.",sol:"Clustered: at most 1 per table, data rows in same order as index. Efficient for range queries. Non-clustered: additional structure (can have many), points to data pages. Range queries slower (random I/O). Primary key usually clustered."},
  ],
  t2:[
    {q:"B+ tree node size=4096 bytes, key=11 bytes, pointer=10 bytes. Find max keys per internal node.",a:"k=194, pointers=195",sol:"Internal node: k keys, k+1 pointers. k·11+(k+1)·10≤4096. 21k+10≤4096. 21k≤4086. k≤194.57. k=194 (integer). Pointers=195."},
    {q:"When should you NOT create an index on a column?",a:"High write load, low selectivity, or small table",sol:"(1) Low selectivity: column with few distinct values (e.g., gender) — index gives no benefit over scan. (2) High write frequency: each INSERT/UPDATE/DELETE must also update the index — overhead. (3) Small tables: sequential scan is faster than index+random read. (4) Queries rarely filter on this column."},
  ],
  t3:[
    {q:"Prove the height of a B+ tree with n leaves and minimum degree t (each node except root has ≥t−1 keys) is at most log_t(n).",a:"Height bound proof.",sol:"Minimum number of leaves at height h: root has at least 2 children, each internal node has at least t children. At height h (counting root=0): at least 2·t^{h−1} leaves. So n≥2·t^{h−1} ⟹ t^{h−1}≤n/2 ⟹ h−1≤log_t(n/2) ⟹ h≤log_t(n/2)+1=log_t(n)−log_t(2)+1≤log_t(n)+1=O(log_t n). □"},
  ],
  traps:["B tree vs B+ tree: B tree stores data in internal nodes too; B+ tree keeps all data in leaves. B+ tree is better for range queries.","Index covers query ≠ index is used. The query optimizer may choose a full scan for low-selectivity queries.","Composite index (A,B): useful for queries on (A) or (A,B), but NOT queries on (B) alone."],
  links:["db.schema","db.sql","dsa.trees","algo.complex"],
},
"db.sql":{
  hook:"SQL is the language of relational databases. SQL learning needs both syntax (JOINs, GROUP BY, subqueries) and query semantics — understanding what each query computes, not just writing it.",
  def:"SELECT cols FROM t1 JOIN t2 ON ... WHERE ... GROUP BY ... HAVING ... ORDER BY .... INNER JOIN: matching rows only. LEFT JOIN: all rows from left, NULLs for non-matching right. Aggregate functions: COUNT, SUM, AVG, MIN, MAX work with GROUP BY.",
  insight:"Execution order: FROM→JOIN→WHERE→GROUP BY→HAVING→SELECT→ORDER BY. This order matters: WHERE filters rows BEFORE grouping; HAVING filters AFTER grouping. You cannot use aggregate functions in WHERE — use HAVING. Subqueries in SELECT/FROM/WHERE add power but cost.",
  t1:[
    {q:"SELECT dept, COUNT(*) FROM emp WHERE salary>50000 GROUP BY dept HAVING COUNT(*)>5. What does this return?",a:"Departments with >5 employees earning >50000",sol:"1. Filter employees with salary>50000 (WHERE). 2. Group by department. 3. Count per group. 4. Keep groups with count>5 (HAVING). Result: dept and count for qualifying departments."},
    {q:"Difference between WHERE and HAVING?",a:"WHERE filters rows before grouping; HAVING filters groups after aggregation",sol:"WHERE: applied to individual rows before GROUP BY. HAVING: applied to groups after aggregation. Aggregate functions (COUNT, AVG) allowed in HAVING, NOT in WHERE."},
  ],
  t2:[
    {q:"Find employees who earn more than their manager. Table: emp(id, name, salary, manager_id).",a:"Self-join",sol:"SELECT e.name FROM emp e JOIN emp m ON e.manager_id=m.id WHERE e.salary>m.salary. Self-join: the emp table is joined with itself, aliased as 'e' (employee) and 'm' (manager)."},
    {q:"Find the second highest salary without using LIMIT/TOP.",a:"Use subquery with MAX",sol:"SELECT MAX(salary) FROM emp WHERE salary < (SELECT MAX(salary) FROM emp). Or: SELECT MIN(salary) FROM (SELECT DISTINCT salary FROM emp ORDER BY salary DESC LIMIT 2)."},
  ],
  t3:[
    {q:"Explain the difference between correlated and non-correlated subqueries. Give an example of each. Which is more efficient?",a:"Correlated: re-evaluated per row. Non-correlated: evaluated once.",sol:"Non-correlated: SELECT * FROM emp WHERE dept_id IN (SELECT id FROM dept WHERE location='NYC'). The inner query runs once, independently. Correlated: SELECT e.name FROM emp e WHERE e.salary > (SELECT AVG(salary) FROM emp WHERE dept_id=e.dept_id). The inner query re-runs for each outer row (references e.dept_id). Non-correlated is generally faster. Correlated subqueries are O(rows·subquery_cost) vs non-correlated O(rows+subquery_cost)."},
  ],
  traps:["GROUP BY: all non-aggregate columns in SELECT must appear in GROUP BY (or be functionally determined by GROUP BY columns).","NULL: any comparison with NULL returns NULL (unknown). Use IS NULL, not =NULL.","DISTINCT in COUNT(DISTINCT col) counts unique values; COUNT(*) counts rows including NULLs."],
  links:["db.schema","db.rel","db.index","db.tx"],
},
"db.rel":{
  hook:"Relational algebra is the mathematical foundation of SQL. Every SQL query corresponds to a relational algebra expression. Understanding RA explains query optimization — operators can be reordered for efficiency.",
  def:"Core operators: σ (select/filter rows), π (project/select columns), ⋈ (natural join), × (Cartesian product), ∪ (union), − (difference), ρ (rename). Derived: ⋈_θ (theta join = ×+σ), ⟕ (left outer join). Relational calculus (TRC/DRC) is declarative; RA is procedural. Both are relationally complete.",
  insight:"Join ordering is the core of query optimization. RA allows pushing selections σ before joins (σ distributive over ⋈) — filtering early reduces intermediate result sizes. Modern query optimizers enumerate join orders using dynamic programming to find the minimum-cost plan.",
  t1:[
    {q:"π_{name}(σ_{salary>70000}(Employee)): translate to SQL.",a:"SELECT name FROM Employee WHERE salary>70000",sol:"σ (selection) → WHERE clause. π (projection) → SELECT clause. Evaluation: first filter (σ), then project (π) — equivalent to the SQL execution order."},
    {q:"R⋈S (natural join) on attributes in common. How does it differ from R×S (Cartesian product)?",a:"Natural join = Cartesian product + select on matching attributes + project to remove duplicates",sol:"R×S: pairs every row of R with every row of S. R⋈S: pairs rows where shared attributes match, keeping only one copy of each shared attribute. If R has n rows and S has m rows: |R×S|=nm, |R⋈S|≤nm (often much less)."},
  ],
  t2:[
    {q:"Express 'Find students who take ALL courses offered' in relational algebra using division.",a:"π_{student,course}(Enrolled) ÷ π_{course}(Course)",sol:"Division R÷S: returns tuples t in π_{R-S}(R) such that for every tuple s in S, (t,s) is in R. Here: students enrolled in every course = Enrolled÷π_{course}(Course). Division is NOT a primitive — it's derived: R÷S = π_{R-S}(R) − π_{R-S}((π_{R-S}(R)×S) − R)."},
    {q:"SQL ↔ RA: SELECT DISTINCT R.A FROM R,S WHERE R.B=S.B AND S.C>5. Translate to RA.",a:"π_A(R ⋈_{R.B=S.B} σ_{C>5}(S))",sol:"1. σ_{C>5}(S) — filter S. 2. R ⋈_{R.B=S.B} result — join on B=B. 3. π_A — project. DISTINCT corresponds to projection (RA results are sets, no duplicates). Push σ_{C>5} before the join for efficiency."},
  ],
  t3:[
    {q:"Prove that σ is distributive over ⋈: σ_θ(R⋈S) = σ_{θ_R}(R) ⋈ σ_{θ_S}(S) when θ only involves R's attributes and S's attributes separately (conjunctive predicate).",a:"Proof and practical significance.",sol:"Let θ=θ_R ∧ θ_S where θ_R refers only to R's attributes and θ_S only to S's. σ_{θ_R ∧ θ_S}(R⋈S) means: for each tuple (r,s) in R⋈S, keep iff θ_R(r)∧θ_S(s). This is equivalent to: first σ_{θ_R}(R) and σ_{θ_S}(S), then join (matching tuples must still satisfy join condition). Formally: (r,s)∈result iff r⋈s and θ_R(r) and θ_S(s) iff r∈σ_{θ_R}(R) and s∈σ_{θ_S}(S) and they join. □ Practical: push selections before joins dramatically reduces intermediate result sizes in query execution."},
  ],
  traps:["Natural join matches on ALL common attribute names. If two relations share an attribute name with different semantics, natural join gives wrong results — use explicit θ-join.","Relational algebra operates on SETS (no duplicates). SQL bags (multisets) require DISTINCT for set semantics.","Division R÷S requires that S's attributes are a subset of R's attributes. Common use: 'for all' queries."],
  links:["db.schema","db.sql","db.tx"],
},
"db.tx":{
  hook:"Transactions ensure that database operations are atomic and isolated. ACID properties are the contract; concurrency control is the mechanism; serializability is the correctness criterion.",
  def:"ACID: Atomicity (all or nothing), Consistency (valid state→valid state), Isolation (concurrent transactions appear serial), Durability (committed changes survive crashes). Serializability: a schedule is serializable iff its precedence graph has no cycles. Two-phase locking (2PL) ensures serializability.",
  insight:"Two-phase locking: growing phase (acquire locks), shrinking phase (release locks). Once you release any lock, you cannot acquire new ones. This ensures conflict serializability. Strict 2PL (release all at commit) additionally ensures recoverability. The precedence graph test: T_i→T_j if Ti holds a lock that Tj needs (conflicting access, Ti first). Cycle ⟹ not serializable.",
  t1:[
    {q:"Schedule: T1:Read(A); T2:Read(A); T1:Write(A); T2:Write(A). Is this serializable?",a:"Not conflict-serializable",sol:"Conflicts: T1-Write(A) vs T2-Write(A) (both write same item). T1 writes before T2: T1→T2. T2-Read(A) before T1-Write: T2→T1. Cycle T1→T2→T1 ⟹ NOT serializable."},
    {q:"What is a 'dirty read' and which isolation level prevents it?",a:"Dirty read: reading uncommitted data. Prevented by Read Committed or higher.",sol:"Dirty read: T1 reads a value written by T2 that T2 later rolls back. T1 then has seen data that never existed. Prevented at Read Committed level (only read committed data). READ UNCOMMITTED allows dirty reads; READ COMMITTED and above prevent them."},
  ],
  t2:[
    {q:"Strict 2PL vs 2PL: what additional property does Strict 2PL provide?",a:"Strict 2PL ensures recoverability (no cascading aborts)",sol:"2PL: acquire all locks before first release (two phases). Can still have cascading aborts: if T1 releases a lock, T2 reads T1's write, then T1 aborts — T2 must also abort. Strict 2PL: hold ALL locks until COMMIT or ABORT. No dirty reads, no cascading aborts. All committed schedules are recoverable."},
    {q:"MVCC (Multi-Version Concurrency Control): how does it allow reads without blocking writes?",a:"Readers access old versions; writers create new versions",sol:"MVCC maintains multiple versions of each data item. Readers see a consistent snapshot from their transaction start time. Writers create new versions without overwriting old ones. Read-write conflicts are eliminated (readers never block writers). Used by PostgreSQL, MySQL InnoDB. Trade-off: old versions accumulate (need garbage collection — VACUUM in PostgreSQL)."},
  ],
  t3:[
    {q:"Prove: Two-Phase Locking (2PL) ensures conflict serializability. (Use the precedence graph.)",a:"Proof by contradiction.",sol:"Assume 2PL but the precedence graph has a cycle: T1→T2→...→Tk→T1. T1→T2 means T1 holds a lock, T2 needs it — T2's conflicting access occurs AFTER T1's. Let L(Ti) be the time Ti first releases a lock. Since Ti→T_{i+1}: T_{i+1} acquires the conflicting lock AFTER Ti releases it. By 2PL, Ti does not acquire new locks after releasing any lock. So the lock-point of Ti (first release) satisfies L(T1)<lock_point(T2)≤L(T2)≤...≤lock_point(Tk)≤L(Tk)<lock_point(T1). But this gives L(T1)<lock_point(T1), a contradiction since lock_point(T1) is the first release of T1 (nothing before it). □"},
  ],
  traps:["Deadlock is possible with 2PL — two transactions each wait for a lock the other holds. Detect with wait-for graphs; prevent with timestamps or lock ordering.","Serializability: conflict serializability ⊂ view serializability. Conflict-serializable ⟹ view-serializable; converse not always true.","Isolation levels (weakest to strongest): Read Uncommitted → Read Committed → Repeatable Read → Serializable."],
  links:["db.schema","db.sql","db.rel","db.index"],
},
}); /* end subjects opt/dsa/db */

Object.assign(window.CONTENT, {
"ml.reg":{
  hook:"Regression models predict continuous outputs. Linear regression minimizes squared error; ridge adds L2 regularization; lasso adds L1. The closed-form solution (normal equations) connects linear algebra to statistics.",
  def:"Linear: ŷ=Xβ, β̂=(XᵀX)⁻¹Xᵀy (OLS). Ridge: β̂=(XᵀX+λI)⁻¹Xᵀy. Lasso: β̂=argmin‖y−Xβ‖²+λ‖β‖₁ (no closed form). Ridge biases toward zero; Lasso produces sparse solutions (exact zeros).",
  insight:"Ridge regression is equivalent to placing a Gaussian prior on β (MAP estimation). Lasso is equivalent to a Laplace prior. The L1 penalty creates corners in the constraint set where solutions tend to be sparse. Adding a support vector shrinks it toward zero; removing it changes the solution only if it was a support vector.",
  t1:[
    {q:"OLS: X=[[1,1],[1,2],[1,3]], y=[2,3,5]. Find β̂=(XᵀX)⁻¹Xᵀy.",a:"β̂≈[0.33, 1.5]",sol:"XᵀX=[[3,6],[6,14]], Xᵀy=[10,23]. Solve: β=[0.33,1.5] (intercept≈0.33, slope≈1.5). Alternatively: β̂=pinv(X)y."},
    {q:"Why does adding ridge regularization help when XᵀX is singular (multicollinearity)?",a:"λI makes (XᵀX+λI) always invertible",sol:"Eigenvalues of XᵀX+λI = eigenvalues of XᵀX plus λ. Since λ>0, all eigenvalues are ≥λ>0 ⟹ matrix is PD ⟹ invertible. Ridge also reduces variance at the cost of bias: Var(β̂_ridge)<Var(β̂_OLS)."},
  ],
  t2:[
    {q:"Show that Ridge regression parameter β̂=(XᵀX+λI)⁻¹Xᵀy increases bias but decreases variance compared to OLS.",a:"Bias-variance tradeoff analysis.",sol:"Bias(β̂_ridge)=E[β̂_ridge]−β=[(XᵀX+λI)⁻¹XᵀX−I]β≠0 (biased). Var(β̂_ridge)=σ²(XᵀX+λI)⁻¹XᵀX(XᵀX+λI)⁻¹. Compare to Var(β̂_OLS)=σ²(XᵀX)⁻¹. Ridge variance < OLS variance (can be shown using eigenvalue analysis: each eigenvalue λᵢ contributes σ²λᵢ/(λᵢ+λ)² < σ²/λᵢ)."},
    {q:"Why does L1 regularization (Lasso) produce sparse solutions while L2 (Ridge) does not?",a:"L1 constraint region has corners; L2 has a smooth sphere.",sol:"The optimal solution lies where the loss ellipsoids touch the constraint set (‖β‖₁≤t or ‖β‖₂²≤t). L1 ball has corners at axes — likely touching point. At corners, some βᵢ=0 exactly. L2 ball is a smooth sphere — touching point has all βᵢ non-zero in general. Lasso promotes sparsity; Ridge shrinks all coefficients."},
  ],
  t3:[
    {q:"Derive the MLE for linear regression assuming Gaussian noise: yᵢ=xᵢᵀβ+εᵢ, εᵢ~N(0,σ²). Show MLE=OLS.",a:"MLE=OLS derivation.",sol:"Likelihood: L(β)=Π_i N(yᵢ;xᵢᵀβ,σ²)∝exp(−Σ(yᵢ−xᵢᵀβ)²/(2σ²)). Log-likelihood: ℓ(β)=−1/(2σ²)·‖y−Xβ‖². Maximizing ℓ ⟺ minimizing ‖y−Xβ‖². ∇_β‖y−Xβ‖²=2XᵀXβ−2Xᵀy=0 ⟹ β̂=(XᵀX)⁻¹Xᵀy = OLS estimator. □"},
  ],
  traps:["Ridge: E[β̂_ridge]≠β (biased). OLS: E[β̂]= β (unbiased). Know which estimator is unbiased.","Lasso has no closed form for the general case. For orthogonal X, Lasso reduces to soft-thresholding: β̂_j=sign(β̂_OLS_j)·max(|β̂_OLS_j|−λ/2,0).","R² can be negative for models with intercept omitted if the model fits worse than the mean."],
  links:["eig.proj","grad.matrix","stat.mle","ml.eval","opt.lag"],
},
"ml.cls":{
  hook:"Classification assigns inputs to discrete categories. Logistic regression models the probability; SVM finds the maximum-margin hyperplane; decision trees partition space greedily. Each makes different assumptions about the boundary.",
  def:"Logistic: P(y=1|x)=σ(wᵀx+b) where σ(z)=1/(1+e^{−z}). Decision boundary: wᵀx+b=0. SVM: maximize margin 2/‖w‖ subject to yᵢ(wᵀxᵢ+b)≥1. Soft-SVM: allow slack ξᵢ≥0 with penalty C·Σξᵢ. Naïve Bayes: P(y|x)∝P(y)Πᵢ P(xᵢ|y) (conditional independence).",
  insight:"Removing a non-support vector from an SVM dataset does not change the margin. Support vectors are the points with μᵢ>0 (active constraints). The decision boundary w=Σμᵢyᵢxᵢ depends only on support vectors. This makes SVM robust to outliers far from the boundary.",
  t1:[
    {q:"Logistic regression output: σ(wᵀx)=0.7. Predicted class (threshold 0.5)? What is the log-odds?",a:"Class 1; log-odds=log(0.7/0.3)=0.847",sol:"0.7>0.5 ⟹ predict class 1. Log-odds=ln(p/(1−p))=ln(0.7/0.3)=ln(2.33)≈0.847. This equals wᵀx (the linear part before sigmoid)."},
    {q:"SVM: which points become support vectors after training on linearly separable data?",a:"Points closest to the decision boundary (with margin=1)",sol:"Support vectors are training points with yᵢ(wᵀxᵢ+b)=1 exactly — on the margin boundary. All other points have yᵢ(wᵀxᵢ+b)>1. Only support vectors affect the optimal w and b."},
  ],
  t2:[
    {q:"MLP with 30 inputs, 4 hidden units, 3 outputs, no biases. How many parameters?",a:"135",sol:"Layer 1: 30×4=120. Layer 2: 4×3=12. Total: 120+12=132. Wait, no biases means just weights. 30×4+4×3=120+12=132. (With an extra output layer, the arithmetic would change — check the exact architecture.)"},
    {q:"Naïve Bayes assumes features are conditionally independent given the class. Why is this a strong assumption? When does it still work well?",a:"Strong but often effective in practice.",sol:"Strong: in text, 'New York' is not two independent words. In practice: conditional independence often violated, but Naïve Bayes still predicts the correct class if the ranking of P(y|x) is correct — class probabilities don't need to be calibrated, just ordered correctly. Works well for text (bag of words), spam filtering, high-dimensional sparse features."},
  ],
  t3:[
    {q:"Derive the SVM dual problem from the primal: min ½‖w‖² s.t. yᵢ(wᵀxᵢ+b)≥1. Show the dual is: max Σμᵢ−½ΣΣμᵢμⱼyᵢyⱼxᵢᵀxⱼ.",a:"Lagrangian duality derivation.",sol:"L=½‖w‖²−Σμᵢ(yᵢ(wᵀxᵢ+b)−1). KKT stationarity: ∂L/∂w=w−Σμᵢyᵢxᵢ=0 ⟹ w=Σμᵢyᵢxᵢ. ∂L/∂b=−Σμᵢyᵢ=0. Substituting back: L=½‖Σμᵢyᵢxᵢ‖²−Σᵢμᵢ[yᵢ(Σⱼμⱼyⱼxⱼ)ᵀxᵢ+yᵢb]+Σμᵢ=½ΣΣμᵢμⱼyᵢyⱼxᵢᵀxⱼ−ΣΣμᵢμⱼyᵢyⱼxᵢᵀxⱼ−0+Σμᵢ=Σμᵢ−½ΣΣμᵢμⱼyᵢyⱼxᵢᵀxⱼ. Dual: maximize this w.r.t. μ≥0. □"},
  ],
  traps:["Logistic regression gives calibrated probabilities. SVM gives class labels (margins, not probabilities) — not directly interpretable as probabilities without Platt scaling.","C in soft-SVM: large C → small margin (overfit), small C → large margin (underfit). C controls the tradeoff.","Decision tree splitting: maximizing information gain = minimizing entropy. Gini impurity is an alternative criterion."],
  links:["cond.bayes","eig.rayleigh","opt.kkt","ml.eval","ml.nn"],
},
"ml.unsup":{
  hook:"Unsupervised learning finds structure without labels. K-means clusters by distance; hierarchical clustering builds a dendrogram; PCA reduces dimension by finding maximum-variance directions.",
  def:"K-means: assign points to nearest centroid; update centroids; repeat until convergence. Complexity per iteration: O(nkd). PCA: find eigenvectors of covariance matrix. Reconstruct: x̂=μ+Σᵢ₌₁ᵏ (xᵢ·vᵢ)vᵢ. Fraction of variance explained: Σλᵢ_kept/Σλᵢ_all.",
  insight:"K-means minimizes the within-cluster sum of squares (WCSS). It converges but may find a local minimum — initialization matters (K-means++ selects initial centroids with probability proportional to distance². HAC (hierarchical agglomerative clustering) uses different linkage criteria: single, complete, average, Ward.",
  t1:[
    {q:"K-means with k=2, points {1,2,8,9}. Initial centroids: μ₁=1, μ₂=9. What happens in the first iteration?",a:"Assign: {1,2}→μ₁, {8,9}→μ₂. Update: μ₁=1.5, μ₂=8.5.",sol:"Distances: 1 to {1,9}: 0,8 → assign to μ₁. 2 to {1,9}: 1,7 → assign to μ₁. 8 to {1,9}: 7,1 → assign to μ₂. 9 to {1,9}: 8,0 → assign to μ₂. New centroids: (1+2)/2=1.5, (8+9)/2=8.5."},
    {q:"PCA: covariance matrix Σ has eigenvalues 5,2,0.5. How many components needed to explain 80% variance?",a:"2 components (87.5%)",sol:"Total variance=7.5. Cumulative: 5/7.5=66.7% (1 comp), 7/7.5=93.3% (2 comps). 2 components explain 93.3%>80%. 1 component only 66.7%."},
  ],
  t2:[
    {q:"HAC with single linkage vs complete linkage: which tends to produce elongated 'chaining' clusters?",a:"Single linkage causes chaining",sol:"Single linkage: distance between clusters = minimum pairwise distance. A single bridge between clusters can merge them even if most points are far apart → chaining effect. Complete linkage: distance = maximum pairwise distance → compact, spherical clusters, no chaining."},
    {q:"K-means on points [(0,0),(1,0),(0,1),(3,3),(4,3),(3,4)] with k=2. Find final cluster assignments.",a:"Cluster 1: {(0,0),(1,0),(0,1)}, Cluster 2: {(3,3),(4,3),(3,4)}",sol:"Initial centroids (k-means++): likely (0,0) and (3,3) or similar. After convergence: centroid 1 = (1/3, 1/3), centroid 2 = (10/3, 10/3). All three near-origin points closer to centroid 1; all three far points closer to centroid 2."},
  ],
  t3:[
    {q:"Prove that K-means objective (WCSS) is non-increasing at each iteration, and hence converges in finite steps.",a:"Convergence proof.",sol:"Two steps: (1) Assignment step: each point assigned to its nearest centroid. WCSS can only decrease or stay same (each point's contribution min(d²) ≤ previous d²). (2) Update step: new centroid = mean of assigned points. For any fixed assignment, the centroid minimizing within-cluster SS is the mean (calculus: d/dμ Σ‖xᵢ−μ‖²=0 ⟹ μ=mean). So WCSS decreases or stays same. Since there are finitely many assignments (kⁿ) and WCSS is strictly decreasing (unless already at minimum), K-means converges in finite steps. □"},
  ],
  traps:["K-means assumes spherical clusters of equal size. Fails for elongated clusters, unequal sizes, non-convex shapes.","K-means with k=1: all points in one cluster, centroid = global mean. Trivially minimizes WCSS but useless.","PCA is a linear method — it finds linear projections. For nonlinear structure, use Kernel PCA or t-SNE."],
  links:["eig.rayleigh","lin.svd","cond.indep","ml.eval"],
},
"ml.nn":{
  hook:"Neural networks are universal function approximators. Backpropagation computes all gradients in O(number of parameters) using the chain rule. The choice of architecture (depth, width, activation) determines what functions can be learned.",
  def:"Forward pass: z^l=W^l·a^{l-1}+b^l, a^l=f(z^l). Loss L. Backward pass: δ^L=∇_a L·f'(z^L). δ^l=(W^{l+1}ᵀδ^{l+1})⊙f'(z^l). Gradients: ∂L/∂W^l=δ^l·(a^{l-1})ᵀ, ∂L/∂b^l=δ^l.",
  insight:"The vanishing gradient problem: for sigmoid/tanh activations, gradients shrink through layers (sigmoid derivative max=0.25). With 10 layers, gradient can be (0.25)^{10}≈10^{-6}. Fix: ReLU (derivative=1 for positive inputs), batch normalization, residual connections. ReLU also sparsifies activations (dying ReLU: neurons stuck at 0).",
  t1:[
    {q:"MLP forward pass: x=[1,0], W1=[[1,0],[0,1]], b1=[0,0], activation ReLU, W2=[[1,1]], b2=0. Compute output.",a:"1",sol:"z1=W1·x+b1=[1,0]. a1=ReLU([1,0])=[1,0]. z2=W2·a1+b2=[1,1]·[1,0]+0=1. Output: 1."},
    {q:"Why is ReLU preferred over sigmoid for deep networks?",a:"ReLU doesn't saturate for positive inputs → gradient=1, no vanishing",sol:"Sigmoid: f'=f(1-f)∈[0,0.25] — gradients always <1, compounded ⟹ exponential decay. ReLU: f'=1 for z>0 — no vanishing. Computationally cheaper (no exp). Sparse activations (some neurons off). Dying ReLU (neurons permanently off) is a problem; fixed by Leaky ReLU."},
  ],
  t2:[
    {q:"Universal approximation theorem: a single hidden layer with enough neurons can approximate any continuous function on a compact domain. What does this NOT say?",a:"Doesn't say how many neurons needed or that GD will find it",sol:"The theorem guarantees existence, not learnability. It doesn't bound the number of neurons (could be exponential). It doesn't say gradient descent will find the approximating network. In practice, depth helps much more than width for efficiency — deep networks represent some functions exponentially more compactly."},
    {q:"Batch normalization: given pre-activations z for a batch, what transformation is applied? Why does it help?",a:"z̃=(z−μ_B)/σ_B·γ+β, where μ_B,σ_B are batch statistics",sol:"Normalize to zero mean, unit variance per feature across the batch. Then rescale with learnable γ,β. Benefits: reduces internal covariate shift, allows higher learning rates, acts as regularizer, mitigates vanishing gradients. Inference: use running statistics instead of batch statistics."},
  ],
  t3:[
