    {q:"Derive the backpropagation equations for a fully connected network. Show that the gradient computation is O(|W|) — linear in number of parameters.",a:"Backprop derivation.",sol:"Forward: O(|W|) to compute all activations. Backward: δ^L=∂L/∂z^L (O(n^L)). For layer l: δ^l=((W^{l+1})ᵀδ^{l+1})⊙f'(z^l) — matrix-vector product O(n^l·n^{l+1}). ∂L/∂W^l=δ^l(a^{l-1})ᵀ — outer product O(n^l·n^{l-1}). Total backward: O(Σ n^l·n^{l-1})=O(|W|). Combined forward+backward: O(|W|), same as computing the loss. □ This is why backprop is efficient — computing all gradients costs at most as much as one forward pass."},
  ],
  traps:["Gradient of sigmoid σ: σ'(z)=σ(z)(1−σ(z)). Maximum at z=0 is 0.25. This saturates for large |z|.","XOR cannot be solved by a single-layer (no hidden layer) network. Need at least one hidden layer.","Dropout rate p: each neuron is kept with probability 1−p. At test time, multiply outputs by 1−p (or equivalently, use 'inverted dropout' at training time)."],
  links:["grad.matrix","opt.gd","ml.cls","ml.eval","ml.theory"],
},
"ml.eval":{
  hook:"Model evaluation is not just accuracy. For imbalanced datasets, a model predicting the majority class gets high accuracy but learns nothing. Precision, recall, F1, AUC, and cross-validation give a complete picture.",
  def:"TP/FP/TN/FN from confusion matrix. Precision=TP/(TP+FP). Recall=TP/(TP+FN). F1=2PR/(P+R). Accuracy=(TP+TN)/N. AUC-ROC: area under TPR vs FPR curve. Cross-validation: k-fold trains on k−1 folds, tests on 1, repeats k times.",
  insight:"LOOCV conceptual trap: n_splits in LOOCV = n (total samples), NOT training_size. Each fold uses n−1 training samples and tests on 1. This is a direct conceptual test. Also: LOOCV has high variance (each training set differs by only 1 sample) but low bias (nearly full data for training).",
  t1:[
    {q:"Confusion matrix: TP=80, FP=20, FN=10, TN=90. Compute precision, recall, F1, accuracy.",a:"P=0.8, R=0.889, F1=0.842, Acc=0.85",sol:"P=80/100=0.8. R=80/90=0.889. F1=2·0.8·0.889/(0.8+0.889)=1.422/1.689=0.842. Acc=(80+90)/200=0.85."},
    {q:"Which metric should you optimize for: detecting cancer (minimize false negatives) vs spam filtering (minimize false positives)?",a:"Cancer: maximize Recall. Spam: maximize Precision.",sol:"Cancer: FN=missed cancer → fatal. Maximize Recall (TP/TP+FN). Spam: FP=good email deleted → annoying but not fatal. Maximize Precision (TP/TP+FP). F1 balances both."},
  ],
  t2:[
    {q:"K-fold cross-validation with k=5, dataset n=1000. How many models are trained? How many samples in each training/test fold?",a:"5 models; 800 train, 200 test per fold",sol:"5 folds: each fold is 1000/5=200 samples. Training: 4 folds=800. Test: 1 fold=200. Total models: 5."},
    {q:"Bias-variance decomposition of expected test error: E[(y−ŷ)²]=Bias²+Variance+σ². How does regularization λ affect each term?",a:"Increasing λ: Bias↑, Variance↓, σ² unchanged",sol:"More regularization (larger λ): more constraint → less flexible model → higher bias. But less overfit to training data → lower variance. Irreducible error σ² is independent of model. The optimal λ balances bias² and variance at the bias-variance tradeoff."},
  ],
  t3:[
    {q:"Prove that in k-fold cross-validation, the expected value of the CV error is the expected test error of a model trained on (k−1)/k fraction of the data. Discuss the bias of LOOCV vs 5-fold CV.",a:"Analysis of CV bias.",sol:"CV estimates the error of a model trained on (k−1)n/k samples. For LOOCV (k=n): each model trains on n−1 samples → very close to training on full data → nearly unbiased estimate of generalization error. For k=5: each model trains on 4n/5 samples → slightly biased (underestimates performance of final model trained on full n). LOOCV has higher variance (n models are highly correlated — differing by 1 sample). 5-fold CV has lower variance, slightly higher bias. k=10 is usually recommended empirically."},
  ],
  traps:["LOOCV n_splits = n (number of samples). Training size per split = n−1. Don't confuse n_splits with training_size.","AUC=0.5: classifier is random (ROC curve is diagonal). AUC=1: perfect. AUC<0.5: systematic misclassification (flip predictions).","Accuracy is misleading for imbalanced datasets. 99% accuracy for 1% positive class → model predicts all negative."],
  links:["cond.bayes","stat.ht","ml.reg","ml.cls","ml.theory"],
},
"ml.theory":{
  hook:"Learning theory asks: under what conditions can a machine learning algorithm generalize? PAC learning, VC dimension, and Rademacher complexity quantify the sample complexity — how much data is needed to learn with confidence.",
  def:"PAC learning: algorithm is PAC-learner if ∀ε,δ, with n≥O(1/ε·log(1/δ)) samples, it outputs h with P(error≤ε)≥1−δ. VC dimension: largest set of points shattered by H. Generalization bound: error ≤ training_error + O(√(VCdim·log n/n)).",
  insight:"No Free Lunch theorem: for any learning algorithm, there exists a distribution where it fails. No algorithm is universally best. This is why inductive bias (assuming e.g. linearity) is necessary. VC dimension of linear classifiers in ℝᵈ is d+1 — more dimensions = more capacity = more data needed.",
  t1:[
    {q:"VC dimension of halfspaces in ℝ²: can any 4 points be shattered by lines?",a:"No. VCdim=3.",sol:"3 points in 'general position': any labeling can be separated by a line (6/6 labelings). 4 points: consider a 'XOR configuration' (alternate labels on 4 corners of a square) — no single line can separate them. VCdim of linear classifiers in ℝᵈ = d+1."},
    {q:"Overfitting: training error=0 but test error=30%. What does this indicate about the model?",a:"High variance — model memorized training data, doesn't generalize",sol:"Training error 0: perfect fit on training set. Test error 30%: poor generalization. This is overfitting (high variance). Fixes: more data, regularization, simpler model, dropout, early stopping."},
  ],
  t2:[
    {q:"PAC learning: H has VCdim=10. To achieve ε=0.01 error with δ=0.05 confidence, approximately how many samples are needed?",a:"n ≈ O(d/ε·log(1/δ)) ≈ several thousand",sol:"Sauer's lemma + union bound: n ≥ (c/ε)(VCdim·log(1/ε)+log(1/δ)) ≈ (1/0.01)(10·log(100)+log(20)) ≈ 100·(46+3)≈4900. About 5000 samples."},
    {q:"What is the bias-variance-complexity tradeoff in terms of VC theory?",a:"Generalization = training error + complexity penalty (grows with VCdim/n)",sol:"Bound: L(h) ≤ L̂(h) + O(√(VCdim/n)). High VCdim → complex model → small training error (L̂) but large penalty → overfitting. Low VCdim → simple model → large training error but small penalty → underfitting. Optimal is the model class with VCdim ≈ √n empirically."},
  ],
  t3:[
    {q:"Prove the No Free Lunch theorem: for any learning algorithm A and any training set size m<|X|/2, there exists a distribution D such that E[L(h_A)]≥1/4.",a:"Proof.",sol:"Let X={x₁,...,x_{2m}} be any input space with 2m points. There are 2^{2m} binary functions on X. For any A and any training set T of m points, A sees m labeled points and must predict on the other m. For any fixed A and T, consider the 2^m functions on the unseen m points: exactly half label each unseen point as 0 and half as 1. A makes the same prediction ĥ(xᵢ) for unseen points regardless of the (unseen) truth. For each unseen point xᵢ, P_{D uniform over these 2^m functions}(h(xᵢ)≠ĥ(xᵢ))=1/2. Expected error on unseen points = 1/2. Averaging over all possible m-point training sets gives E[L(h_A)]≥1/4. □"},
  ],
  traps:["No Free Lunch doesn't say you can't do well — it says no algorithm is universally optimal WITHOUT assumptions about the data distribution.","VC dimension is for binary classification. For regression or multi-class, use Natarajan dimension or Rademacher complexity.","Generalization bounds are often loose in practice — they give correct qualitative insights but the constants are too large to be tight."],
  links:["ml.nn","ml.eval","ml.cls","stat.ht","cond.tvar"],
},

"ai.search":{
  hook:"Search algorithms systematically explore state spaces. BFS finds shortest path in unweighted graphs; DFS uses less memory; A* uses heuristics to guide search. The heuristic determines efficiency.",
  def:"BFS: O(b^d) time/space, optimal for uniform cost. DFS: O(b·m) space, not optimal. UCS: optimal for non-uniform costs. A*: f(n)=g(n)+h(n); optimal if h is admissible (h(n)≤h*(n)) and consistent (h(n)≤c(n,n')+h(n')). IDDFS: depth-limited DFS iterated — O(b^d) time, O(d) space.",
  insight:"Admissible ≠ consistent. Admissible: never overestimates. Consistent (monotone): satisfies the triangle inequality h(n)≤c(n,n')+h(n'). Consistent ⟹ admissible (but not vice versa). For tree search: admissible suffices for optimality. For graph search: consistency is needed (to avoid reopening closed nodes).",
  t1:[
    {q:"A* with h(n)=0 reduces to which algorithm?",a:"Uniform Cost Search (Dijkstra)",sol:"f(n)=g(n)+0=g(n). A* expands nodes in order of path cost g(n) only — this is exactly UCS/Dijkstra."},
    {q:"Is h(n)=0 admissible? Is it efficient?",a:"Admissible (0≤h*) but not efficient",sol:"0≤h*(n) for all n (h* ≥ 0). So h=0 is admissible. Not efficient: provides no guidance (like BFS with cost), expands many unnecessary nodes."},
  ],
  t2:[
    {q:"Grid: start S=(0,0), goal G=(3,3), Manhattan distance heuristic. Is this admissible and consistent for 4-directional movement?",a:"Both admissible and consistent",sol:"Admissible: Manhattan distance = minimum steps (no obstacles) ≤ actual steps ✓. Consistent: moving one step, h decreases by at most 1 (triangle inequality satisfied). This makes A* expand minimum nodes on a grid."},
    {q:"Compare BFS, DFS, UCS, and A* on: completeness, optimality, time, space (branching factor b, max depth m, solution depth d).",a:"BFS: complete, optimal (unit cost), O(b^d) time/space. DFS: complete (finite), not optimal, O(b^m) time, O(bm) space. UCS: complete, optimal, O(b^{1+⌊C*/ε⌋}). A*: complete, optimal (admissible h), O(b^d) worst.",sol:"BFS optimal only for uniform cost. DFS not optimal (finds any path). UCS optimal for any non-negative costs. A* optimal with admissible h, better than BFS in practice."},
  ],
  t3:[
    {q:"Prove A* with a consistent heuristic is optimal: the first time A* expands a goal node, it has found the optimal path.",a:"Proof via f-value monotonicity.",sol:"Consistency: h(n)≤c(n,n')+h(n') ⟹ f(n)=g(n)+h(n)≤g(n')+h(n')=f(n') along any path. So f-values are non-decreasing along any path: f is monotone. A* expands nodes in order of f-value. Let n* be optimal goal (cost g*). For any suboptimal goal n', g(n')>g*=g(n*). Since h(n*)=0 (goal): f(n*)=g(n*)<g(n')=f(n'). So A* expands n* before n'. When n* is first expanded via optimal path, f(n*)=g*. Any path to n* through a node not on the optimal path has higher g ⟹ higher f ⟹ expanded later. □"},
  ],
  traps:["Admissible ≠ consistent. But consistent ⟹ admissible always.","A* is complete and optimal but exponential in SPACE in the worst case. IDA* solves the space issue.","Inadmissible heuristics (overestimating h): A* may not find optimal path but explores fewer nodes (Weighted A*)."],
  links:["algo.complex","dsa.graph","dsa.short","ai.minmax","ai.bn"],
},
"ai.minmax":{
  hook:"Minimax searches game trees to find the optimal strategy assuming the opponent plays optimally. Alpha-beta pruning eliminates branches that cannot affect the final decision, dramatically reducing the search space.",
  def:"Minimax: MAX player maximizes; MIN player minimizes. Score propagated up: MAX nodes take child max, MIN nodes take child min. Alpha-beta: α=best MAX score found so far, β=best MIN score. Prune when α≥β. Optimal pruning cuts to O(b^{d/2}) from O(b^d).",
  insight:"With perfect move ordering (best move first), alpha-beta is O(b^{d/2}) — it's like searching a tree of depth d/2 with branching b. In practice: 2-3× faster than minimax. For chess (b≈35): minimax to depth 10 ≈ 35^{10} ≈ 2.8×10^{15}; alpha-beta ≈ 35^5 ≈ 5.2×10^7. A factor of 50 million.",
  t1:[
    {q:"Simple game tree: MAX node with children [3,5], and MAX node with children [2,4]. What are the minimax values?",a:"5 and 4",sol:"MAX nodes take maximum of children: max(3,5)=5, max(2,4)=4."},
    {q:"Alpha-beta: α=4, β=6 at a MIN node. A child returns value 3. What happens?",a:"Prune remaining children",sol:"MIN node will take min of children. Min so far=3<α=4 ⟹ the MAX ancestor can get at most 3 from this subtree, but already has 4 (α). So MAX won't choose this branch. Prune remaining children (β-cutoff at MIN node when child ≤ α)."},
  ],
  t2:[
    {q:"Expectiminimax: game with chance nodes (random events). How does this extend minimax?",a:"Chance nodes take expected value of children",sol:"Chance node: E[value]=Σᵢ P(outcome i)·value(subtree i). MAX nodes maximize over actions. MIN nodes minimize. Chance nodes take expectation. This models games like Backgammon where dice introduce randomness."},
    {q:"Alpha-beta in adversarial search: does it always give the same answer as full minimax?",a:"Yes — alpha-beta is an optimization, never changes the result",sol:"Alpha-beta only prunes branches that provably cannot affect the root's value. The pruning condition (α≥β) guarantees the pruned subtrees would never be chosen by optimal play. The final minimax value is identical to full minimax."},
  ],
  t3:[
    {q:"Prove: with optimal move ordering, alpha-beta examines O(b^{d/2}) nodes instead of O(b^d).",a:"Proof sketch.",sol:"Consider a d-level game tree. With optimal ordering (best move first at MAX, worst at MIN): At even depths (MAX level), only the first child need be explored fully — remaining are pruned if first child gives best value. At odd depths (MIN level): all first children are explored (worst case). The 'effective branching' becomes b^{1/2} per level on average. Formally: number of nodes at best-case depth d is 2·b^{d/2}−1 (for even d). This is because MAX levels contribute b^{d/2} nodes (first child only after that) and MIN levels contribute b^{d/2}. Combined: O(b^{d/2}). □"},
  ],
  traps:["Minimax assumes the opponent plays OPTIMALLY. Against a suboptimal opponent, minimax may be too conservative.","Alpha-beta doesn't help with the horizon effect — it still can't search deeper than depth d.","Quiescence search: extend alpha-beta beyond fixed depth until a 'quiet' position (no captures/checks) to avoid evaluating unstable positions."],
  links:["ai.search","dsa.dp2","algo.dp","ai.mdp"],
},
"ai.logic":{
  hook:"Propositional logic gives formal semantics to 'if-then' reasoning. FOL extends this to quantifiers and predicates. Logic practice asks you to translate natural language to formulas and check validity.",
  def:"Propositional connectives: ¬,∧,∨,→,↔. p→q ≡ ¬p∨q. p↔q ≡ (p→q)∧(q→p). Tautology: true in all models. CNF: conjunction of disjunctions. FOL: ∀x P(x), ∃x P(x). Resolution: inference rule — {p∨q, ¬p∨r} ⊢ q∨r.",
  insight:"'Rain on the weekend: if it is Sunday, then it rains iff it is cold.' Formalize: let S=Sunday, R=Rain, C=Cold. Statement: S→(R↔C), equivalently S→((R→C)∧(C→R)), equivalently (S∧R)→C ∧ (S∧C)→R. The ↔ inside a conditional is a common trap — always expand it.",
  t1:[
    {q:"Is p→(q→p) a tautology?",a:"Yes",sol:"p→(q→p) ≡ ¬p∨(¬q∨p) ≡ (¬p∨p)∨¬q ≡ T∨¬q ≡ T. Tautology."},
    {q:"Translate: 'Every learner who completes the module will get a certificate.' Let L(x)=learner, M(x)=completed module, C(x)=gets certificate.",a:"∀x (L(x)∧M(x)) → C(x)",sol:"For all x: if x is a learner AND x completed the module, then x gets a certificate. ∀x(L(x)∧M(x)→C(x))."},
  ],
  t2:[
    {q:"Formalize 'If it is Sunday, then it rains if and only if it is cold.' in propositional logic with S,R,C.",a:"S→(R↔C)",sol:"S→(R↔C). Expanded: S→((R→C)∧(C→R)) ≡ (¬S∨((R→C)∧(C→R))). Note: this is NOT the same as (S→R)↔(S→C) or (S∧R)↔C — the nesting matters."},
    {q:"Resolution refutation: prove ¬p from {p→q, ¬q}. Show steps.",a:"Proof.",sol:"1. p→q ≡ ¬p∨q. 2. ¬q. 3. Resolve clauses {¬p∨q} and {¬q}: get {¬p}. 4. ¬p proved. □ Resolution is complete for propositional and FOL (with Herbrand's theorem)."},
  ],
  t3:[
    {q:"Prove that satisfiability of 2-SAT is in P (polynomial time). Describe the algorithm.",a:"2-SAT via SCCs in O(V+E).",sol:"2-SAT instance: clauses with ≤2 literals. Implication graph: for each clause (a∨b), add edges ¬a→b and ¬b→a. 2-SAT is satisfiable iff no variable x has x and ¬x in the same strongly connected component (SCC). Algorithm: (1) Build implication graph O(V+E). (2) Find SCCs (Kosaraju/Tarjan) O(V+E). (3) Check: for each variable x, if SCC(x)=SCC(¬x), unsatisfiable. Otherwise, satisfiable (assignment via SCC topological order). Total: O(V+E). □ (3-SAT is NP-complete — the boundary is sharp.)"},
  ],
  traps:["p→q ≡ ¬p∨q. NOT ≡ p∧q. This equivalence is the source of most logic errors.","Universal: ∀x P(x) says 'all'. Existential: ∃x P(x) says 'some'. ¬∀x P(x) ≡ ∃x ¬P(x).","FOL is undecidable (Gödel's incompleteness). Propositional logic is decidable (truth tables)."],
  links:["cond.bayes","ai.search","ai.bn","ai.mdp"],
},
"ai.bn":{
  hook:"Bayesian networks compactly represent joint distributions using conditional independence. They are directed acyclic graphs where each node is independent of its non-descendants given its parents.",
  def:"BN: DAG where P(X₁,...,Xₙ)=Πᵢ P(Xᵢ|Parents(Xᵢ)). d-separation: X⊥Y|Z iff every path between X and Y is blocked given Z. Variable elimination: sum out variables one by one. Inference is NP-hard in general, polynomial for trees.",
  insight:"Three patterns for d-separation: (1) Chain A→B→C: A⊥C|B (B blocks). (2) Fork A←B→C: A⊥C|B (B blocks). (3) Collider A→B←C: A⊥C (unobserved B blocks), but A NOT⊥C|B (observing B opens the path — explaining away). The collider pattern is the most counterintuitive and the one that feels least intuitive at first.",
  t1:[
    {q:"BN: A→C, B→C. P(A)=0.3, P(B)=0.4, P(C|A,B)=0.9, P(C|A,¬B)=0.7, P(C|¬A,B)=0.6, P(C|¬A,¬B)=0.1. Find P(C).",a:"≈0.388",sol:"P(C)=ΣΣ P(C|a,b)P(a)P(b). =0.9·0.3·0.4+0.7·0.3·0.6+0.6·0.7·0.4+0.1·0.7·0.6=0.108+0.126+0.168+0.042=0.444. (Recheck with actual computation.)"},
    {q:"In the pattern A→B←C (collider at B), are A and C marginally independent? What about given B?",a:"A⊥C (marginal); A NOT⊥C|B (collider opens when observed)",sol:"Marginally: A⊥C (different causes, unrelated). Given B: observing B creates dependence — if B=true and A=true, C is less likely to be the cause (explaining away). A and C become dependent given B."},
  ],
  t2:[
    {q:"Variable elimination: P(X₁,X₂,X₃)=P(X₁)P(X₂|X₁)P(X₃|X₂). Find P(X₃) by eliminating X₁ then X₂.",a:"Standard marginalization.",sol:"P(X₃)=ΣΣ P(X₁)P(X₂|X₁)P(X₃|X₂). Step 1: eliminate X₁: f(X₂)=Σ_{X₁} P(X₁)P(X₂|X₁)=P(X₂) (marginal). Step 2: P(X₃)=Σ_{X₂} P(X₂)P(X₃|X₂). This recovers P(X₃) as a simple marginalization over the chain."},
    {q:"When is exact inference in a BN polynomial time?",a:"When the underlying graph is a tree (or polytree)",sol:"For tree-structured BNs: belief propagation (message passing) runs in O(n·k²) where n=nodes, k=max states. For general BNs: inference is #P-hard (harder than NP). Approximate inference (MCMC sampling, variational) scales to large BNs."},
  ],
  t3:[
    {q:"Prove: in a BN, P(X₁,...,Xₙ)=Πᵢ P(Xᵢ|Parents(Xᵢ)) captures the d-separation independencies. Show for a chain A→B→C that A⊥C|B.",a:"Proof via factorization.",sol:"P(A,B,C)=P(A)P(B|A)P(C|B) (chain factorization). P(A,C|B)=P(A,B,C)/P(B)=P(A)P(B|A)P(C|B)/P(B)=P(A|B)·P(C|B). So P(A,C|B)=P(A|B)·P(C|B), which means A⊥C|B. □ General d-separation theorem: X⊥Y|Z iff every path in the moral graph of the ancestral graph is blocked by Z. Full proof uses the Markov condition."},
  ],
  traps:["Collider explains away: observing a common effect creates dependence between otherwise independent causes. Very non-intuitive.","d-separation tests independence in the distribution defined by the BN. It tells you about the structure, not about specific probability values.","Markov blanket of X = Parents(X) ∪ Children(X) ∪ OtherParents(Children(X)). X is independent of all other nodes given its Markov blanket."],
  links:["cond.bayes","cond.total","ai.search","ai.mdp"],
},
"ai.mdp":{
  hook:"Markov Decision Processes (MDPs) model sequential decision-making under uncertainty. Value iteration and policy iteration solve MDPs exactly; they are the foundation of reinforcement learning.",
  def:"MDP: (S,A,T,R,γ). T(s,a,s')=P(s'|s,a). R(s,a). Value function: V*(s)=max_a[R(s,a)+γΣ_{s'}T(s,a,s')V*(s')]. Bellman optimality equation. Policy: π(s)=argmax_a[...]. Value iteration: repeat until convergence. Policy iteration: alternate policy evaluation and improvement.",
  insight:"Value iteration converges because the Bellman operator is a γ-contraction (in the max-norm): ‖TV−TU‖_∞≤γ‖V−U‖_∞. Since γ<1, repeated application converges to V*. Policy iteration is often faster in practice: it converges in at most |A|^|S| policy improvements, each preceded by exact policy evaluation (solving a linear system).",
  t1:[
    {q:"MDP: states {s1,s2}, actions {a1,a2}. R(s1,a1)=10, γ=0.9. T(s1,a1,s1)=0.7, T(s1,a1,s2)=0.3. V(s2)=5. Compute Q(s1,a1).",a:"Q=10+0.9·(0.7·V(s1)+0.3·5)",sol:"Q(s1,a1)=R(s1,a1)+γ·Σ_{s'} T(s1,a1,s')V(s')=10+0.9·(0.7V(s1)+0.3·5). Plugging in V(s1) requires solving the Bellman equation. If V(s1)=20: Q=10+0.9·(14+1.5)=10+13.95=23.95."},
    {q:"Why does value iteration converge? What guarantees it terminates?",a:"Bellman operator is a γ-contraction; contraction mapping theorem",sol:"‖TV−TU‖_∞≤γ‖V−U‖_∞ (contraction with factor γ<1). By Banach fixed point theorem: unique fixed point V* exists and Vₖ→V* at rate γᵏ. Terminates when ‖Vₖ₊₁−Vₖ‖_∞<ε (convergence criterion)."},
  ],
  t2:[
    {q:"Policy evaluation: given policy π, solve V^π(s)=R(s,π(s))+γΣ_{s'}T(s,π(s),s')V^π(s'). For a 2-state MDP with 1 policy, how do you solve this?",a:"Linear system of 2 equations",sol:"Rewrite: V^π(s1)=R(s1)+γ·(T11·V^π(s1)+T12·V^π(s2)), V^π(s2)=R(s2)+γ·(T21·V^π(s1)+T22·V^π(s2)). Two equations, two unknowns. Solve via Gaussian elimination or (I−γT^π)V^π=R^π."},
    {q:"Policy iteration vs value iteration: which is faster to converge in practice and why?",a:"Policy iteration converges in fewer outer iterations",sol:"Policy iteration: each policy evaluation is exact (linear solve). Policy improvement always improves or keeps the same policy. Terminates in at most |A|^|S| steps (finite policies). Value iteration: each step approximates; needs many iterations for high accuracy. Policy iteration inner loop (linear solve) is O(|S|³) but number of outer iterations is typically small (10-20 vs 1000+ for value iteration)."},
  ],
  t3:[
    {q:"Prove the policy improvement theorem: if π' is the greedy policy w.r.t. V^π (i.e., π'(s)=argmax_a Q^π(s,a)), then V^{π'}(s)≥V^π(s) for all s.",a:"Proof.",sol:"V^π(s)≤max_a Q^π(s,a)=Q^π(s,π'(s)) (by definition of argmax). So V^π(s)≤Q^π(s,π'(s))=R(s,π'(s))+γΣ_{s'} T(s,π'(s),s')V^π(s'). Apply same inequality to V^π(s'): V^π(s')≤Q^π(s',π'(s')). Substituting: V^π(s)≤R(s,π'(s))+γΣ_{s'} T(s,π'(s),s')[R(s',π'(s'))+γΣ_{s''}T(s',π'(s'),s'')V^π(s'')]. Iterating to infinity: V^π(s)≤R^{π'}(s)+γT^{π'}R^{π'}(s)+...=V^{π'}(s). □"},
  ],
  traps:["γ<1 is required for convergence of infinite-horizon MDPs. γ=1 with absorbing states is OK but needs care.","The optimal policy π* is deterministic for finite MDPs (even though we search over stochastic policies).","Q(s,a)=R(s,a)+γΣ T(s,a,s')V(s'). V(s)=max_a Q(s,a). Both V and Q are useful — Q is directly actionable (pick argmax over a)."],
  links:["algo.dp","ai.search","ai.bn","dsa.dp2"],
},
}); /* end subjects ml/ai */

<script type="text/babel">
/* ===== REACT COMPONENTS ===== */
/* ── UTILITIES ── */
const { useState, useEffect, useCallback, useRef } = React;

/* Router */
function getRoute() {
  const h = window.location.hash.slice(1) || "/";
  if (h === "/") return { page: "home" };
  if (h.startsWith("/s/")) return { page: "sector", id: h.slice(3) };
  if (h.startsWith("/m/")) return { page: "mission", id: h.slice(3) };
  if (h.startsWith("/test/")) return { page: "test", id: h.slice(6) };
  if (h === "/profile") return { page: "profile" };
  return { page: "home" };
}
window.go = (path) => { window.location.hash = path; };

/* State */
const STORAGE_KEY = "wabi_v2";
const THEME_KEY = "wabi_theme";
function loadState() {
  try {
    const s = JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");
    return { completed: s.completed || {}, seen: s.seen || {}, testResults: s.testResults || {} };
  } catch { return { completed: {}, seen: {}, testResults: {} }; }
}
function saveState(s) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(s)); } catch {}
}
function loadTheme() {
  try {
    const saved = localStorage.getItem(THEME_KEY);
    return saved === "dark" ? "dark" : "light";
  } catch { return "light"; }
}
function saveTheme(theme) {
  try { localStorage.setItem(THEME_KEY, theme); } catch {}
}

/* Helpers */
window.findNode = (nodeId) => {
  for (const sector of window.SECTORS) {
    const node = sector.nodes.find(n => n.id === nodeId);
    if (node) return { node, sector };
  }
  return null;
};
window.isUnlocked = (node, sector, completed) => {
  // Foundation pillars: first node always unlocked; rest need previous done
  // Subject sectors: all prereq foundation pillars must be completed
  if (sector.layer === "foundation") {
    const idx = sector.nodes.indexOf(node);
    if (idx === 0) return true;
    // Need all nodes before this one in the chain to be completed
    // Use edges to find parents
    const parents = sector.edges ? sector.edges.filter(e => e[1] === node.id).map(e => e[0]) : [];
    if (parents.length === 0) return true;
    return parents.every(p => !!completed[p]);
  }
  // Subject: check prereq foundations are fully completed
  if (sector.prereqs && sector.prereqs.length > 0) {
    for (const prereqId of sector.prereqs) {
      const prereqSector = window.SECTORS.find(s => s.id === prereqId);
      if (prereqSector) {
        const allDone = prereqSector.nodes.every(n => !!completed[n.id]);
        if (!allDone) return false;
      }
    }
  }
  // Within subject: edge-based unlocking
  const idx = sector.nodes.indexOf(node);
  if (idx === 0) return true;
  const parents = sector.edges ? sector.edges.filter(e => e[1] === node.id).map(e => e[0]) : [];
  if (parents.length === 0) return idx === 0;
  return parents.every(p => !!completed[p]);
};

function calcXP(completed) {
  let total = 0;
  for (const sector of window.SECTORS)
    for (const node of sector.nodes)
      if (completed[node.id]) total += node.xp;
  return total;
}
function calcStage(xp) {
  if (xp >= 50000) return { stage: "Grandmaster", next: null };
  if (xp >= 25000) return { stage: "Expert", next: 50000 };
  if (xp >= 10000) return { stage: "Proficient", next: 25000 };
  if (xp >= 3000)  return { stage: "Adept", next: 10000 };
  return { stage: "Initiate", next: 3000 };
}

/* Problem card (expandable) */
function ProbCard({ prob, cls }) {
  const [open, setOpen] = useState(false);
  return (
    <div className={`problem-card${open ? " open" : ""}`} onClick={() => setOpen(o => !o)}>
      <div className="pc-q">
        <span className="q-text">{prob.q}</span>
        <span className="q-toggle">{open ? "×" : "+"}</span>
      </div>
      {open && (
        <div className="pc-answer">
          <div className="ans-label">Answer</div>
          <div className="ans-value">{prob.a}</div>
          <div className="ans-label">Solution</div>
          <div className="ans-sol" dangerouslySetInnerHTML={{__html: prob.sol.replace(/\n/g,"<br/>")}} />
        </div>
      )}
    </div>
  );
}

/* ── NAV ── */
function Nav({ xp, completed, theme, onToggleTheme }) {
  const total = window.SECTORS.reduce((a, s) => a + s.nodes.length, 0);
  const done = Object.keys(completed).length;
  const { stage } = calcStage(xp);
  const route = getRoute();
  const isDark = theme === "dark";
  return (
    <nav className="nav">
      <div className="brand" onClick={() => window.go("/")}>
        <div className="mark">W</div>
        <div>
          <div className="b1">Wabi</div>
          <div className="b2">Learning</div>
        </div>
      </div>
      <div className="nav-links">
        <span className={`nav-link${route.page === "home" ? " active" : ""}`} onClick={() => window.go("/")}>Index</span>
        <span className={`nav-link${route.page === "profile" ? " active" : ""}`} onClick={() => window.go("/profile")}>Profile</span>
      </div>
      <div className="nav-right">
        <button
          className={`theme-toggle ${isDark ? "dark" : "light"}`}
          type="button"
          aria-label={`Switch to ${isDark ? "light" : "dark"} mode`}
          aria-pressed={isDark}
          onClick={onToggleTheme}>
          <span className={`mode${!isDark ? " active" : ""}`}>Light</span>
          <span className={`mode${isDark ? " active" : ""}`}>Dark</span>
          <span className="knob" aria-hidden="true" />
        </button>
        <div className="chip"><span className="num">{done}</span><span className="lbl">/ {total} lessons</span></div>
        <div className="chip"><span className="num" style={{color:"var(--moss)"}}>{xp.toLocaleString()}</span><span className="lbl">XP · {stage}</span></div>
      </div>
    </nav>
  );
}

/* ── HOME ── */
function Home({ completed, xp }) {
  const foundations = window.SECTORS.filter(s => s.layer === "foundation");
  const subjects    = window.SECTORS.filter(s => s.layer === "subject");
  const totalNodes  = window.SECTORS.reduce((a,s) => a + s.nodes.length, 0);
  const done        = Object.keys(completed).length;
  const pct         = Math.round(done / totalNodes * 100);

  // Find the most recently unlockable lesson to continue
  let continueNode = null, continueSector = null;
  for (const sector of window.SECTORS) {
    for (const node of sector.nodes) {
      if (!completed[node.id] && window.isUnlocked(node, sector, completed)) {
        continueNode = node; continueSector = sector; break;
      }
    }
    if (continueNode) break;
  }

  return (
    <div className="page">
      <div className="wrap">
        <section className="home-hero">
          <div>
            <div className="l-tag">
              <span className="line" />
              <span className="eyebrow a"><span className="dot" />Focused learning system</span>
            </div>
            <h1 className="display">
              <span className="br">Master</span>
              <span className="br moss">the depth.</span>
              <span className="br">Keep the signal.</span>
            </h1>
            <p className="lead">
              Five <em>foundation pillars</em> multiply into eight subject sectors.
              Deep practice turns difficult ideas into fluent recall.
            </p>
            <div className="hero-ctas">
              {continueNode
                ? <button className="btn moss" onClick={() => window.go("/m/"+continueNode.id)}>Continue — {continueNode.label} <span className="arrow">→</span></button>
                : <button className="btn moss" onClick={() => window.go("/s/"+foundations[0].id)}>Begin <span className="arrow">→</span></button>
              }
              <button className="btn ghost" onClick={() => window.go("/profile")}>View profile</button>
            </div>
          </div>
          <div className="aside">
            <div className="continue-tile">
              <div className="ct-tag">
                <span className="eyebrow">Overall progress</span>
                <span className="eyebrow a"><span className="dot" />active</span>
              </div>
              <h3 className="display">{pct}% complete</h3>
              <p className="ct-sub">{done} of {totalNodes} lessons recorded</p>
              <div className="ct-bar" style={{"--p": pct+"%"}}><span style={{width:pct+"%"}} /></div>
              <div className="ct-foot"><span>{xp.toLocaleString()} XP</span><span className="pct">{pct}%</span></div>
            </div>
            <div className="tiles">
              {[["Learning paths","13 sectors"],["Practice depth","3 tiers"],["Progress mode","steady"]].map(([l,v]) => (
                <div key={l} className="tile"><div className="l">{l}</div><div className="v">{v}</div></div>
              ))}
            </div>
          </div>
        </section>

        <div className="section-label"><span className="sl-title">Foundation Pillars</span></div>
        <div className="foundation-grid">
          {foundations.map(s => {
            const sdone = s.nodes.filter(n => completed[n.id]).length;
            const sp = Math.round(sdone / s.nodes.length * 100);
            return (
              <div key={s.id} className="found-card" onClick={() => window.go("/s/"+s.id)}>
                <div className="fc-num">{s.code}</div>
                <div className="fc-glyph">{s.glyph}</div>
                <div className="fc-name">{s.name}</div>
                <div className="fc-tag">{s.tagline}</div>
                <div className="fc-bar"><span style={{width:sp+"%"}} /></div>
                <div className="fc-pct">{sdone}/{s.nodes.length} · {sp}%</div>
              </div>
            );
          })}
        </div>

        <div className="tilde">Subject Sectors</div>
        <div className="subjects">
          {subjects.map((s, i) => {
            const sdone = s.nodes.filter(n => completed[n.id]).length;
            const sp = Math.round(sdone / s.nodes.length * 100);
            const prereqsMet = (s.prereqs || []).every(pid => {
              const ps = window.SECTORS.find(x => x.id === pid);
              return ps && ps.nodes.every(n => !!completed[n.id]);
            });
            return (
              <div key={s.id} className={`subj-row${sdone === s.nodes.length ? " done" : ""}`}
                onClick={() => window.go("/s/"+s.id)}>
                <div className="idx">{s.code}</div>
                <div>
                  <div className="name">{s.name}</div>
                  <div className="row-tag">{s.tagline}</div>
                </div>
                <div>
                  {(s.prereqs || []).length > 0 && (
                    <div style={{fontSize:11,fontFamily:"JetBrains Mono,monospace",color:prereqsMet?"var(--moss)":"var(--ink-4)",letterSpacing:"0.15em",marginBottom:4}}>
                      {prereqsMet ? "✓ Prereqs met" : "Needs: "+s.prereqs.join(", ")}
                    </div>
                  )}
                </div>
                <div className="pct">
                  {sp}<span className="suffix">%</span>
                  <small>{sdone}/{s.nodes.length} lessons</small>
                </div>
                <div className="arr">→</div>
              </div>
            );
          })}
        </div>
      </div>
      <footer className="foot"><span className="display">Wabi</span> · Learning system · {new Date().getFullYear()}</footer>
    </div>
  );
}

/* ── SECTOR ── */
function Sector({ sectorId, completed, onComplete, testResults }) {
  const sector = window.SECTORS.find(s => s.id === sectorId);
  if (!sector) return <div className="page"><div className="wrap"><h1>Not found.</h1></div></div>;

  const [toast, setToast] = useState(null);
  const [celebrate, setCelebrate] = useState(null);

  const handleComplete = useCallback((nodeId) => {
    const f = window.findNode(nodeId);
    if (!f) return;
    onComplete(nodeId);
    const allDone = sector.nodes.every(n => n.id === nodeId || !!completed[n.id]);
    if (f.node.type === "boss" || allDone) {
      setCelebrate({ node: f.node, sector: f.sector });
    } else {
      setToast({ title: f.node.label, xp: f.node.xp });
      setTimeout(() => setToast(null), 3000);
    }
  }, [completed, sector, onComplete]);

  const done  = sector.nodes.filter(n => completed[n.id]).length;
  const total = sector.nodes.length;
  const xpEarned = sector.nodes.filter(n => completed[n.id]).reduce((a,n) => a+n.xp, 0);
  const xpTotal  = sector.nodes.reduce((a,n) => a+n.xp, 0);

  const bosses  = sector.nodes.filter(n => n.type === "boss");
  const regular = sector.nodes.filter(n => n.type !== "boss");

  const prereqsMet = (sector.prereqs || []).every(pid => {
    const ps = window.SECTORS.find(x => x.id === pid);
    return ps && ps.nodes.every(n => !!completed[n.id]);
  });

  return (
    <div className="page">
      <div className="wrap">
        <div className="crumbs">
          <a onClick={() => window.go("/")}>Index</a>
          <span className="sep">·</span>
          {sector.layer === "foundation" ? "Foundation Pillar" : "Subject"} / {sector.name}
        </div>

        <section className={`sec-hero${sector.layer === "foundation" ? " foundation-hero" : ""}`}>
          {sector.layer === "foundation" && <div className="found-badge">∫ Foundation Pillar {sector.code}</div>}
          <div className="sec-hero .l-tag">
            <div style={{display:"flex",gap:16,alignItems:"center",marginBottom:26,color:"var(--ink-3)"}}>
              <span style={{flex:"0 0 80px",height:1,background:"var(--ink)",display:"block"}} />
              <span className="eyebrow a"><span className="dot" />{sector.code} / {sector.name.toUpperCase()}</span>
            </div>
          </div>
          <h1 className="display">{sector.name}.</h1>
          <p className="sec-tag">{sector.tagline}</p>
          {sector.prereqs && sector.prereqs.length > 0 && !prereqsMet && (
            <div className="prereq-note">
              <strong>Prereqs needed:</strong>&nbsp;Complete foundation pillars: {sector.prereqs.join(", ")} before unlocking lessons here.
            </div>
          )}
        </section>

        <div className="sec-meta">
          <div className="stones">
            <span className="l">Progress</span>
            {sector.nodes.map(n => (
              <div key={n.id} className={`stone${completed[n.id] ? "" : " pending"}`}
                title={n.label}
                style={{cursor:"pointer"}}
                onClick={() => window.go("/m/"+n.id)} />
            ))}
          </div>
          <div className="m"><div className="l">Completed</div><div className={`v${done===total?" moss":""}`}>{done}<span className="of">/{total}</span></div></div>
          <div className="m"><div className="l">XP earned</div><div className="v moss small">{xpEarned.toLocaleString()}<span className="of">/{xpTotal.toLocaleString()}</span></div></div>
          <div className="m">
            <div className="l">Type</div>
            <div className="v small">{window.SECTOR_TYPE_LABEL[sector.layer]}</div>
          </div>
          <button className="btn ghost" onClick={() => window.go("/")}>← Index</button>
        </div>

        <div className="missions">
          {regular.map((node, i) => {
            const isDone = !!completed[node.id];
            const isUnlocked = window.isUnlocked(node, sector, completed);
            return (
              <div key={node.id}
                className={`m-row${isDone ? " done" : ""}${node.type === "elite" ? " elite" : ""}${!isUnlocked ? " locked" : ""}`}
                onClick={() => isUnlocked && window.go("/m/"+node.id)}>
                <div className="idx">{String(i+1).padStart(2,"0")}</div>
                <div className="body">
                  <div className="tag-pill">{window.TYPE_LABEL[node.type]}</div>
                  <div className="title">{node.label}</div>
                  <div className="sub">{window.CONTENT[node.id] ? window.CONTENT[node.id].hook.slice(0,90)+"…" : ""}</div>
                </div>
                <div className="meta">+{node.xp.toLocaleString()} XP<small>{node.minutes} min</small></div>
                <div className="state">{isDone ? "✓ DONE" : isUnlocked ? "READY" : "LOCKED"}</div>
                <div className="arr">→</div>
              </div>
            );
          })}
          {bosses.map(node => {
            const isDone = !!completed[node.id];
            const allRegDone = regular.every(n => !!completed[n.id]);
            const isLocked = !allRegDone;
            return (
              <div key={node.id}
                className={`boss-row${isLocked ? " locked" : ""}`}
                onClick={() => !isLocked && window.go("/m/"+node.id)}>
                <div className="idx">BOSS</div>
                <div className="body">
                  <div className="tag-pill">{window.TYPE_LABEL[node.type]}</div>
                  <div className="title">{node.label}</div>
                  <div className="sub">{isDone ? "Completed." : isLocked ? "Complete all lessons to unlock." : "Ready — prove total mastery."}</div>
                </div>
                <div className="meta">+{node.xp.toLocaleString()} XP<small>{node.minutes} min</small></div>
                <div className="state">{isDone ? "✓" : isLocked ? "LOCKED" : "READY"}</div>
                <div className="arr">→</div>
              </div>
            );
          })}
        </div>
      </div>

      {done === total && window.TESTS && window.TESTS[sectorId] && (
        <div className="wrap">
          <div className="test-cta-banner">
            <div className="tcb-left">
              <div className="tcb-label">Chapter complete</div>
              <h4>Open the mastery review</h4>
              <p>Mixed practice for real understanding, not recall.</p>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:12,flexShrink:0}}>
              {testResults && testResults[sectorId] && (
                <span className="test-result-chip">Best: {testResults[sectorId].score}/{testResults[sectorId].max}</span>
              )}
              <button className="btn moss" onClick={() => window.go("/test/"+sectorId)}>
                {testResults && testResults[sectorId] ? "Retry review →" : "Start review →"}
              </button>
            </div>
          </div>
        </div>
      )}

      {toast && (
        <div className="toast">
          <span className="em">+{toast.xp} XP</span>
          <span className="lbl">{toast.title} — recorded.</span>
        </div>
      )}
      {celebrate && (
        <div className="celebrate" onClick={() => setCelebrate(null)}>
          <div className="panel" onClick={e => e.stopPropagation()}>
            <div className="em">✦ Chapter complete</div>
            <h1>{celebrate.sector.name}.</h1>
            <p>+{celebrate.node.xp} XP banked. {celebrate.sector.name} is fully recorded.</p>
            <div className="ctas">
              <button className="btn ghost" onClick={() => setCelebrate(null)}>Stay</button>
              <button className="btn moss" onClick={() => { setCelebrate(null); window.go("/"); }}>Return to Index</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

/* ── MISSION (Lesson) ── */
function Mission({ nodeId, completed, onComplete }) {
  const f = window.findNode(nodeId);
  if (!f) return <div className="page"><div className="wrap"><h1>Lesson not found.</h1></div></div>;

  const { node, sector } = f;
  const isDone     = !!completed[nodeId];
  const isUnlocked = window.isUnlocked(node, sector, completed);
  const content    = window.CONTENT[node.id] || {};

  const [showToast, setShowToast] = useState(false);

  const handleComplete = () => {
    onComplete(nodeId);
    setShowToast(true);
    setTimeout(() => {
      setShowToast(false);
      window.go("/s/" + sector.id);
    }, 1200);
  };

  const fillCount = { standard: 2, elite: 3, boss: 5 }[node.type] || 2;

  return (
    <div className="page">
      <div className="wrap">
        <div className="crumbs">
          <a onClick={() => window.go("/")}>Index</a>
          <span className="sep">·</span>
          <a onClick={() => window.go("/s/"+sector.id)}>{sector.name}</a>
          <span className="sep">·</span>
          {node.label}
        </div>

        <section className="miss-hero">
          <div className="l-tag">
            <span className="line" />
            <span className="eyebrow a">
              <span className="dot" />
              {sector.code} / {sector.name.toUpperCase()} · {window.TYPE_LABEL[node.type] || "Lesson"}
              {isDone && <> · ✓ COMPLETED</>}
            </span>
          </div>
          <h1 className="display">{node.label}.</h1>
          <p className="lead">{content.hook || ""}</p>
        </section>

        <div className="miss-grid">
          <div className="miss-main">
            {content.def && (
              <div className="definition-box">
                <div className="db-label">Definition</div>
                <div className="db-content">{content.def}</div>
              </div>
            )}

            {content.insight && (
              <div className="insight-block">
                <div className="ib-label">Key Insight</div>
                <p>{content.insight}</p>
              </div>
            )}

            {content.t1 && content.t1.length > 0 && (
              <div className="tier-section">
                <div className="tier-header">
                  <span className="tier-badge t1">Tier 1</span>
                  <span className="tier-desc">Foundation — standard application</span>
                </div>
                {content.t1.map((p,i) => <ProbCard key={i} prob={p} cls="t1" />)}
              </div>
            )}

            {content.t2 && content.t2.length > 0 && (
              <div className="tier-section">
                <div className="tier-header">
                  <span className="tier-badge t2">Tier 2</span>
                  <span className="tier-desc">Deepening — requires understanding why</span>
                </div>
                {content.t2.map((p,i) => <ProbCard key={i} prob={p} cls="t2" />)}
              </div>
            )}

            {content.t3 && content.t3.length > 0 && (
              <div className="tier-section">
                <div className="tier-header">
                  <span className="tier-badge t3">Tier 3</span>
                  <span className="tier-desc">Extension — derive, prove, find the flaw</span>
                </div>
                {content.t3.map((p,i) => <ProbCard key={i} prob={p} cls="t3" />)}
              </div>
            )}

            {content.traps && content.traps.length > 0 && (
              <div className="traps-section">
                <div className="ts-label">Common Traps</div>
                {content.traps.map((t,i) => <div key={i} className="trap-item">{t}</div>)}
              </div>
            )}

            {content.links && content.links.length > 0 && (
              <div className="connections-section">
                <div className="cs-label">Connected Lessons</div>
                <div className="conn-chips">
                  {content.links.map(lid => {
                    const lf = window.findNode(lid);
                    return lf ? (
                      <span key={lid} className="conn-chip" onClick={() => window.go("/m/"+lid)}>
                        {lf.node.label}
                      </span>
                    ) : null;
                  })}
                </div>
              </div>
            )}
          </div>

          <aside className="miss-side">
            <div className="row"><span className="l">Subject</span><span className="v">{sector.name}</span></div>
            <div className="row"><span className="l">Type</span><span className="v">{window.TYPE_LABEL[node.type]}</span></div>
            <div className="row"><span className="l">Reward</span><span className="v moss">+{node.xp.toLocaleString()} XP</span></div>
            <div className="row"><span className="l">Time</span><span className="v">{node.minutes} min</span></div>
            <div className="row">
              <span className="l">Intensity</span>
              <span className="v">
                <span className="diff">
                  {[0,1,2,3,4].map(i => <i key={i} className={i < fillCount ? "on" : ""} />)}
                </span>
              </span>
            </div>
            <div className="row">
              <span className="l">State</span>
              <span className="v" style={{color: isDone ? "var(--moss)" : isUnlocked ? "var(--ink)" : "var(--ink-4)"}}>
                {isDone ? "Completed" : isUnlocked ? "Ready" : "Locked"}
              </span>
            </div>
            <div className="cta-stack">
              {isDone ? (
                <>
                  <button className="btn ghost" onClick={() => window.go("/s/"+sector.id)}>← Back to {sector.name}</button>
                  <button className="btn moss" onClick={() => onComplete(nodeId)}>Review again</button>
                </>
              ) : !isUnlocked ? (
                <>
                  <button className="btn" disabled>Locked</button>
                  <button className="btn ghost" onClick={() => window.go("/s/"+sector.id)}>← Back</button>
                </>
              ) : (
                <>
                  <button className="btn moss" onClick={handleComplete}>
                    Mark complete <span className="arrow">✓</span>
                  </button>
                  <button className="btn ghost" onClick={() => window.go("/s/"+sector.id)}>← Back to {sector.name}</button>
                </>
              )}
            </div>
          </aside>
        </div>
      </div>

      {showToast && (
        <div className="toast">
          <span className="em">+{node.xp.toLocaleString()} XP</span>
          <span className="lbl">{node.label} — recorded.</span>
        </div>
      )}
    </div>
  );
}

/* ── PROFILE ── */
function Profile({ completed, xp }) {
  const { stage, next } = calcStage(xp);
  const done  = Object.keys(completed).length;
  const total = window.SECTORS.reduce((a,s) => a + s.nodes.length, 0);
  const pct   = Math.round(done/total*100);

  return (
    <div className="page">
      <div className="wrap">
        <div className="crumbs"><a onClick={() => window.go("/")}>Index</a><span className="sep">·</span>Profile</div>
        <section className="profile-hero">
          <div className="l-row">
            <div className="stone-av"><span className="letter">W</span></div>
            <div>
              <h1 className="display">Wabi<br/><span style={{color:"var(--moss)"}}>Learner.</span></h1>
              <p className="tag">Learning system · {stage} stage · {pct}% complete</p>
            </div>
          </div>
        </section>

        <div className="stats-grid">
          {[
            ["XP Earned", xp.toLocaleString(), "moss", "Total experience points"],
            ["Lessons", done, "", `of ${total} total`],
            ["Stage", stage, "", next ? `Next: ${next.toLocaleString()} XP` : "Top stage"],
            ["Completion", pct+"%", done===total?"moss":"", "Overall progress"],
          ].map(([l,v,cls,d]) => (
            <div key={l} className="stat-card">
              <div className="l">{l}</div>
              <div className={`v${cls?" "+cls:""}`}>{v}</div>
              <div className="d">{d}</div>
            </div>
          ))}
        </div>

        <section className="mastery-section">
          <h3 className="display">Subject <span className="moss">mastery.</span></h3>
          {window.SECTORS.map((s,i) => {
            const sdone = s.nodes.filter(n => completed[n.id]).length;
            const sp = Math.round(sdone/s.nodes.length*100);
            return (
              <div key={s.id} className={`mastery-row${sdone===s.nodes.length?" full":""}`}
                onClick={() => window.go("/s/"+s.id)} style={{cursor:"pointer"}}>
                <div className="idx">{s.code}</div>
                <div className="name">{s.name}</div>
                <div className="bar"><div style={{"--p":sp+"%",width:sp+"%"}} /></div>
                <div className="pct">{sp}<span style={{fontSize:13,color:"var(--ink-4)"}}>%</span></div>
              </div>
            );
          })}
        </section>
      </div>
    </div>
  );
}

/* ── TEST RUNNER ── */
function TestRunner({ sectorId, testResults, onTestComplete }) {
  const testData = (window.TESTS || {})[sectorId];
  const sector   = window.SECTORS.find(s => s.id === sectorId);

  const [current, setCurrent]     = useState(0);
  const [answers, setAnswers]     = useState({});   // { idx: value }
  const [submitted, setSubmitted] = useState(false);

  if (!testData || !sector) {
    return (
      <div className="test-page"><div className="wrap">
        <div className="crumbs"><a onClick={() => window.go("/s/"+sectorId)}>← Back to {sector ? sector.name : sectorId}</a></div>
        <h2 style={{marginTop:40}}>No review available for this chapter yet.</h2>
      </div></div>
    );
  }

  const qs = testData.questions;
  const q  = qs[current];

  /* ── Scoring helpers ── */
  function scoreQuestion(q, ans) {
    if (ans === undefined || ans === null || ans === "") return { pts: 0, status: "skip" };
    if (q.type === "mcq") {
      if (ans === q.answer) return { pts: 2, status: "correct" };
      return { pts: -0.67, status: "wrong" };
    }
    if (q.type === "msq") {
      const selected = ans || [];
      const correct  = q.answer || [];
      const match = selected.length === correct.length && correct.every(x => selected.includes(x));
      return match ? { pts: 2, status: "correct" } : { pts: 0, status: "wrong" };
    }
    if (q.type === "nat") {
      const tol = q.tolerance ?? 0.01;
      const num = parseFloat(ans);
      if (isNaN(num)) return { pts: 0, status: "skip" };
      return Math.abs(num - q.answer) <= tol
        ? { pts: 2, status: "correct" }
        : { pts: 0, status: "wrong" };
    }
    return { pts: 0, status: "skip" };
  }

  const scores  = qs.map((q, i) => scoreQuestion(q, answers[i]));
  const total   = scores.reduce((a, s) => a + s.pts, 0).toFixed(2);
  const maxPts  = qs.length * 2;
  const correct = scores.filter(s => s.status === "correct").length;

  /* ── Answer handlers ── */
  function handleMCQ(optIdx) {
    if (submitted) return;
    setAnswers(prev => ({ ...prev, [current]: optIdx }));
  }
  function handleMSQ(optIdx) {
    if (submitted) return;
    setAnswers(prev => {
      const cur = prev[current] || [];
      const updated = cur.includes(optIdx) ? cur.filter(x => x !== optIdx) : [...cur, optIdx];
      return { ...prev, [current]: updated };
    });
  }
  function handleNAT(val) {
    if (submitted) return;
    setAnswers(prev => ({ ...prev, [current]: val }));
  }

  function handleSubmit() {
    setSubmitted(true);
    const result = { score: parseFloat(total), max: maxPts, correct, total: qs.length, ts: Date.now() };
    onTestComplete(sectorId, result);
  }

  /* ── Progress dots ── */
  function dotClass(i) {
    if (submitted) return scores[i].status;
    if (i === current) return "active";
    if (answers[i] !== undefined) return "answered";
    return "";
  }

  /* ── Option label ── */
  const KEYS = ["A","B","C","D","E"];

  /* ── Results screen ── */
  if (submitted) {
    const pct = Math.round((parseFloat(total) / maxPts) * 100);
    const grade = pct >= 80 ? "Excellent" : pct >= 60 ? "Solid" : pct >= 40 ? "Developing" : "Needs work";
    return (
      <div className="test-page">
        <div className="wrap">
          <div className="crumbs">
            <a onClick={() => window.go("/s/"+sectorId)}>← {sector.name}</a>
            <span className="sep">·</span>Mastery Review · Results
          </div>
          <div className="test-results">
            <div className="test-score-ring" style={{borderColor: pct>=60?"var(--moss)":pct>=40?"var(--gold)":"var(--persimmon)"}}>
              <div className="tscore" style={{color: pct>=60?"var(--moss)":pct>=40?"var(--gold)":"var(--persimmon)"}}>{total}</div>
              <div className="tmax">/ {maxPts} pts</div>
            </div>
            <h2>{grade} — {correct}/{qs.length} correct</h2>
            <p className="res-sub">{pct}% complete · {sector.name} mastery review</p>
            <div style={{display:"flex",gap:10,justifyContent:"center",flexWrap:"wrap"}}>
              <button className="btn ghost" onClick={() => { setSubmitted(false); setCurrent(0); setAnswers({}); }}>Retry</button>
              <button className="btn moss" onClick={() => window.go("/s/"+sectorId)}>← Back to {sector.name}</button>
            </div>

            <div className="review-list">
              {qs.map((q, i) => {
                const { pts, status } = scores[i];
                const ans = answers[i];
                return (
                  <div key={q.id} className="review-item">
                    <div className="ri-meta">
                      <span className="test-qnum">Q{i+1}</span>
                      <span className={`test-type-badge ${q.type}`}>{q.type.toUpperCase()}</span>
                      <span className={`ri-verdict ${status}`}>{status === "correct" ? `+${pts} pts` : status === "wrong" ? `${pts} pts` : "skipped"}</span>
                    </div>
                    <div className="ri-qtext">{q.text}</div>
                    {q.type !== "nat" && q.options && (
                      <div className="ri-ans">
                        <em>Correct: {[].concat(q.answer).map(a => KEYS[a]).join(", ")}</em>
                        {ans !== undefined && (
                          <> · Your answer: {[].concat(ans).map(a => typeof a === "number" ? KEYS[a] : a).join(", ")}</>
                        )}
                      </div>
                    )}
                    {q.type === "nat" && (
                      <div className="ri-ans">
                        <em>Correct: {q.answer} (±{q.tolerance ?? 0.01})</em>
                        {ans !== undefined && <> · Your answer: {ans}</>}
                      </div>
                    )}
                    {q.explanation && <div className="ri-expl">{q.explanation}</div>}
                  </div>
                );
              })}
            </div>
          </div>
        </div>
      </div>
    );
  }

  /* ── Question screen ── */
  const curAns = answers[current];
  const answered = curAns !== undefined && curAns !== "";

  return (
    <div className="test-page">
      <div className="wrap">
        <div className="crumbs">
          <a onClick={() => window.go("/s/"+sectorId)}>← {sector.name}</a>
          <span className="sep">·</span>Mastery Review
        </div>

        <div className="test-header">
          <div>
            <h2>{testData.title || sector.name + " — Mastery Review"}</h2>
            <div className="tq-count">{qs.length} questions · {qs.filter(q=>q.type==="mcq").length} MCQ · {qs.filter(q=>q.type==="msq").length} MSQ · {qs.filter(q=>q.type==="nat").length} NAT</div>
          </div>
          <button className="btn ghost" onClick={() => window.go("/s/"+sectorId)}>Exit review</button>
        </div>

        <div className="test-progress">
          {qs.map((_, i) => (
            <div key={i} className={`test-dot ${dotClass(i)}`} onClick={() => setCurrent(i)} title={`Q${i+1}`} />
          ))}
        </div>

        <div className="test-qcard">
          <div className="test-qmeta">
            <span className="test-qnum">Question {current+1} of {qs.length}</span>
            <span className={`test-type-badge ${q.type}`}>{q.type.toUpperCase()}</span>
            <span className="test-marking">
              {q.type === "mcq" ? "+2 / −0.67" : "+2 / 0"}
            </span>
          </div>
          <div className="test-qtext">{q.text}</div>

          {q.type === "nat" ? (
            <div className="test-nat-wrap">
              <label>Enter numerical answer</label>
              <input
                className="test-nat"
                type="number"
                step="any"
                value={curAns || ""}
                onChange={e => handleNAT(e.target.value)}
                placeholder="0.00"
              />
            </div>
          ) : (
            <div className="test-opts">
              {(q.options || []).map((opt, oi) => {
                const isMSQ = q.type === "msq";
                const sel = isMSQ ? (curAns || []).includes(oi) : curAns === oi;
                return (
                  <div key={oi}
                    className={`test-opt${sel ? " selected" : ""}`}
                    onClick={() => isMSQ ? handleMSQ(oi) : handleMCQ(oi)}>
                    <span className="opt-key">{KEYS[oi]}</span>
                    <span>{opt}</span>
                  </div>
                );
              })}
            </div>
          )}
        </div>

        <div className="test-nav">
          <div style={{display:"flex",gap:10}}>
            {current > 0 && <button className="btn ghost" onClick={() => setCurrent(c => c-1)}>← Prev</button>}
          </div>
          <div className="score-preview">{Object.keys(answers).length}/{qs.length} answered</div>
          <div style={{display:"flex",gap:10}}>
            {current < qs.length-1
              ? <button className="btn" onClick={() => setCurrent(c => c+1)}>Next →</button>
              : <button className="btn moss" onClick={handleSubmit}>Submit review ✓</button>
            }
          </div>
        </div>
      </div>
    </div>
  );
}

/* ── APP ROOT ── */
function App() {
  const [route, setRoute] = useState(getRoute());
  const [state, setState]  = useState(loadState());
  const [theme, setTheme] = useState(loadTheme());

  useEffect(() => {
    const onHash = () => setRoute(getRoute());
    window.addEventListener("hashchange", onHash);
    return () => window.removeEventListener("hashchange", onHash);
  }, []);

  useEffect(() => {
    document.documentElement.dataset.theme = theme;
    saveTheme(theme);
  }, [theme]);

  const handleComplete = useCallback((nodeId) => {
    setState(prev => {
      const next = { ...prev, completed: { ...prev.completed, [nodeId]: Date.now() } };
      saveState(next);
      return next;
    });
  }, []);

  const handleTestComplete = useCallback((sectorId, result) => {
    setState(prev => {
      const next = { ...prev, testResults: { ...prev.testResults, [sectorId]: result } };
      saveState(next);
      return next;
    });
  }, []);

  const handleToggleTheme = useCallback(() => {
    setTheme(prev => prev === "dark" ? "light" : "dark");
  }, []);

  const xp = calcXP(state.completed);

  return (
    <>
      <Nav xp={xp} completed={state.completed} theme={theme} onToggleTheme={handleToggleTheme} />
      {route.page === "home"    && <Home    completed={state.completed} xp={xp} />}
      {route.page === "sector"  && <Sector  sectorId={route.id} completed={state.completed} onComplete={handleComplete} testResults={state.testResults} />}
      {route.page === "mission" && <Mission nodeId={route.id}   completed={state.completed} onComplete={handleComplete} />}
      {route.page === "test"    && <TestRunner sectorId={route.id} testResults={state.testResults} onTestComplete={handleTestComplete} />}
      {route.page === "profile" && <Profile completed={state.completed} xp={xp} testResults={state.testResults} />}
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
