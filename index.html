  ],
  t3:[
    {q:"Prove inclusion-exclusion P(A∪B)=P(A)+P(B)−P(A∩B) directly from the three Kolmogorov axioms — without using any derived results.",a:"Direct proof from axioms.",sol:"Write A∪B = A ∪ (B\\A). These are disjoint, so axiom 3 gives P(A∪B)=P(A)+P(B\\A). Write B=(A∩B)∪(B\\A), also disjoint, so P(B)=P(A∩B)+P(B\\A), hence P(B\\A)=P(B)−P(A∩B). Substituting: P(A∪B)=P(A)+P(B)−P(A∩B). □ Note: P(B\\A)≥0 is required for P(A∩B)≤P(B) — this is monotonicity, also provable from axioms."},
  ],
  traps:["Using P(A)+P(B) without checking disjointness double-counts the overlap.","C(n,k) for unordered; P(n,k) for ordered. Wrong choice gives an answer off by k!.","Inclusion-exclusion for 3 sets adds back P(A∩B∩C): P(A∪B∪C)=ΣP−ΣP(∩)+P(A∩B∩C)."],
  links:["cond.cond","cond.bayes","prob.rv"],
},
"cond.cond":{
  hook:"Conditioning reduces the sample space. P(A|B) asks: given B occurred, what fraction of B is also in A?",
  def:"P(A|B) = P(A∩B)/P(B) for P(B)>0. Multiplication rule: P(A∩B)=P(A|B)·P(B)=P(B|A)·P(A). These two forms of the product rule are the building blocks of all Bayesian reasoning.",
  insight:"P(A|B) ≠ P(B|A) in general — their ratio is P(A)/P(B). This asymmetry causes most real-world reasoning errors. When a question says 'given that...', immediately write P(A∩B)/P(B) — don't try to reason about it verbally.",
  t1:[
    {q:"P(A∩B)=0.12, P(B)=0.4. Find P(A|B).",a:"0.3",sol:"P(A|B)=P(A∩B)/P(B)=0.12/0.4=0.3."},
    {q:"A fair die is rolled. Given the result is even, find P(result ≥ 4).",a:"2/3",sol:"Even={2,4,6}. Within this, ≥4 means {4,6}. P=2/3."},
  ],
  t2:[
    {q:"40% study math (M), 30% physics (P), 15% both. Given a student studies physics, find P(also studies math).",a:"0.5",sol:"P(M|P)=P(M∩P)/P(P)=0.15/0.30=0.5."},
    {q:"Cards drawn without replacement. P(2nd card is an Ace | 1st card is an Ace)?",a:"3/51 = 1/17",sol:"Given 1st is Ace: 51 cards remain, 3 are Aces. P=3/51=1/17. This is a direct application of conditional probability — the 'given' clause changes the sample space from 52 to 51 cards."},
  ],
  t3:[
    {q:"Prove that P(·|B) satisfies all three Kolmogorov axioms, i.e., conditional probability is a valid probability measure on B.",a:"Proof.",sol:"Let Q(A)=P(A|B)=P(A∩B)/P(B). (1) Q(A)≥0 since P(A∩B)≥0 and P(B)>0. (2) Q(Ω)=P(Ω∩B)/P(B)=P(B)/P(B)=1. (3) For disjoint A,C: Q(A∪C)=P((A∪C)∩B)/P(B)=P((A∩B)∪(C∩B))/P(B). Since A,C disjoint, A∩B and C∩B are disjoint, so =[P(A∩B)+P(C∩B)]/P(B)=Q(A)+Q(C). □"},
  ],
  traps:["P(A|B) and P(B|A) are different. Never swap them — use Bayes if you need the other direction.","P(A|B)=P(A) only when A and B are independent. Don't assume independence without checking.","After conditioning on B, the new sample space is B. Every derived result about conditional probabilities follows from this reframing."],
  links:["cond.total","cond.bayes","cond.indep"],
},
"cond.total":{
  hook:"When you can't compute P(A) directly, partition the sample space into cases and sum. This is the computational engine behind Bayes.",
  def:"If B₁,...,Bₙ partition Ω (disjoint, exhaustive, each P(Bᵢ)>0), then P(A)=Σᵢ P(A|Bᵢ)·P(Bᵢ). Equivalently: P(A)=Σᵢ P(A∩Bᵢ) — the event A is split across the partition.",
  insight:"The law of total probability is usually applied in two steps: (1) Choose a natural partition (e.g., disease/healthy, machine 1/2/3, even/odd roll). (2) Compute P(A|Bᵢ) for each piece. The sum gives P(A). This is what the denominator of Bayes' formula computes.",
  t1:[
    {q:"Factory: Line A (60% output, 5% defect), Line B (40% output, 2% defect). Find P(defect).",a:"0.038",sol:"P(D)=P(D|A)·P(A)+P(D|B)·P(B)=0.05×0.6+0.02×0.4=0.030+0.008=0.038."},
    {q:"P(A|B)=0.3, P(A|Bᶜ)=0.6, P(B)=0.4. Find P(A).",a:"0.48",sol:"P(A)=0.3×0.4+0.6×0.6=0.12+0.36=0.48."},
  ],
  t2:[
    {q:"Three boxes — Box1: 3R,2B; Box2: 1R,4B; Box3: 2R,2B — chosen uniformly. Find P(Red).",a:"13/30",sol:"P(R)=P(R|B1)/3+P(R|B2)/3+P(R|B3)/3=(3/5+1/5+2/4)/3=(0.6+0.2+0.5)/3=1.3/3=13/30."},
    {q:"N~Uniform{1,2,3,4}. X|N=n ~ Geometric(1/n). Find P(X=1).",a:"25/48",sol:"P(X=1)=Σₙ P(X=1|N=n)·P(N=n)=Σₙ (1/n)·(1/4)=(1/4)(1+1/2+1/3+1/4)=(1/4)(25/12)=25/48."},
  ],
  t3:[
    {q:"Prove: if {Bᵢ} is a finite partition of Ω with P(Bᵢ)>0, then P(A)=Σᵢ P(A|Bᵢ)·P(Bᵢ) from first principles.",a:"Proof.",sol:"A = A∩Ω = A∩(∪ᵢBᵢ) = ∪ᵢ(A∩Bᵢ). Since Bᵢ are disjoint, {A∩Bᵢ} are also disjoint. By countable additivity: P(A)=Σᵢ P(A∩Bᵢ). Apply multiplication rule: P(A∩Bᵢ)=P(A|Bᵢ)·P(Bᵢ). Therefore P(A)=Σᵢ P(A|Bᵢ)·P(Bᵢ). □"},
  ],
  traps:["The Bᵢ must be exhaustive (union=Ω) AND disjoint — missing either breaks the law.","This law sums P(A|Bᵢ)·P(Bᵢ). Never sum P(Bᵢ|A)·P(Bᵢ) — that's not a valid operation.","The denominator P(E) in Bayes' theorem is exactly this law applied to the evidence E."],
  links:["cond.cond","cond.bayes","cond.texp"],
},
"cond.bayes":{
  hook:"Bayes' theorem inverts conditional probability: it converts P(data|hypothesis) into P(hypothesis|data). It is the mathematical foundation of all probabilistic inference.",
  def:"P(H|E) = P(E|H)·P(H) / P(E). Prior P(H) → multiply by likelihood P(E|H) → divide by evidence P(E)=ΣP(E|Hᵢ)P(Hᵢ) → posterior P(H|E). Odds form: posterior odds = likelihood ratio × prior odds.",
  insight:"The base rate P(H) dominates when evidence is weak. A 99%-accurate test for a 1-in-10,000 disease gives only ~1% posterior — because false positives from the vast healthy population swamp true positives. This base-rate neglect is the most common reasoning error in medicine, law, and everyday probability alike.",
  t1:[
    {q:"Disease prevalence 1%. Test: sensitivity=95%, specificity=90%. Find P(disease | positive test).",a:"≈8.7%",sol:"P(+)=0.95×0.01+0.10×0.99=0.0095+0.099=0.1085. P(D|+)=0.0095/0.1085≈0.0876. The low base rate makes the posterior far below 50% even with a good test."},
    {q:"Bag A: 4W,2B; Bag B: 3W,3B. Bag chosen randomly, ball drawn is White. Find P(Bag A was chosen).",a:"4/7",sol:"P(W|A)=2/3, P(W|B)=1/2. P(W)=(2/3+1/2)/2=7/12. P(A|W)=(2/3·1/2)/(7/12)=(1/3)/(7/12)=4/7."},
  ],
  t2:[
    {q:"40% of emails are spam. P('offer'|spam)=0.8, P('offer'|not spam)=0.1. Email contains 'offer'. Find P(spam|'offer').",a:"16/19 ≈ 84.2%",sol:"P(O)=0.8×0.4+0.1×0.6=0.38. P(S|O)=0.32/0.38=16/19. Note the prior 40% already makes spam likely; the strong likelihood ratio 0.8/0.1=8 pushes the posterior very high."},
    {q:"M1,M2,M3 produce 50%,30%,20% of parts; defect rates 2%,3%,4%. A defective part is found. P(from M1)?",a:"10/27",sol:"P(D)=0.02·0.5+0.03·0.3+0.04·0.2=0.01+0.009+0.008=0.027. P(M1|D)=0.01/0.027=10/27≈37%."},
  ],
  t3:[
    {q:"Derive Bayes' theorem from the definition of conditional probability. Then derive the odds form and show posterior odds = likelihood ratio × prior odds.",a:"Proof + derivation.",sol:"Bayes: P(H|E)=P(E∩H)/P(E)=P(E|H)P(H)/P(E) — applying the definition of conditional probability twice. Odds form: P(H|E)/P(Hᶜ|E) = [P(E|H)P(H)/P(E)] / [P(E|Hᶜ)P(Hᶜ)/P(E)] = [P(E|H)/P(E|Hᶜ)] · [P(H)/P(Hᶜ)]. The P(E) cancels, giving: posterior odds = likelihood ratio × prior odds. This form is useful because it shows exactly how evidence updates beliefs multiplicatively. □"},
  ],
  traps:["Base rate neglect: ignoring P(H) gives wildly overconfident posteriors for rare conditions.","Sensitivity=P(+|D) ≠ P(D|+). These differ whenever prevalence ≠ 50%.","The denominator P(E) must sum over ALL hypotheses — missing a branch underestimates P(E) and overestimates the posterior."],
  links:["cond.cond","cond.total","ml.cls","ai.bn"],
},
"cond.indep":{
  hook:"Independence means knowing one event gives zero information about another. Uncorrelated means no linear relationship — dependence can still exist through nonlinear structure.",
  def:"A⊥B iff P(A∩B)=P(A)·P(B). Equivalently P(A|B)=P(A). For random variables: X⊥Y iff the joint factors: f(x,y)=f_X(x)·f_Y(y). Uncorrelated: Cov(X,Y)=E[XY]−E[X]E[Y]=0.",
  insight:"Independence ⇒ uncorrelated, but NOT vice versa. The canonical counterexample: X~Uniform{−1,0,1}, Y=X². Then E[XY]=E[X³]=0 (odd function, symmetric distribution), so ρ=0 — yet Y is completely determined by X. This exact pattern recurs across many problems.",
  t1:[
    {q:"P(A)=0.3, P(B)=0.5, P(A∩B)=0.15. Are A and B independent?",a:"Yes",sol:"P(A)·P(B)=0.15=P(A∩B). ✓ Independent."},
    {q:"X,Y independent. E[X]=2, E[Y]=3, Var(X)=4, Var(Y)=9. Find Var(2X−3Y).",a:"97",sol:"Independence ⟹ Cov(X,Y)=0. Var(2X−3Y)=4Var(X)+9Var(Y)=16+81=97."},
  ],
  t2:[
    {q:"X~Uniform{−1,0,1}, Y=X². Compute ρ(X,Y). Are X and Y independent?",a:"ρ=0, NOT independent",sol:"E[X]=0, E[Y]=2/3, E[XY]=E[X³]=0, Cov(X,Y)=0−0=0, so ρ=0. But P(Y=0|X=0)=1≠P(Y=0)=1/3. Not independent — Y is a deterministic function of X."},
    {q:"A,B pairwise independent with P(A)=P(B)=P(C)=1/2, P(A∩B)=P(B∩C)=P(A∩C)=1/4. Does P(A∩B∩C)=P(A)P(B)P(C)?",a:"Not necessarily",sol:"Pairwise independence does not imply mutual independence. Construct: coin flips H1,H2; A={H1=H}, B={H2=H}, C={H1≠H2}. Pairwise independent, P(A∩B∩C)=0≠1/8."},
  ],
  t3:[
    {q:"Prove: if X and Y are independent then E[g(X)h(Y)]=E[g(X)]·E[h(Y)] for any measurable functions g,h. Use this to prove that independence implies zero covariance.",a:"Proof.",sol:"By independence, f(x,y)=f_X(x)f_Y(y). So E[g(X)h(Y)]=∫∫g(x)h(y)f_X(x)f_Y(y)dx dy=[∫g(x)f_X(x)dx][∫h(y)f_Y(y)dy]=E[g(X)]·E[h(Y)] by Fubini. Setting g(x)=x, h(y)=y: E[XY]=E[X]E[Y], so Cov(X,Y)=E[XY]−E[X]E[Y]=0. □ The converse fails: Cov=0 only rules out linear dependence."},
  ],
  traps:["Zero covariance ≠ independence. Cov=0 rules out only linear dependence.","Pairwise independence of A,B,C does not give P(A∩B∩C)=P(A)P(B)P(C).","X⊥Y means every event {X∈S} is independent of every event {Y∈T} — much stronger than just E[XY]=E[X]E[Y]."],
  links:["cond.cond","prob.joint","prob.expvar","ml.reg"],
},
"cond.texp":{
  hook:"The law of total expectation (Adam's law) lets you compute E[X] by conditioning on any convenient variable Y — turning hard marginal expectations into easier conditional ones.",
  def:"E[X] = E[E[X|Y]]. The inner E[X|Y] is a random variable (function of Y); the outer expectation averages over Y. In discrete case: E[X]=Σᵧ E[X|Y=y]·P(Y=y).",
  insight:"Whenever you see E[X] where X depends on a random parameter, condition on that parameter first. Practice prompts often give E[X|N]=f(N) and ask for E[X] — the answer is always E[f(N)]. Master this and many hard probability problems become routine.",
  t1:[
    {q:"X|N=n ~ Binomial(n,0.5). N~Uniform{1,2,3}. Find E[X].",a:"1",sol:"E[X|N]=N/2. E[X]=E[N/2]=(1/2)E[N]=(1/2)·2=1."},
    {q:"E[Y|X]=2X+1, E[X]=3. Find E[Y].",a:"7",sol:"E[Y]=E[E[Y|X]]=E[2X+1]=2E[X]+1=7. Direct application of Adam's law."},
  ],
  t2:[
    {q:"Cars arrive Poisson(λ=10/hr). Each is red with prob p=0.3 independently. R=red cars per hour. Find E[R] and Var(R).",a:"E[R]=3, Var(R)=3",sol:"R|N~Binomial(N,0.3). E[R]=E[E[R|N]]=E[0.3N]=3. For variance need Eve's law: Var(R)=E[Var(R|N)]+Var(E[R|N])=E[0.21N]+Var(0.3N)=0.21·10+0.09·10=3. (Thinning theorem: Poisson thinning gives R~Poisson(λp)=Poisson(3), consistent with Var=3.)"},
    {q:"You toss a fair coin repeatedly. Let N be the number of tosses until first head (Geometric(0.5)). Let X=N². Find E[X].",a:"6",sol:"E[N]=2, Var(N)=(1−0.5)/0.5²=2. E[N²]=Var(N)+(E[N])²=2+4=6."},
  ],
  t3:[
    {q:"Prove the tower property E[E[X|Y]]=E[X] from the definition of conditional expectation in the discrete case.",a:"Proof.",sol:"E[E[X|Y]] = Σᵧ E[X|Y=y]·P(Y=y) = Σᵧ [Σₓ x·P(X=x|Y=y)]·P(Y=y) = Σₓ Σᵧ x·P(X=x|Y=y)·P(Y=y) = Σₓ Σᵧ x·P(X=x,Y=y) (by multiplication rule) = Σₓ x·[Σᵧ P(X=x,Y=y)] = Σₓ x·P(X=x) = E[X]. □ Interchanging sums is valid when X has finite expectation."},
  ],
  traps:["E[X|Y] is a random variable (a function of Y); E[X|Y=y] is a number. Never confuse the two.","E[E[X|Y,Z]|Y]=E[X|Y] (tower property generalizes). But E[E[X|Y]|Z]≠E[X|Z] in general.","Adam's law handles expectations. For variance, use Eve's law (law of total variance) — a different formula."],
  links:["cond.total","cond.tvar","prob.expvar","stat.mle"],
},
"cond.tvar":{
  hook:"The law of total variance (Eve's law) decomposes variance into within-group spread and between-group spread. It is ANOVA in probabilistic form.",
  def:"Var(X) = E[Var(X|Y)] + Var(E[X|Y]). First term: average within-group variance (unexplained). Second term: variance of group means (explained by Y). Together they give total variance.",
  insight:"In linear regression, R²=Var(E[Y|X])/Var(Y) = fraction of variance explained by X. This is the between-group term divided by total variance — a direct consequence of Eve's law. Mastering this makes both probability and ML evaluation questions immediate.",
  t1:[
    {q:"X|Y=y ~ N(y,1), Y~N(0,4). Find Var(X).",a:"5",sol:"Var(X)=E[Var(X|Y)]+Var(E[X|Y])=E[1]+Var(Y)=1+4=5."},
    {q:"Var(X|Y)=3 always. E[X|Y]=2Y+1. Var(Y)=2. Find Var(X).",a:"11",sol:"Var(X)=E[3]+Var(2Y+1)=3+4·Var(Y)=3+8=11."},
  ],
  t2:[
    {q:"X~Uniform[0,1], Y=X+ε where ε~N(0,σ²), ε⊥X. Compute R²=Var(E[Y|X])/Var(Y).",a:"1/(1+12σ²)",sol:"E[Y|X]=X, Var(E[Y|X])=Var(X)=1/12. Var(Y)=Var(X)+σ²=1/12+σ². R²=(1/12)/(1/12+σ²)=1/(1+12σ²)."},
    {q:"N~Uniform{1,...,10}, X|N=n~Binomial(n,p). Find Var(X) for general p.",a:"p(1−p)E[N]+p²Var(N)",sol:"E[X|N]=Np, Var(X|N)=Np(1−p). Eve's law: Var(X)=E[Np(1−p)]+Var(Np)=p(1−p)E[N]+p²Var(N). For Uniform{1..10}: E[N]=5.5, Var(N)=8.25. For p=0.5: 0.25·5.5+0.25·8.25=3.44."},
  ],
  t3:[
    {q:"Prove the law of total variance: Var(X)=E[Var(X|Y)]+Var(E[X|Y]).",a:"Proof.",sol:"Var(X)=E[X²]−(E[X])². Apply tower property: E[X²]=E[E[X²|Y]]. Note E[X²|Y]=Var(X|Y)+(E[X|Y])². So E[X²]=E[Var(X|Y)]+E[(E[X|Y])²]. Also E[X]=E[E[X|Y]] by tower. Let μ_Y=E[X|Y]. Then (E[X])²=(E[μ_Y])². Therefore Var(X)=E[Var(X|Y)]+E[μ_Y²]−(E[μ_Y])²=E[Var(X|Y)]+Var(μ_Y)=E[Var(X|Y)]+Var(E[X|Y]). □"},
  ],
  traps:["Total variance ≠ E[Var(X|Y)] — you must add the between-group term Var(E[X|Y]).","Var(aX+b)=a²Var(X), not a·Var(X). Forgetting the square when differentiating E[X|Y]=aY+b gives a factor-of-a error.","If X⊥Y, then E[X|Y]=E[X] (constant), so Var(E[X|Y])=0 and Eve's law collapses to Var(X)=E[Var(X|Y)]."],
  links:["cond.texp","stat.anova","ml.theory","ml.reg"],
},

"eig.linear":{
  hook:"Matrices don't just multiply numbers — they transform space: stretching, rotating, reflecting, and collapsing. Understanding this geometry makes all of linear algebra visual.",
  def:"A linear map T:ℝⁿ→ℝᵐ satisfies T(u+v)=T(u)+T(v) and T(cu)=cT(u). Every linear map is represented by a matrix A where column j = T(eⱼ). Matrix multiplication is function composition.",
  insight:"Column j of A tells you where the j-th standard basis vector lands. So Ax is a linear combination of columns of A with coefficients from x. This column-space view (Ax = combination of columns) is far more powerful than the row-dot-product view for understanding rank, null space, and linear systems.",
  t1:[
    {q:"Matrix A = [[2,0],[0,3]]. What does this transformation do geometrically?",a:"Stretches x-axis by 2, y-axis by 3",sol:"e₁=[1,0]→[2,0], e₂=[0,1]→[0,3]. Pure scaling — no rotation. Eigenvalues are 2 and 3 (on diagonal for diagonal matrices)."},
    {q:"A = [[0,−1],[1,0]]. Describe the transformation.",a:"90° counter-clockwise rotation",sol:"e₁→[0,1], e₂→[−1,0]. This is a rotation matrix: Rθ = [[cosθ,−sinθ],[sinθ,cosθ]] with θ=90°. det(A)=1 (area-preserving), tr(A)=0."},
  ],
  t2:[
    {q:"Prove that if T is linear, then T(0)=0.",a:"T(0)=0",sol:"T(0)=T(0+0)=T(0)+T(0) by additivity. Subtract T(0): 0=T(0). □ Also: T(0)=T(0·v)=0·T(v)=0 by scalar multiplication."},
    {q:"A has rank r. What is the dimension of the null space of A (m×n matrix)?",a:"n−r",sol:"Rank-nullity theorem: rank(A)+nullity(A)=n (number of columns). So nullity=n−r. This is fundamental: the rank tells you how many dimensions you map to; the rest collapse to zero."},
  ],
  t3:[
    {q:"Show that the composition of two linear maps is linear, and that matrix multiplication correctly represents this composition.",a:"Proof.",sol:"Let S,T be linear with matrices A,B. (ST)(u+v)=S(T(u+v))=S(T(u)+T(v))=S(T(u))+S(T(v))=(ST)(u)+(ST)(v) ✓. (ST)(cu)=S(T(cu))=S(cT(u))=cS(T(u))=c(ST)(u) ✓. For matrix representation: (AB)x=A(Bx). Column j of AB = A(column j of B) = how ST maps eⱼ. This confirms matrix multiplication encodes composition correctly. □"},
  ],
  traps:["Matrix multiplication is NOT commutative: AB≠BA in general. Only for scalars.","The column space of A is the range of T, not the domain. Range⊂ℝᵐ; domain=ℝⁿ.","Rank is the dimension of the column space (= row space), not the number of nonzero rows."],
  links:["eig.eigen","lin.rank","lin.spaces"],
},
"eig.eigen":{
  hook:"Eigenvectors are the special directions a matrix doesn't rotate — only stretches. Finding them reveals the intrinsic structure of any linear transformation.",
  def:"Av=λv, v≠0. The eigenvalues λ are roots of det(A−λI)=0 (characteristic polynomial). For any matrix: tr(A)=Σᵢλᵢ, det(A)=Πᵢλᵢ. These two facts solve many spectral problems instantly.",
  insight:"For a 2×2 matrix [[a,b],[c,d]]: λ² − (a+d)λ + (ad−bc)=0. The two eigenvalues satisfy λ₁+λ₂=a+d and λ₁λ₂=ad−bc. When you know the trace and determinant, you know both eigenvalues without solving anything. Faster than computing the characteristic polynomial.",
  t1:[
    {q:"A=[[4,1],[2,3]]. Find the eigenvalues.",a:"λ=5, λ=2",sol:"det(A−λI)=(4−λ)(3−λ)−2=λ²−7λ+10=(λ−5)(λ−2)=0. Or: tr=7, det=10. λ₁+λ₂=7, λ₁λ₂=10 ⟹ λ=5,2."},
    {q:"A matrix has eigenvalues 2, −1, 3. Find det(A) and tr(A).",a:"det=−6, tr=4",sol:"det(A)=2·(−1)·3=−6. tr(A)=2+(−1)+3=4."},
  ],
  t2:[
    {q:"A=[[2,1],[0,2]]. Find eigenvalues and eigenvectors.",a:"λ=2 (repeated), v=[1,0]",sol:"det(A−2I)=det([[0,1],[0,0]])=0. So λ=2 (multiplicity 2). Eigenvector: (A−2I)v=[[0,1],[0,0]]v=0 ⟹ v=[1,0]. Only one linearly independent eigenvector — this matrix is defective (not diagonalizable over ℝ)."},
    {q:"Rotation matrix Rθ=[[cosθ,−sinθ],[sinθ,cosθ]], θ≠0,π. Find eigenvalues. What does this mean geometrically?",a:"λ=e^(±iθ) — complex eigenvalues",sol:"det(Rθ−λI)=λ²−2cosθ·λ+1=0. λ=(2cosθ±√(4cos²θ−4))/2=cosθ±i·sinθ=e^(±iθ). Complex eigenvalues ⟺ no real eigenvectors ⟺ pure rotation has no direction that is only stretched."},
  ],
  t3:[
    {q:"Prove that eigenvectors corresponding to distinct eigenvalues are linearly independent.",a:"Proof by induction.",sol:"Base: one eigenvector {v₁} is linearly independent. Inductive step: suppose v₁,...,vₖ₋₁ are LI (distinct eigenvalues λ₁,...,λₖ₋₁). Add vₖ with eigenvalue λₖ. Suppose Σᵢ cᵢvᵢ=0. Apply A: Σᵢ cᵢλᵢvᵢ=0. Multiply first equation by λₖ: Σᵢ cᵢλₖvᵢ=0. Subtract: Σᵢ₌₁ᵏ⁻¹ cᵢ(λᵢ−λₖ)vᵢ=0. By inductive hypothesis (LI), cᵢ(λᵢ−λₖ)=0. Since λᵢ≠λₖ, cᵢ=0 for i<k. Then cₖvₖ=0 ⟹ cₖ=0. □"},
  ],
  traps:["tr(A)=Σλᵢ and det(A)=Πλᵢ always — use these before expanding the full characteristic polynomial.","Repeated eigenvalue ≠ repeated eigenvector. A defective matrix has fewer linearly independent eigenvectors than its algebraic multiplicity.","A real matrix can have complex eigenvalues (in conjugate pairs). Complex λ means the transformation involves rotation."],
  links:["eig.linear","eig.symm","eig.rayleigh","lin.diag"],
},
"eig.symm":{
  hook:"Real symmetric matrices are the best-behaved matrices: all eigenvalues are real, eigenvectors for different eigenvalues are orthogonal, and they are always diagonalizable.",
  def:"Spectral theorem: if A=Aᵀ (real symmetric), then A=QΛQᵀ where Q is orthogonal (columns are orthonormal eigenvectors), Λ=diag(λ₁,...,λₙ). Equivalently: A=Σᵢ λᵢqᵢqᵢᵀ (spectral decomposition).",
  insight:"This decomposition is everywhere in ML: covariance matrices (for PCA), Gram matrices XᵀX (for kernel methods), Hessians of convex functions (for Newton's method). When A=QΛQᵀ, then A² =QΛ²Qᵀ, A⁻¹=QΛ⁻¹Qᵀ, and functions of A are trivial to compute.",
  t1:[
    {q:"A symmetric matrix has eigenvalues 3,1,−2. Is it positive definite?",a:"No — has negative eigenvalue",sol:"PD requires all eigenvalues > 0. Since λ=−2 < 0, A is indefinite. A is positive semidefinite only if all λᵢ≥0."},
    {q:"A=QΛQᵀ with Q orthogonal and Λ=diag(4,1). Find A⁻¹.",a:"QΛ⁻¹Qᵀ = Qdiag(1/4,1)Qᵀ",sol:"Since Q is orthogonal, Q⁻¹=Qᵀ. So A⁻¹=(QΛQᵀ)⁻¹=(Qᵀ)⁻¹Λ⁻¹Q⁻¹=QΛ⁻¹Qᵀ."},
  ],
  t2:[
    {q:"Prove eigenvectors of a real symmetric matrix corresponding to distinct eigenvalues are orthogonal.",a:"Proof.",sol:"Let Av=λv, Aw=μw, λ≠μ. Compute vᵀAw two ways: vᵀ(Aw)=μ(vᵀw). Also (Av)ᵀw=λ(vᵀw). But (Av)ᵀw=vᵀAᵀw=vᵀAw (since A=Aᵀ). So μ(vᵀw)=λ(vᵀw) ⟹ (λ−μ)(vᵀw)=0. Since λ≠μ, vᵀw=0. □"},
    {q:"Compute A^2026 where A=[[1,2],[2,1]] (find eigenvalues/vectors first).",a:"See solution",sol:"Eigenvalues: tr=2, det=−3 → λ=3,−1. For λ=3: v₁=[1,1]/√2. For λ=−1: v₂=[1,−1]/√2. A=QΛQᵀ. A^2026=QΛ^2026Qᵀ=Q·diag(3^2026, 1)·Qᵀ. Explicitly: A^2026=[(3^2026+1)/2]I + [(3^2026−1)/2][[1,1],[1,1]]."},
  ],
  t3:[
    {q:"Prove all eigenvalues of a real symmetric matrix are real, without assuming the spectral theorem.",a:"Proof over ℂ.",sol:"Let Av=λv, v∈ℂⁿ, v≠0. Compute v*Av (using conjugate transpose v*). v*Av=λv*v=λ‖v‖². Also (v*Av)*=(v*Aᵀv)=v*Av (since A=Aᵀ, real). So v*Av is real. Since ‖v‖²>0, λ=v*Av/‖v‖² is real. □"},
  ],
  traps:["Symmetric ≠ diagonal. A symmetric matrix can have off-diagonal entries; it just always has an orthogonal eigenvector basis.","All eigenvalues real does NOT mean all eigenvalues positive. Symmetric matrices can be indefinite.","The spectral decomposition A=QΛQᵀ uses Qᵀ (not Q⁻¹) because Q is orthogonal — this is only true for symmetric matrices in general."],
  links:["eig.eigen","eig.proj","eig.quad","eig.rayleigh","lin.diag"],
},
"eig.proj":{
  hook:"Projection matrices collapse vectors onto subspaces. They are the mathematical tool behind least squares, PCA, centering data, and the geometry of regression.",
  def:"P is a projection iff P²=P (idempotent). Orthogonal projection onto col(A): P=A(AᵀA)⁻¹Aᵀ. Eigenvalues of any projection are only 0 and 1. rank(P)=tr(P)=number of 1-eigenvalues. Centering matrix: H=I−(1/n)𝟏𝟏ᵀ.",
  insight:"The centering matrix H=I−(1/n)𝟏𝟏ᵀ projects onto the hyperplane orthogonal to [1,1,...,1]. Applying H to a data matrix subtracts the column mean. H²=H (idempotent), rank(H)=n−1, tr(H)=n−1. These properties follow directly from the definition of orthogonal projection.",
  t1:[
    {q:"P=A(AᵀA)⁻¹Aᵀ where A is n×k with full column rank. Show P²=P.",a:"P²=P",sol:"P²=[A(AᵀA)⁻¹Aᵀ][A(AᵀA)⁻¹Aᵀ]=A(AᵀA)⁻¹[AᵀA](AᵀA)⁻¹Aᵀ=A(AᵀA)⁻¹Aᵀ=P. ✓"},
    {q:"Projection P has tr(P)=3 and P²=P. What are its eigenvalues and rank?",a:"Eigenvalues 0 and 1; rank=3",sol:"P²=P ⟹ eigenvalues satisfy λ²=λ ⟹ λ∈{0,1}. tr(P)=Σλᵢ=3 ⟹ three 1-eigenvalues. rank(P)=3."},
  ],
  t2:[
    {q:"In linear regression y=Xβ+ε, the fitted values are ŷ=Xβ̂=X(XᵀX)⁻¹Xᵀy=Hy. Show ŷ and residuals e=y−ŷ are orthogonal.",a:"ŷ⊥e",sol:"ŷᵀe=(Hy)ᵀ(y−Hy)=yᵀHᵀ(I−H)y=yᵀH(I−H)y=yᵀ(H−H²)y=yᵀ(H−H)y=0. (Used H=Hᵀ and H²=H.) This orthogonality is the Pythagorean decomposition ‖y‖²=‖ŷ‖²+‖e‖²."},
    {q:"Centering matrix H=I−(1/n)𝟏𝟏ᵀ. Find all eigenvalues and their multiplicities.",a:"λ=0 (mult 1), λ=1 (mult n−1)",sol:"H𝟏=𝟏−(1/n)𝟏𝟏ᵀ𝟏=𝟏−𝟏=0, so 𝟏 is eigenvector with λ=0. For v⊥𝟏: Hv=v−(1/n)𝟏(𝟏ᵀv)=v−0=v, so λ=1 with multiplicity n−1 (dimension of 𝟏⊥). tr(H)=n−1 ✓."},
  ],
  t3:[
    {q:"Prove that for any projection P (P²=P), the orthogonal complement decomposition ℝⁿ=col(P)⊕null(P) holds, and that I−P is also a projection onto null(P).",a:"Proof.",sol:"(I−P)²=I−2P+P²=I−2P+P=I−P ✓. So I−P is a projection. col(P)∩null(P)={0}: if Pv=v and Pv=0, then v=0. Span: any x=Px+(x−Px)=Px+(I−P)x. Px∈col(P), (I−P)x∈null(P) since P(I−P)x=Px−P²x=Px−Px=0. □"},
  ],
  traps:["P²=P is idempotent but NOT the same as orthogonal projection — oblique projections also satisfy P²=P. Orthogonal requires additionally Pᵀ=P.","tr(P)=rank(P) for projections — a handy shortcut for computing rank when det is 0.","The hat matrix H in regression is a specific orthogonal projection — ŷ=Hy projects y onto col(X)."],
  links:["eig.symm","eig.quad","lin.svd","ml.reg"],
},
"eig.quad":{
  hook:"A quadratic form xᵀAx defines a geometric surface: a bowl (PD), saddle (indefinite), or flat region (singular). The type determines whether you have a minimum, maximum, or saddle point.",
  def:"Quadratic form q(x)=xᵀAx=Σᵢⱼ aᵢⱼxᵢxⱼ (assume A symmetric WLOG). PD: all eigenvalues>0. PSD: all eigenvalues≥0. ND: all eigenvalues<0. Indefinite: mixed signs. Sylvester's criterion: PD iff all leading principal minors>0.",
  insight:"Covariance matrices are always PSD (and PD when the data is full-rank). The Hessian of a convex function is PSD everywhere. At a critical point, PD Hessian ⟹ local minimum. ML heavily uses the PD/PSD distinction for SVMs (kernel matrix must be PSD), ridge regression (λI makes the Gram matrix PD), and optimization convergence.",
  t1:[
    {q:"A=[[3,1],[1,2]]. Is A positive definite?",a:"Yes",sol:"Eigenvalues: tr=5, det=5. λ²−5λ+5=0 ⟹ λ=(5±√5)/2 ≈ 3.62, 1.38. Both positive ✓. Also Sylvester: 3>0, det(A)=5>0 ✓."},
    {q:"q(x,y)=x²+4xy+4y²=(x+2y)². Is the associated matrix PSD or PD?",a:"PSD but NOT PD (singular)",sol:"Matrix: [[1,2],[2,4]]. det=0 ⟹ one eigenvalue is 0. q(x,y)=(x+2y)²≥0 but q(1,−1/2)=0. PSD but not PD."},
  ],
  t2:[
    {q:"A=[[2,1],[1,k]]. For what values of k is A positive definite?",a:"k>1/2",sol:"Leading minors: 2>0 ✓. det=2k−1>0 ⟹ k>1/2. Both conditions give k>1/2."},
    {q:"Prove that for a PSD matrix A, xᵀAx=0 iff Ax=0.",a:"Proof.",sol:"(⇐) If Ax=0 then xᵀAx=xᵀ(Ax)=0. (⇒) A=QΛQᵀ, Λ=diag(λ₁,...,λₙ), λᵢ≥0. xᵀAx=yᵀΛy=Σλᵢyᵢ²=0 where y=Qᵀx. Since λᵢ≥0 and λᵢyᵢ²≥0, each λᵢyᵢ²=0. So yᵢ=0 whenever λᵢ>0. This means Λy=0, so Ay=QΛQᵀx=QΛy=0. □"},
  ],
  t3:[
    {q:"Prove Sylvester's criterion: a symmetric matrix A is positive definite iff all leading principal minors (det of top-left k×k submatrix) are positive. Use the spectral theorem.",a:"Sketch of proof.",sol:"(⟹) If A is PD, then every leading submatrix Aₖ is also PD (restriction to subspace). PD ⟹ det(Aₖ)=Πλᵢ(Aₖ)>0. (⟸) Induction: if det(Aₖ)>0 for all k, show all eigenvalues>0. The key idea: det(Aₙ)=Πλᵢ>0 means either 0 or 2 or 4... negative eigenvalues. The signs of the leading minors track parity of negative eigenvalues, ruling out each possibility. Full proof uses Schur complements for the inductive step."},
  ],
  traps:["PSD ≠ PD: a covariance matrix from correlated data can be PSD (singular) even though all variances are positive.","A symmetric matrix with all positive entries need not be PD — positive entries ≠ positive eigenvalues.","The Hessian at a critical point must be checked for PD/ND/indefinite — a zero Hessian (flat) is inconclusive."],
  links:["eig.symm","eig.rayleigh","grad.convex","opt.kkt"],
},
"eig.rayleigh":{
  hook:"The Rayleigh quotient R(x)=xᵀAx/xᵀx oscillates between the smallest and largest eigenvalues of A. Maximizing it is exactly what PCA does — and it is solved by finding the top eigenvector.",
  def:"For symmetric A: min_{x≠0} R(x)=λ_min, max_{x≠0} R(x)=λ_max. Both extrema are achieved at the corresponding eigenvectors. Courant-Fischer theorem: λₖ = min_{dim(S)=n−k+1} max_{x∈S} R(x).",
  insight:"PCA: maximize Var(xᵀz)=xᵀΣx subject to ‖x‖=1 = maximize Rayleigh quotient of Σ. Solution: top eigenvector of Σ. This one insight unifies PCA, Fisher's LDA (generalized Rayleigh quotient), spectral clustering, and kernel PCA — all reduce to an eigenvalue problem.",
  t1:[
    {q:"A=[[3,0],[0,1]]. What are the max and min of R(x)=xᵀAx/‖x‖²?",a:"max=3, min=1",sol:"Max R = λ_max=3, achieved at x=[1,0]. Min R=λ_min=1, achieved at x=[0,1]. For diagonal A, Rayleigh quotient is (3x₁²+x₂²)/(x₁²+x₂²), bounded by 1 and 3."},
    {q:"Covariance matrix Σ has eigenvalues 5,2,0.5. What fraction of variance is captured by the first principal component?",a:"5/(5+2+0.5)=5/7.5=66.7%",sol:"Total variance=tr(Σ)=Σλᵢ=7.5. First PC captures λ_max=5. Fraction=5/7.5=2/3≈66.7%."},
  ],
  t2:[
    {q:"Prove: max_{‖x‖=1} xᵀAx = λ_max for real symmetric A, with maximum achieved at the corresponding eigenvector.",a:"Proof using spectral decomposition.",sol:"A=QΛQᵀ. Let y=Qᵀx (orthogonal transformation, ‖y‖=‖x‖=1). Then xᵀAx=xᵀQΛQᵀx=yᵀΛy=Σᵢλᵢyᵢ²≤λ_max·Σᵢyᵢ²=λ_max. Equality when y=eₖ (the basis vector for λ_max), i.e., x=Qeₖ=qₖ (the corresponding eigenvector). □"},
    {q:"A=[[4,2],[2,1]]. Find max_{‖x‖=1} xᵀAx.",a:"5",sol:"tr(A)=5, det(A)=0. Eigenvalues sum to 5, product to 0 ⟹ λ=5,0. max R=5, achieved at eigenvector for λ=5. (Check: Av=5v ⟹ (A−5I)v=0 ⟹ [[-1,2],[2,-4]]v=0 ⟹ v=[2,1]/√5.)"},
  ],
  t3:[
    {q:"Generalized Rayleigh quotient: R(x)=xᵀAx/xᵀBx where B is PD. Show the maximum equals the largest eigenvalue of B⁻¹A, achieved at the corresponding generalized eigenvector.",a:"Proof via change of variables.",sol:"Since B is PD, write B=LLᵀ (Cholesky). Let y=Lᵀx. Then R(x)=xᵀAx/xᵀBx=yᵀL⁻¹AL⁻ᵀy/yᵀy. This is the standard Rayleigh quotient of L⁻¹AL⁻ᵀ. Max = largest eigenvalue of L⁻¹AL⁻ᵀ. Note: eigenvalues of L⁻¹AL⁻ᵀ = eigenvalues of B⁻¹A (same characteristic polynomial since det(L⁻¹AL⁻ᵀ−λI)=det(B⁻¹A−λI)/det(B)... use similarity: L⁻¹AL⁻ᵀ~B⁻¹A). This generalizes PCA to Fisher's LDA. □"},
  ],
  traps:["The Rayleigh quotient is scale-invariant — R(cx)=R(x). Always simplify to the unit-sphere version.","max xᵀAx subject to ‖x‖=1 is a Rayleigh quotient, but max xᵀAx with no constraint is unbounded (if λ_max>0).","For PCA: maximize variance xᵀΣx/‖x‖² = maximize Rayleigh quotient of Σ. Solution is top eigenvector, NOT top eigenvalue directly."],
  links:["eig.symm","eig.quad","opt.lag","ml.unsup","lin.svd"],
},

"grad.deriv":{
  hook:"The gradient is a vector that points in the direction of steepest ascent. Every optimization algorithm — gradient descent, Newton's method, Adam — is built on computing and following gradients.",
  def:"Gradient of f:ℝⁿ→ℝ: ∇f(x)=[∂f/∂x₁,...,∂f/∂xₙ]ᵀ. Directional derivative in direction u (unit vector): D_u f(x)=∇f(x)ᵀu. The gradient points in the direction of maximum increase; −∇f points toward the minimum.",
  insight:"Chain rule for neural networks: if z=f(g(x)), then dz/dx = f'(g(x))·g'(x). This is the mathematical core of backpropagation. Every layer applies the chain rule backward from the output loss to each weight, multiplying Jacobians along the way.",
  t1:[
    {q:"f(x,y)=x²+2xy+y². Find ∇f at (1,2).",a:"[6,6]",sol:"∂f/∂x=2x+2y, ∂f/∂y=2x+2y. At (1,2): [2+4, 2+4]=[6,6]. Note: f=(x+y)², so ∇f=2(x+y)[1,1]=6[1,1]=[6,6]."},
    {q:"f(x)=‖x‖²=xᵀx. Find ∇f.",a:"2x",sol:"f(x)=Σxᵢ². ∂f/∂xᵢ=2xᵢ. So ∇f=2x. This is the most common gradient in ML (L2 loss, regularization)."},
  ],
  t2:[
    {q:"f(x,y)=sin(x²+y). Find ∂f/∂x and ∂f/∂y at (0,π/2).",a:"∂f/∂x=0, ∂f/∂y=0",sol:"∂f/∂x=2x·cos(x²+y). At (0,π/2): 0·cos(π/2)=0. ∂f/∂y=cos(x²+y). At (0,π/2): cos(π/2)=0."},
    {q:"L(w)=‖Xw−y‖²=wᵀXᵀXw−2yᵀXw+yᵀy. Find ∇_w L.",a:"2XᵀXw−2Xᵀy",sol:"∂(wᵀAw)/∂w=2Aw for symmetric A. ∂(bᵀw)/∂w=b. So ∇_w L=2XᵀXw−2Xᵀy. Setting to 0: XᵀXw=Xᵀy — the normal equations of least squares."},
  ],
  t3:[
    {q:"Prove that the gradient ∇f(x) is the direction of steepest ascent from x, i.e., it maximizes D_u f(x) over all unit vectors u.",a:"Proof using Cauchy-Schwarz.",sol:"D_u f(x)=∇f(x)ᵀu=‖∇f(x)‖·‖u‖·cos θ=‖∇f(x)‖·cos θ (since ‖u‖=1). This is maximized when cos θ=1, i.e., when u=∇f(x)/‖∇f(x)‖. The maximum value is ‖∇f(x)‖. □ The minimum directional derivative is −‖∇f‖, in the direction −∇f (steepest descent)."},
  ],
  traps:["The gradient is zero at both minima AND maxima AND saddle points. Always check the Hessian to distinguish.","Gradient of xᵀAx is 2Ax only when A is symmetric. For general A, it is (A+Aᵀ)x.","Partial derivatives exist ≠ function is differentiable. Differentiability requires the linear approximation to work in all directions simultaneously."],
  links:["grad.matrix","grad.convex","grad.descent","opt.gd"],
},
"grad.matrix":{
  hook:"Matrix calculus extends derivatives to functions of matrices and vectors. Without it, you cannot derive gradient descent updates, backpropagation rules, or closed-form MLE solutions.",
  def:"Key identities: ∂(aᵀx)/∂x=a. ∂(xᵀAx)/∂x=2Ax (A symmetric). ∂tr(AB)/∂A=Bᵀ. ∂log det(A)/∂A=A⁻ᵀ. Jacobian: if f:ℝⁿ→ℝᵐ, J=[∂fᵢ/∂xⱼ] is m×n.",
  insight:"Every ML loss function gradient reduces to a few of these identities. Least squares: L=‖y−Xw‖² → ∇_w L=2Xᵀ(Xw−y). Ridge: add 2λw. Logistic: ∇_w = Xᵀ(σ(Xw)−y). Once you recognize the pattern, these are one-line derivations.",
  t1:[
    {q:"L(w) = (y−wᵀx)². Find ∂L/∂w.",a:"−2(y−wᵀx)x",sol:"L=(y−xᵀw)². ∂L/∂w=2(y−xᵀw)·(−x)=−2(y−wᵀx)x. (Chain rule: ∂(y−xᵀw)/∂w=−x.)"},
    {q:"f(A)=tr(AᵀA). Find ∂f/∂A.",a:"2A",sol:"tr(AᵀA)=Σᵢⱼ Aᵢⱼ². ∂/∂Aᵢⱼ(Σₖₗ Aₖₗ²)=2Aᵢⱼ. So ∂f/∂A=2A."},
  ],
  t2:[
    {q:"MLE for linear regression: maximize log p(y|X,w)=−(n/2)log(2πσ²)−‖y−Xw‖²/(2σ²). Find ŵ_MLE.",a:"(XᵀX)⁻¹Xᵀy",sol:"Maximize ⟺ minimize ‖y−Xw‖²=yᵀy−2yᵀXw+wᵀXᵀXw. Gradient: 2XᵀXw−2Xᵀy=0. ŵ=(XᵀX)⁻¹Xᵀy (normal equations). This is the pseudoinverse solution Xᵀy."},
    {q:"f(x)=xᵀAx where A=[[1,2],[2,3]], evaluated at x=[1,1]. Verify ∇f(x)=2Ax.",a:"∇f=[6,10]",sol:"Ax=[[1,2],[2,3]][1,1]ᵀ=[3,5]ᵀ. 2Ax=[6,10]. Verify: f=xᵀAx=1·1+1·2+2·1+3·1=1+2+2+3=8. Gradient at x=[1,1]: ∂f/∂x₁=2x₁+2·2x₂=2+4=6, ∂f/∂x₂=2·2x₁+2·3x₂=4+6=10. ✓"},
  ],
  t3:[
    {q:"Derive the backpropagation update for a single linear layer: L=‖Wx−y‖², find ∂L/∂W.",a:"∂L/∂W = 2(Wx−y)xᵀ",sol:"L=‖r‖² where r=Wx−y∈ℝᵐ. ∂L/∂r=2r. By chain rule: ∂L/∂Wᵢⱼ=Σₖ(∂L/∂rₖ)·(∂rₖ/∂Wᵢⱼ). rₖ=Σⱼ Wₖⱼxⱼ−yₖ, so ∂rₖ/∂Wᵢⱼ=δₖᵢxⱼ. Thus ∂L/∂Wᵢⱼ=2rᵢxⱼ. In matrix form: ∂L/∂W=2rxᵀ=2(Wx−y)xᵀ. This is an outer product — rank-1 update. □"},
  ],
  traps:["∂(xᵀAx)/∂x=(A+Aᵀ)x — only equals 2Ax when A is symmetric.","Shape convention: gradient ∂f/∂x has the same shape as x. Jacobian ∂f/∂x has shape (output dim)×(input dim).","tr(AB)=tr(BA) (cyclic property) — very useful when differentiating trace expressions."],
  links:["grad.deriv","grad.descent","opt.gd","ml.nn","lin.svd"],
},
"grad.convex":{
  hook:"Convex functions have a single bowl — no local minima that aren't global. For convex objectives, gradient descent provably finds the optimal solution.",
  def:"f is convex iff f(λx+(1−λ)y)≤λf(x)+(1−λ)f(y) for all x,y, λ∈[0,1]. Equivalently (for twice-differentiable): Hessian ∇²f(x)≽0 everywhere. First-order condition: f(y)≥f(x)+∇f(x)ᵀ(y−x) for all y.",
  insight:"The first-order condition is the key tool: for convex f, if ∇f(x*)=0 then x* is a global minimum. This makes every problem 'set gradient to zero and solve'. Ridge regression is convex; so is logistic regression; so is the SVM dual. Most ML training objectives are designed to be convex precisely for this reason.",
  t1:[
    {q:"f(x)=x⁴. Is f convex? Find the global minimum.",a:"Yes, convex. Global min at x=0.",sol:"f''(x)=12x²≥0 everywhere ✓. f'(x)=4x³=0 ⟹ x=0. Since f is convex, this is the global minimum."},
    {q:"f(x,y)=x²+y². Is this convex? What does the Hessian look like?",a:"Convex. Hessian = 2I (PD).",sol:"∇²f=[[2,0],[0,2]]=2I. PD everywhere ✓. The bowl is radially symmetric."},
  ],
  t2:[
    {q:"Is f(x)=max(x,0) (ReLU) convex? Is it differentiable?",a:"Convex but not differentiable at x=0",sol:"Pointwise max of convex functions is convex: max(x,0)=max(f₁,f₂) with f₁=x, f₂=0, both convex ✓. Not differentiable at x=0: left derivative=0, right derivative=1. Subgradient ∂f={0} for x<0, {1} for x>0, [0,1] for x=0."},
    {q:"Prove the sum of two convex functions is convex.",a:"Proof.",sol:"Let f,g be convex. h=f+g. h(λx+(1−λ)y)=f(λx+(1−λ)y)+g(λx+(1−λ)y) ≤ λf(x)+(1−λ)f(y)+λg(x)+(1−λ)g(y) = λ(f+g)(x)+(1−λ)(f+g)(y)=λh(x)+(1−λ)h(y). ✓"},
  ],
  t3:[
    {q:"Prove that for a convex differentiable function, any local minimum is a global minimum.",a:"Proof.",sol:"Let x* be a local minimum: f(x*)≤f(x) for all x in some ball B(x*,ε). Suppose x** is another point with f(x**)<f(x*). By convexity: f(λx*+(1−λ)x**)≤λf(x*)+(1−λ)f(x**)<f(x*). For small enough λ, the point λx*+(1−λ)x**∈B(x*,ε). But f(λx*+(1−λ)x**)<f(x*) contradicts x* being a local minimum. □"},
  ],
  traps:["Convex function can have a minimum where the gradient doesn't exist (e.g., |x| at 0) — use subgradients.","Strictly convex functions have a UNIQUE minimum. Convex (not strict) can have a flat region of minima.","Sum of convex functions is convex. Composition f(g(x)) is convex only under specific conditions (g convex, f convex nondecreasing)."],
  links:["grad.deriv","grad.descent","opt.gd","opt.kkt","eig.quad"],
},
"grad.descent":{
  hook:"Gradient descent is the workhorse of ML training. For L-smooth convex functions, it converges at rate O(1/t); for strongly convex functions, it converges exponentially fast.",
  def:"Update: x_{t+1}=x_t−α∇f(x_t). L-smooth: ‖∇f(x)−∇f(y)‖≤L‖x−y‖ (Lipschitz gradient). μ-strongly convex: ∇²f(x)≽μI. Step size α=1/L gives O(1/t) convergence. For strongly convex: α=2/(μ+L) gives linear convergence.",
  insight:"The convergence rate depends critically on the condition number κ=L/μ. Poor conditioning (large κ) means slow convergence — gradient descent 'zig-zags' in elongated basins. This is precisely why features should be normalized (equalizes curvature) and why momentum helps (suppresses oscillation across the narrow direction).",
  t1:[
    {q:"f(x)=x². Start at x₀=4, step size α=0.1. What is x₁?",a:"3.2",sol:"∇f=2x. x₁=4−0.1·(2·4)=4−0.8=3.2."},
    {q:"f(w)=‖Xw−y‖². What is the gradient descent update for w?",a:"w_{t+1}=w_t+2αXᵀ(y−Xwₜ)",sol:"∇_w f=2XᵀXw−2Xᵀy=2Xᵀ(Xw−y). Update: w_{t+1}=wₜ−α·2Xᵀ(Xwₜ−y)=wₜ+2αXᵀ(y−Xwₜ)."},
  ],
  t2:[
    {q:"SGD update for logistic regression: L=log(1+e^{−yᵢwᵀxᵢ}). Find the stochastic gradient w.r.t. sample i.",a:"−yᵢxᵢσ(−yᵢwᵀxᵢ)",sol:"∂L/∂w=−yᵢxᵢ·e^{−yᵢwᵀxᵢ}/(1+e^{−yᵢwᵀxᵢ})=−yᵢxᵢ·σ(−yᵢwᵀxᵢ) where σ is the sigmoid. When correctly classified with high confidence, gradient ≈ 0 (small update). When misclassified, gradient ≈ yᵢxᵢ (large update)."},
    {q:"Adam update: mₜ=β₁mₜ₋₁+(1−β₁)gₜ. Why is bias correction m̂ₜ=mₜ/(1−β₁ᵗ) needed?",a:"m₀=0 causes initial underestimate",sol:"If m₀=0 and gₜ≈g (roughly constant), then mₜ=(1−β₁ᵗ)g·[something...]. Specifically E[mₜ]=g·(1−β₁ᵗ). Without correction, the initial steps use underestimated gradients. Dividing by (1−β₁ᵗ) corrects to E[m̂ₜ]≈g."},
  ],
  t3:[
    {q:"Prove GD converges for L-smooth convex f with step size α=1/L: f(xₜ)−f(x*)≤‖x₀−x*‖²/(2αt).",a:"Convergence proof sketch.",sol:"L-smoothness gives: f(x_{t+1})≤f(xₜ)+∇f(xₜ)ᵀ(x_{t+1}−xₜ)+(L/2)‖x_{t+1}−xₜ‖²=f(xₜ)−α‖∇f(xₜ)‖²+(α²L/2)‖∇f(xₜ)‖²=f(xₜ)−(α/2)‖∇f(xₜ)‖² (using α=1/L). By convexity: f(xₜ)−f(x*)≤∇f(xₜ)ᵀ(xₜ−x*). Combined via telescope: Σₜ(f(xₜ)−f(x*))≤‖x₀−x*‖²/(2α). Dividing by T: best iterate has error ≤‖x₀−x*‖²/(2αT). □"},
  ],
  traps:["Step size too large: diverges. Step size too small: correct but slow. The optimal α=1/L is derived from the smoothness constant.","SGD has noise that never vanishes — it oscillates near the optimum. Use learning rate decay or averaging for convergence.","GD convergence guarantees assume convex f. For non-convex (deep nets), GD finds a local minimum or saddle point — no global guarantee."],
  links:["grad.deriv","grad.convex","grad.condition","opt.gd","opt.newton"],
},
"grad.condition":{
  hook:"The condition number κ=σ_max/σ_min of a matrix measures how much a linear system amplifies errors. High condition number means solving Ax=b is numerically unstable and GD converges slowly.",
  def:"Condition number of A: κ(A)=‖A‖·‖A⁻¹‖=σ_max/σ_min (ratio of largest to smallest singular value). For symmetric PD A: κ=λ_max/λ_min. For GD on quadratic: convergence rate = ((κ−1)/(κ+1))^t.",
  insight:"When κ is large, the loss surface is an elongated ellipsoid: gradient descent zig-zags down the valleys, making slow progress. Preconditioning (e.g., feature normalization) reshapes the surface to reduce κ. Newton's method adapts the step to the local curvature and achieves κ=1 in one step for quadratics.",
  t1:[
    {q:"A=diag(10,1). Find κ(A).",a:"10",sol:"Singular values of diagonal matrix = |diagonal entries|. κ=10/1=10. This means solving Ax=b can amplify errors by up to a factor of 10."},
    {q:"After adding ridge regularization λI to PSD matrix A with eigenvalues in [1,10], what is κ(A+λI)?",a:"(10+λ)/(1+λ)",sol:"Eigenvalues of A+λI are λᵢ+λ ∈ [1+λ, 10+λ]. κ=(10+λ)/(1+λ). As λ→∞, κ→1. Ridge regularization improves conditioning at cost of introducing bias."},
  ],
  t2:[
    {q:"GD on f(x)=x₁²/2+50x₂²/2. What is the convergence rate and why does GD oscillate?",a:"κ=50, rate=((50−1)/(50+1))^t≈0.96^t",sol:"Hessian=diag(1,50). κ=50. Optimal α=1/50 (must use smallest 1/L for stability). Rate=((κ−1)/(κ+1))^t=(49/51)^t≈0.96^t — converges, but needs ~117 steps to reduce error by factor e. The x₂ direction has 50× more curvature, causing oscillation if step size is too large."},
    {q:"A=[[2,1],[1,2]]. What is κ(A)? Would CG converge faster than GD here?",a:"κ=3, CG converges in ≤2 steps",sol:"Eigenvalues: tr=4, det=3 ⟹ λ=3,1. κ=3. CG (conjugate gradient) is exact for quadratics in ≤n iterations (n=2 here). GD with κ=3 needs O(κ log(1/ε))=O(3·log(1/ε)) steps — much more than 2."},
  ],
  t3:[
    {q:"Prove that for GD on the quadratic f(x)=½xᵀAx−bᵀx with A PD, the convergence rate is ((κ−1)/(κ+1))². Derive the optimal step size.",a:"Full convergence analysis.",sol:"Let eₜ=xₜ−x* (error). A-norm: ‖e‖_A²=eᵀAe. GD update: eₜ₊₁=(I−αA)eₜ. ‖eₜ₊₁‖_A²≤‖I−αA‖²·‖eₜ‖_A². The matrix I−αA has eigenvalues 1−αλᵢ ∈ [1−αλ_max, 1−αλ_min]. To minimize max|1−αλᵢ|, set α=2/(λ_min+λ_max). Then max|1−αλᵢ|=(λ_max−λ_min)/(λ_max+λ_min)=(κ−1)/(κ+1). Each step multiplies ‖e‖_A by this factor. □"},
  ],
  traps:["κ measures sensitivity to perturbations, not just convergence speed. High κ means even small floating-point errors can corrupt the solution.","κ(A²)=κ(A)². Never square the matrix — it squares the condition number.","Adding a tiny ridge λ improves conditioning greatly but introduces bias. The tradeoff κ=(λ_max+λ)/(λ_min+λ) guides choice of λ."],
  links:["grad.descent","eig.rayleigh","opt.newton","lin.svd","ml.reg"],
},

"algo.complex":{
  hook:"Big-O notation is the language of algorithm analysis. It describes how runtime or space grows with input size, ignoring constant factors and lower-order terms.",
  def:"f(n)=O(g(n)) iff ∃c,n₀ s.t. f(n)≤c·g(n) for n≥n₀. Hierarchy: O(1)<O(log n)<O(n)<O(n log n)<O(n²)<O(2ⁿ)<O(n!). Ω for lower bounds, Θ for tight bounds.",
  insight:"Complexity analysis asks whether you can classify an algorithm WITHOUT running it. The key patterns: single loop→O(n), nested loops→O(n²), halving each step→O(log n), doing O(n) work O(log n) times→O(n log n). Recognizing these patterns instantly is the goal.",
  t1:[
    {q:"Binary search on an array of n elements. What is the worst-case time complexity?",a:"O(log n)",sol:"Each comparison halves the search space. After k steps, n/2^k=1, so k=log₂n. Maximum comparisons = ⌈log₂(n+1)⌉. For n=1000: ⌈log₂(1001)⌉=10 comparisons."},
    {q:"T(n)=T(n/2)+O(1). What is T(n)?",a:"O(log n)",sol:"Recursion tree: O(1) work per level, log n levels. Total: O(log n). This is binary search."},
  ],
  t2:[
    {q:"T(n)=2T(n/2)+O(n). What is T(n)?",a:"O(n log n)",sol:"Master theorem: a=2, b=2, f(n)=n=Θ(n^{log_b a})=Θ(n^1)=Θ(n). Case 2: T(n)=Θ(n log n). This is merge sort."},
    {q:"Algorithm: for i in range(n): for j in range(i, n): ... What is the time complexity?",a:"O(n²)",sol:"Total iterations = n+(n−1)+...+1 = n(n+1)/2 = O(n²). Even though the inner loop starts at i, the total work is still quadratic."},
  ],
  t3:[
    {q:"Prove that sorting n elements by comparison requires Ω(n log n) comparisons in the worst case.",a:"Decision tree argument.",sol:"A comparison-based sort corresponds to a decision tree where each internal node is a comparison and each leaf is a permutation. For n elements there are n! permutations = n! leaves. A binary tree with n! leaves has depth ≥ log₂(n!) ≈ n log n − n/ln(2) (Stirling). Therefore any comparison sort needs Ω(n log n) comparisons. Merge sort achieves O(n log n), so it is asymptotically optimal. □"},
  ],
  traps:["O(n²) is NOT O(2n²): Big-O absorbs constant factors. But O(n) ≠ O(n²) — the CLASS differs.","Best case ≠ worst case ≠ average case. Binary search is O(1) best case but O(log n) worst case.","Space complexity counts auxiliary memory. Recursive algorithms have implicit O(depth) stack space."],
  links:["algo.recurr","algo.recurse","dsa.graph","dsa.trees"],
},
"algo.recurr":{
  hook:"Recurrences describe recursive algorithms. The Master theorem solves the most common form; recognizing which case applies is the key skill.",
  def:"Master theorem: T(n)=aT(n/b)+f(n). Let c=log_b(a). Case 1: f=O(n^{c−ε}) ⟹ T=Θ(nᶜ). Case 2: f=Θ(nᶜlog^k n) ⟹ T=Θ(nᶜlog^{k+1} n). Case 3: f=Ω(n^{c+ε}) and regularity ⟹ T=Θ(f(n)).",
  insight:"The Master theorem compares the work at the root (f(n)) to the work at the leaves (nᶜ=n^{log_b a}). Case 1: leaves dominate. Case 2: tied — log factor appears. Case 3: root dominates. Nearly every divide-and-conquer recurrence falls into one of these three cases.",
  t1:[
    {q:"T(n)=4T(n/2)+n. Apply the Master theorem.",a:"Θ(n²)",sol:"a=4, b=2, f(n)=n. c=log₂4=2. f(n)=O(n^{2−1})=O(n^{c−ε}). Case 1: T=Θ(n²)."},
    {q:"T(n)=T(n/2)+n². Apply the Master theorem.",a:"Θ(n²)",sol:"a=1, b=2, c=log₂1=0. f(n)=n²=Ω(n^{0+ε})=Ω(1). Case 3 (check regularity: (1/2)n²≤cn² for c<1 ✓). T=Θ(n²)."},
  ],
  t2:[
    {q:"T(n)=2T(n/4)+√n. Apply the Master theorem.",a:"Θ(√n · log n)",sol:"a=2, b=4, c=log₄2=0.5. f(n)=√n=n^0.5=Θ(nᶜ). Case 2 (k=0): T=Θ(n^0.5 · log n)=Θ(√n log n)."},
    {q:"T(n)=T(n−1)+n. Solve this recurrence (NOT master theorem — non-divide-and-conquer).",a:"Θ(n²)",sol:"Unroll: T(n)=n+(n−1)+...+1=n(n+1)/2=Θ(n²). The Master theorem requires T(n/b) form — subtracting 1 each time is different."},
  ],
  t3:[
    {q:"Prove the Master theorem for Case 1 (f(n)=O(n^{c−ε})) by analyzing the recursion tree.",a:"Proof via recursion tree.",sol:"Tree has log_b n levels. Level k has aᵏ subproblems of size n/bᵏ, each doing f(n/bᵏ) work. Total work at level k: aᵏ·f(n/bᵏ)≤aᵏ·c(n/bᵏ)^{c−ε}=c·nᶜ⁻ᵉ·(a/b^{c-ε})ᵏ. Since a/b^{c-ε}=b^c/b^{c-ε}=bᵉ>1, work grows geometrically toward the leaves. Total ≤ c·nᶜ⁻ᵉ·Σₖ(bᵉ)ᵏ (sum over log_b n levels). Leaves dominate: at level log_b n, work = a^{log_b n}=n^c. Total = Θ(nᶜ). □"},
  ],
  traps:["The Master theorem requires T(n/b) — linear subproblem size. It does NOT apply to T(n−1)+f(n) or T(√n)+f(n).","Case 2 adds a log factor: T=Θ(nᶜ log n). Case 3 gives T=Θ(f(n)) — the root term dominates.","Regularity condition in Case 3: a·f(n/b)≤c·f(n) for some c<1. Most natural f satisfy this."],
  links:["algo.complex","algo.recurse","algo.dp","dsa.dp2"],
},
"algo.recurse":{
  hook:"Recursion is elegant but the call tree is the real picture. Counting total calls (not just depth) determines space complexity and reveals exponential blowups.",
  def:"Recursive call tree: a tree where each node represents one function call. Total work = sum of work at each node. Stack depth = tree depth = O(depth) space. Memo/DP collapses repeated subtrees.",
  insight:"Naive Fibonacci: fib(n) makes ~2^n calls because every call spawns two. With memoization: each unique (n) computed once → O(n) calls. The recursion tree IS the proof of complexity. A common prompt asks: 'how many times is f(k) called?' Draw the tree and count.",
  t1:[
    {q:"def f(n): if n<=1: return 1; return f(n-1)+f(n-1). How many calls does f(4) make (including itself)?",a:"31",sol:"T(n)=2T(n−1)+1. T(0)=T(1)=1. T(2)=3, T(3)=7, T(4)=15. Total calls with overhead: 2^{n+1}−1. For n=4: 31."},
    {q:"Recursive binary search: def bs(arr, lo, hi, x). What is the maximum recursion depth for n=1000?",a:"10",sol:"Halving each time: depth = ⌈log₂1000⌉ = 10. Stack space = O(log n)."},
  ],
  t2:[
    {q:"def f(n):\n  if n<=1: return 1\n  return f(n//2) + f(n//2) + n\nHow many calls does f(n) make?",a:"O(n)",sol:"T(n)=2T(n/2)+1 (for call count). By Master theorem: a=2, b=2, c=1, f=O(1)=O(n^{1−ε}). Case 1: T=Θ(n). Despite looking exponential, calls are O(n) because subproblem sizes shrink. (This is different from the work analysis which gives Θ(n log n).)"},
    {q:"Python: many deep recursive calls without tail-call optimization hit sys.getrecursionlimit() (default 1000). Rewrite factorial recursively and explain the stack issue.",a:"Stack overflow for large n",sol:"Python maintains an explicit call stack. Each recursive call adds a frame. For factorial(10000), 10000 frames are needed — exceeds default limit 1000. Fix: increase limit with sys.setrecursionlimit(), or rewrite iteratively. Python does NOT optimize tail calls."},
  ],
  t3:[
    {q:"Hanoi(n, src, dst, aux): if n==1: move(src,dst); else: Hanoi(n-1,src,aux,dst); move(src,dst); Hanoi(n-1,aux,dst,src). Count total moves T(n). Prove T(n)=2^n−1.",a:"T(n)=2^n−1",sol:"T(1)=1. T(n)=2T(n−1)+1. Solve: T(n)+1=2(T(n−1)+1). Let S(n)=T(n)+1. S(n)=2S(n−1), S(1)=2. So S(n)=2^n and T(n)=2^n−1. This is also the minimum number of moves — every algorithm requires at least 2^n−1 moves. □"},
  ],
  traps:["Recursion DEPTH (stack) ≠ total CALLS (time). fib(40) makes ~2^40 calls but has depth only 40.","Python does not optimize tail calls — tail recursion still grows the stack.","Memoization converts exponential calls to polynomial by caching. Without it, even simple DP problems like Fibonacci are O(2^n)."],
  links:["algo.complex","algo.recurr","algo.dp","pyth.recur"],
},
"algo.amort":{
  hook:"Amortized analysis gives the true average cost per operation in a sequence, even when individual operations vary wildly. It explains why dynamic arrays and path compression are efficient.",
  def:"Three methods: (1) Aggregate: total cost/n. (2) Accounting: charge each op a fixed 'credit'; leftover pays for expensive ops. (3) Potential: Φ(state) measures stored 'energy'; amortized cost = actual + ΔΦ.",
  insight:"Dynamic array doubling: most append() calls are O(1). Occasionally, doubling the array costs O(n). Aggregate analysis: n appends cost O(1+2+4+...+n)=O(2n)=O(n) total → O(1) amortized each. The expensive operations are rare enough that spreading the cost makes each operation effectively constant-time.",
  t1:[
    {q:"A dynamic array starts at capacity 1 and doubles when full. After n insertions, what is the total number of copy operations?",a:"< 2n (amortized O(1) per insert)",sol:"Copies at doublings: 1+2+4+...+n/2 < 2n. Total insertions + copies < 3n = O(n). Amortized cost per insertion = O(1)."},
    {q:"Stack with operations Push(O(1)) and MultiPop(k) which pops min(k, stack size) elements. If n Push operations and m MultiPop operations, what is total time?",a:"O(n)",sol:"Each element is pushed once and popped at most once. Total pops ≤ total pushes ≤ n. So total time = O(n), regardless of m."},
  ],
  t2:[
    {q:"Potential method for binary counter: Φ=number of 1-bits. Show amortized cost of Increment is O(1).",a:"Amortized cost = 2",sol:"Increment flips k trailing 1s to 0 and one 0 to 1. Actual cost=k+1. ΔΦ=1−k (gained one 1, lost k ones). Amortized=actual+ΔΦ=(k+1)+(1−k)=2=O(1). Total cost of n increments ≤ 2n = O(n). □"},
    {q:"Union-Find with path compression: what is the amortized time per operation for a sequence of n operations?",a:"O(α(n)) where α is the inverse Ackermann function (effectively O(1))",sol:"With both union-by-rank and path compression, the amortized cost per operation is O(α(n)). α grows so slowly that α(n)≤4 for all practical n. This result (Tarjan 1975) is one of the deepest in algorithm analysis."},
  ],
  t3:[
    {q:"Prove using the potential method that n operations on a Fibonacci heap (with Decrease-Key and Extract-Min) have total cost O(n log n).",a:"Potential analysis sketch.",sol:"Define Φ=number of trees in heap + 2·(number of marked nodes). Extract-Min: consolidation merges trees, actual cost O(log n), ΔΦ ≤ O(log n)−current trees. Amortized = O(log n). Decrease-Key: actual O(1) cut operations; each cut decreases Φ by 1 (tree added) + 2 if mark set. Amortized O(1). Over n operations with O(n) Decrease-Keys and O(n log n) total extract-mins: total O(n log n). This analysis makes Dijkstra with Fibonacci heap O(V log V + E)."},
  ],
  traps:["Amortized O(1) does NOT mean every individual operation is O(1). It means the average is O(1) over a sequence.","The potential Φ must be non-negative and start at 0. If Φ can go negative, the analysis fails.","Amortized ≠ average-case (probabilistic). Amortized is a worst-case bound on the average."],
  links:["algo.complex","algo.recurr","dsa.trees","dsa.dp2"],
},
"algo.dp":{
  hook:"Dynamic programming is recursion with memory. It converts exponential-time recursion into polynomial-time computation by storing subproblem solutions.",
  def:"DP requires: (1) Optimal substructure — optimal solution uses optimal sub-solutions. (2) Overlapping subproblems — same subproblems recur. Approaches: top-down (memoization) or bottom-up (tabulation). Identify state → write recurrence → order computation → trace solution.",
  insight:"The DP state is everything you need to solve the subproblem. Choosing the right state is the hard part. Too large a state space → MLE. Too small → missing information. Many DP questions have a 2D state (index + budget/capacity/sum). The recurrence almost always comes from 'include item k or exclude it'.",
  t1:[
    {q:"Fibonacci: fib(n)=fib(n-1)+fib(n-2), fib(0)=0, fib(1)=1. Write the DP recurrence and state the time/space complexity.",a:"O(n) time, O(1) space (rolling array)",sol:"State: dp[i]=fib(i). Recurrence: dp[i]=dp[i-1]+dp[i-2]. Compute bottom-up from i=2 to n. Only need last two values → O(1) space."},
    {q:"0/1 Knapsack: n items with weights w[i] and values v[i], capacity W. State the DP recurrence.",a:"dp[i][j]=max(dp[i-1][j], dp[i-1][j-w[i]]+v[i])",sol:"dp[i][j] = max value using first i items with capacity j. If w[i]>j: dp[i][j]=dp[i-1][j]. Else: dp[i][j]=max(dp[i-1][j], dp[i-1][j-w[i]]+v[i]). Time: O(nW). Space: O(W) with rolling array."},
  ],
  t2:[
    {q:"Longest Common Subsequence (LCS) of strings X[1..m], Y[1..n]. Write the recurrence.",a:"dp[i][j]=dp[i-1][j-1]+1 if X[i]=Y[j], else max(dp[i-1][j], dp[i][j-1])",sol:"dp[i][j]=LCS length of X[1..i] and Y[1..j]. Base: dp[0][j]=dp[i][0]=0. Recurrence as stated. Time: O(mn). Space: O(min(m,n)) with rolling row."},
    {q:"Edit distance (Levenshtein) between strings. Write the recurrence for dp[i][j]=edit distance of X[1..i] and Y[1..j].",a:"dp[i][j]=dp[i-1][j-1] if X[i]=Y[j], else 1+min(dp[i-1][j], dp[i][j-1], dp[i-1][j-1])",sol:"Three operations: insert (dp[i][j-1]+1), delete (dp[i-1][j]+1), replace (dp[i-1][j-1]+1). If X[i]=Y[j], no operation needed: dp[i][j]=dp[i-1][j-1]."},
  ],
  t3:[
    {q:"Matrix Chain Multiplication: given matrices A₁...Aₙ with dimensions p₀×p₁, p₁×p₂,...,pₙ₋₁×pₙ, find the optimal parenthesization. Give the recurrence and time complexity.",a:"O(n³) time.",sol:"dp[i][j]=min scalar multiplications to compute product of matrices i through j. dp[i][i]=0. dp[i][j]=min_{k=i}^{j-1} dp[i][k]+dp[k+1][j]+p_{i-1}·pₖ·pⱼ. Fill table in order of chain length (j-i). Time: O(n³), space: O(n²). The optimal substructure: if the optimal split is at k, then both halves are also optimally computed."},
  ],
  traps:["Overlapping subproblems ≠ greedy. Greedy makes one choice. DP tries all choices and picks the best.","0/1 Knapsack is NOT greedy-solvable in general. Fractional knapsack IS greedy (sort by value/weight). Confusing them is a classic trap.","DP order matters: when computing dp[i][j], all dependencies dp[i'][j'] must already be computed. Draw the dependency graph first."],
  links:["algo.recurr","algo.recurse","dsa.dp2","ai.mdp"],
},

"pyth.mut":{
  hook:"Python's mutable default arguments are one of the most common traps. The default value is created ONCE at function definition — not once per call.",
  def:"Default arguments are evaluated once when def is executed. Mutable defaults (lists, dicts) persist across calls. The id() of the default list stays the same across all calls that don't override it. Use None + explicit creation inside the function to avoid this.",
  insight:"This is not a bug — it is a documented feature. But it surprises almost everyone. The fix is canonical: def f(x, lst=None): if lst is None: lst = []. The None sentinel pattern is idiomatic Python. This exact trap appears constantly in Python reasoning.",
  t1:[
    {q:"def f(x, lst=[]): lst.append(x); return lst\nprint(f(1))\nprint(f(2))\nWhat is the output?",a:"[1]\n[1, 2]",sol:"The default lst=[] is created once. First call: append(1), return [1]. Second call: lst still refers to the SAME list [1]; append(2) → [1,2]."},
    {q:"How do you fix the mutable default argument bug?",a:"Use None as default, create inside the function",sol:"def f(x, lst=None):\n    if lst is None: lst = []\n    lst.append(x)\n    return lst\nNow each call gets a fresh list."},
  ],
  t2:[
    {q:"def counter(n, seen={}):\n    seen[n] = seen.get(n,0)+1\n    return seen[n]\nprint(counter(1))\nprint(counter(2))\nprint(counter(1))\nWhat does this print?",a:"1\n1\n2",sol:"seen persists across calls. First counter(1): seen={1:1}, returns 1. counter(2): seen={1:1,2:1}, returns 1. counter(1): seen={1:2,2:1}, returns 2. The dict accumulates across calls."},
    {q:"def f(a=[]):\n    a += [1]\n    return a\nf()\nf()\nprint(f())",a:"[1, 1, 1]",sol:"a+=[1] is equivalent to a.extend([1]) — it mutates the list in place. The default list grows with each call. After three calls: [1,1,1]."},
  ],
  t3:[
    {q:"Explain WHY Python implements default arguments this way (not as a bug, but as a design consequence). What object model property makes this inevitable?",a:"Functions are objects; defaults stored as function attributes.",sol:"In Python, def creates a function object. Default values are stored in __defaults__ (a tuple). This tuple is created once when def executes. Since tuples hold references (not copies), a mutable object in __defaults__ is shared. This is consistent with Python's object model: assignment creates bindings, not copies. There is no implicit copying anywhere in Python. The 'fix' (None sentinel) explicitly creates a new object on each call inside the function body."},
  ],
  traps:["a+=[1] mutates a (list) in place. a=a+[1] creates a NEW list and rebinds a — with mutable defaults, these behave differently.","Integer and string defaults are safe — they are immutable. Only mutable defaults (list, dict, set) cause this issue.","This trap appears even in interview settings and production code — understanding WHY (function objects, __defaults__) is more valuable than just memorizing the rule."],

"pyth.scope":{
  hook:"Python closures capture variables by reference, not by value. Late binding means the value of a captured variable is looked up at call time, not at definition time.",
  def:"LEGB scope rule: Local → Enclosing → Global → Builtin. A closure captures variables from the enclosing scope by reference. The variable's value is resolved at function call time — this is late binding.",
  insight:"The classic trap: [lambda: i for i in range(5)]. All lambdas share the same i variable; by the time you call them, i=4. The fix: [lambda i=i: i for i in range(5)] — using a default argument creates a local binding at definition time.",
  t1:[
    {q:"fns = [lambda: i for i in range(3)]\nprint(fns[0](), fns[1](), fns[2]())",a:"2 2 2",sol:"All lambdas close over the same variable i. After the loop, i=2. Calling any lambda looks up i at that moment → 2."},
    {q:"x = 10\ndef f():\n    x = 20\n    def g(): return x\n    return g\nprint(f()())",a:"20",sol:"g closes over the x in f's scope (=20). LEGB: Local(g has no x), Enclosing(f: x=20) → returns 20."},
  ],
  t2:[
    {q:"Fix the late-binding closure: fns = [lambda: i for i in range(3)] so each lambda captures its own value of i.",a:"fns = [lambda i=i: i for i in range(3)]",sol:"Using default argument i=i evaluates i at definition time (not call time) and binds it as a local parameter. fns[0]()=0, fns[1]()=1, fns[2]()=2."},
    {q:"def make_adder(n):\n    def adder(x): return x + n\n    return adder\nadd5 = make_adder(5)\nprint(add5(3))",a:"8",sol:"adder closes over n from make_adder's scope. When make_adder(5) is called, n=5 is bound in make_adder's local scope. adder captures that scope. add5(3) returns 3+5=8. This is a correct closure (n doesn't change after make_adder returns)."},
  ],
  t3:[
    {q:"Python uses lexical (static) scoping via LEGB. Explain how Python resolves a variable name at runtime — trace through the lookup for a variable that doesn't exist locally.",a:"LEGB lookup with cell objects.",sol:"At compile time, Python detects if a variable is assigned in the local scope. If not assigned locally but referenced, it becomes a 'free variable' captured via a cell object. At runtime: (1) Check locals (fast locals array). (2) Check enclosing scope(s) via cells. (3) Check globals (dict). (4) Check builtins (dict). If not found: NameError. Closures use cell objects — a shared mutable box. If the enclosing function modifies the variable after the closure is created, the closure sees the new value (late binding). To force early binding: use default arg or explicitly copy."},
  ],
  traps:["Late binding affects closures in loops — all closures see the final loop variable value.","global and nonlocal keywords are needed to assign (not just read) to outer scope variables.","Lambda is syntactic sugar for def — it has the same scoping rules, not special ones."],
  links:["pyth.mut","pyth.recur","pyth.ds"],
},
"pyth.recur":{
  hook:"Python recursion has a default depth limit of 1000. Understanding when recursion vs iteration is appropriate — and how Python handles the call stack — matters for writing reliable Python.",
  def:"Each recursive call creates a new stack frame in Python. Default sys.getrecursionlimit()=1000. No tail-call optimization. Recursive time/space analysis: time=T(n) recurrence, space=O(max depth).",
  insight:"Python is NOT designed for deep recursion. The CPython implementation maintains an explicit call stack in C; each Python frame has overhead. Trace recursive calls carefully, count unique calls vs repeated calls, and know that sys.setrecursionlimit is the fix for deeper recursion (not TCO).",
  t1:[
    {q:"def fact(n): return 1 if n==0 else n*fact(n-1)\nHow many stack frames exist when computing fact(5)?",a:"6 frames (fact(5) through fact(0))",sol:"fact(5) calls fact(4) calls...calls fact(0). At deepest point: 6 frames on the call stack simultaneously."},
    {q:"def fib(n): return n if n<=1 else fib(n-1)+fib(n-2)\nHow many times is fib(2) called when computing fib(5)?",a:"3 times",sol:"Draw the recursion tree: fib(5)→fib(4)+fib(3). fib(4)→fib(3)+fib(2). fib(3)→fib(2)+fib(1). So fib(2) appears at: fib(4)'s right child, fib(3)'s right child (×2 from fib(5)→fib(3) and fib(4)→fib(3)). Total: 3."},
  ],
  t2:[
    {q:"Convert recursive DFS to iterative using an explicit stack. def dfs(node, visited=set()): visited.add(node); for nb in adj[node]: if nb not in visited: dfs(nb, visited)",a:"Use explicit stack, same logic",sol:"stack=[start]; visited={start}\nwhile stack:\n    node=stack.pop()\n    for nb in adj[node]:\n        if nb not in visited:\n            visited.add(nb)\n            stack.append(nb)\nNote: visited set has the mutable default argument trap (see pyth.mut)!"},
    {q:"def power(x, n):\n    if n==0: return 1\n    if n%2==0: h=power(x,n//2); return h*h\n    return x*power(x,n-1)\nWhat is the time complexity?",a:"O(log n)",sol:"Recurrence: T(n)=T(n/2)+O(1) for even n. By Master theorem: O(log n). This is fast exponentiation (squaring). Each step halves n."},
  ],
  t3:[
    {q:"Python closures inside recursion: def f(n):\n    if n==0: return lambda: 0\n    inner = f(n-1)\n    return lambda: n + inner()\nprint(f(3)()). What does this print? Trace the closure chain.",a:"6",sol:"f(3) creates lambda: 3+inner() where inner=f(2). f(2) creates lambda: 2+inner() where inner=f(1). f(1) creates lambda: 1+inner() where inner=f(0)=lambda:0. Calling f(3)(): 3+(2+(1+0))=6. Each lambda closes over its own n (local to that call frame) and its own inner. Since the recursion unwinds before any lambda is called, there is no late-binding issue here (n is in a call frame, not a loop variable)."},
  ],
  traps:["sys.getrecursionlimit()=1000 is the default. For n>~900, recursive solutions silently crash with RecursionError.","Python creates a new frame for EVERY call — no TCO. A 'tail-recursive' function in Python still grows the stack.","Mutual recursion (A calls B calls A) counts doubly toward the limit."],
  links:["algo.recurse","pyth.mut","pyth.scope","pyth.ds"],
},
"pyth.ds":{
  hook:"Python's built-in data structures have specific time complexities worth internalizing. Knowing list vs deque vs dict vs set for each operation is essential.",
  def:"List: O(1) append/pop (end), O(n) insert/pop (middle). Dict/Set: O(1) average lookup/insert/delete (hash table). Deque: O(1) both ends. Heap (heapq): O(log n) push/pop, O(n) heapify.",
  insight:"The most common trap: using list.insert(0, x) thinking it's O(1) — it's O(n) (must shift all elements). Use collections.deque for O(1) both-end operations. Similarly, 'x in list' is O(n); 'x in set' is O(1). Choosing the right data structure is algorithm design.",
  t1:[
    {q:"What is the time complexity of: lst = [1,2,...,n]; lst.insert(0, 0)?",a:"O(n)",sol:"Inserting at position 0 shifts all n elements right by one. This is O(n). list.append() is O(1) amortized because it inserts at the end."},
    {q:"d = {}; for k in ['a','b','a','c','a']: d[k] = d.get(k,0)+1. What does d contain?",a:"{'a':3, 'b':1, 'c':1}",sol:"d.get(k,0) returns 0 if k not in d. After loop: a appeared 3 times, b and c once each."},
  ],
  t2:[
    {q:"Given a list L of n integers, write O(n) code to find all duplicates.",a:"Use a set for O(1) lookup",sol:"seen=set(); dups=[]\nfor x in L:\n    if x in seen: dups.append(x)\n    else: seen.add(x)\nO(n) total — each 'in set' check is O(1) average."},
    {q:"Python dict preserves insertion order (3.7+). What is the output?\nd={'b':2,'a':1,'c':3}\nfor k in d: print(k)",a:"b a c",sol:"Dict iteration follows insertion order since Python 3.7. Output: b, a, c."},
  ],
  t3:[
    {q:"Implement a stack using two queues (using Python's collections.deque). Each push is O(1) amortized, each pop is O(n). Describe the algorithm and analyze.",a:"See solution.",sol:"Use two deques: q1 (main), q2 (temp). Push: q1.appendleft(x) — O(1). Pop: move all but last from q1 to q2, pop last element of q1, swap q1,q2. Pop cost: O(n). Alternative: make push O(n) and pop O(1) by maintaining a 'reversed' queue. Trade-off: which operation is more frequent? In a typical stack-heavy algorithm, O(1) push with O(n) pop is better."},
  ],
  traps:["list.pop() (from end) is O(1). list.pop(0) (from front) is O(n) — shifts all elements.","set and dict have average O(1) but worst-case O(n) for lookup (hash collisions). Use average-case lookup unless a worst-case analysis is requested.","heapq in Python is a min-heap. For max-heap, negate values: heapq.heappush(h, -x)."],
  links:["pyth.mut","pyth.scope","dsa.arrays","dsa.trees"],
},
"pyth.iter":{
  hook:"Generators and iterators produce values lazily — one at a time, on demand. They enable processing infinite sequences and large data without loading everything into memory.",
  def:"Iterator: object with __iter__() and __next__(). Generator function: uses yield instead of return; returns a generator object. Generator expression: (x for x in iterable). Lazy evaluation: values computed only when requested.",
  insight:"The key difference: list comprehension [f(x) for x in it] computes ALL values eagerly (O(n) memory). Generator (f(x) for x in it) computes values one at a time (O(1) memory). Generator practice often asks: what does next() return, how does yield work, and what happens when you iterate a generator twice.",
  t1:[
    {q:"def gen():\n    yield 1\n    yield 2\n    yield 3\ng = gen()\nprint(next(g), next(g))",a:"1 2",sol:"gen() returns a generator object (does not execute). next(g) executes until first yield → 1, pauses. next(g) resumes, executes until second yield → 2."},
    {q:"g = (x**2 for x in range(5))\nprint(list(g))\nprint(list(g))",a:"[0, 1, 4, 9, 16]\n[]",sol:"First list(g) exhausts the generator. Generators are one-use — second list(g) returns empty."},
  ],
  t2:[
    {q:"def countdown(n):\n    while n>0:\n        yield n\n        n -= 1\nfor x in countdown(3): print(x)",a:"3\n2\n1",sol:"The for loop calls next() repeatedly until StopIteration. Each call resumes after yield. Execution: yield 3 (print 3) → n=2 → yield 2 (print 2) → n=1 → yield 1 (print 1) → n=0 → loop ends → StopIteration."},
    {q:"Memory comparison: list vs generator for sum of squares up to n=10⁷.",a:"Generator: O(1) memory vs list: O(n)",sol:"sum(x**2 for x in range(10**7)) uses O(1) memory — only one value at a time. sum([x**2 for x in range(10**7)]) creates a list of 10^7 integers first (~400MB). Generator is always preferred for large sequences with a single pass."},
  ],
  t3:[
    {q:"Implement an infinite Fibonacci generator and explain how Python's generator protocol enables this without infinite loops consuming resources.",a:"Lazy infinite sequence.",sol:"def fib_gen():\n    a, b = 0, 1\n    while True:\n        yield a\n        a, b = b, a+b\ng = fib_gen()\nfor _ in range(10): print(next(g))\nThe while True loop doesn't run to completion — yield suspends execution and returns control to the caller. The generator's state (a, b, instruction pointer) is preserved between next() calls. This is cooperative multitasking: the generator runs only when asked. Python implements this via a coroutine state machine compiled from the function's bytecode."},
  ],
  traps:["Generators are exhausted after one pass. Iterating twice gives nothing the second time.","yield inside a function makes it a generator function — calling it returns a generator, it does NOT execute the body.","Generator expressions are lazy; list comprehensions are eager. [(x) for ...] vs (x for ...) — only the outer brackets differ."],
  links:["pyth.ds","pyth.recur","dsa.arrays"],
},

  ],
  t2:[
    {q:"Prove ΣᵢΣⱼ(xᵢ−xⱼ)²=2n·Σᵢ(xᵢ−x̄)².",a:"Proof via expansion.",sol:"(xᵢ−xⱼ)²=((xᵢ−x̄)−(xⱼ−x̄))²=(xᵢ−x̄)²−2(xᵢ−x̄)(xⱼ−x̄)+(xⱼ−x̄)². Sum ΣᵢΣⱼ: first term: Σⱼ·Σᵢ(xᵢ−x̄)²=n·S where S=Σᵢ(xᵢ−x̄)². Third term: same. Cross term: −2·(Σᵢ(xᵢ−x̄))·(Σⱼ(xⱼ−x̄))=0 (since deviations from mean sum to 0). Total: 2nS. □"},
    {q:"X,Y continuous with joint PDF f(x,y)=6x for 0<x<y<1. Find the marginal f_X(x).",a:"6x(1−x)",sol:"f_X(x)=∫_x^1 6x dy=6x(1−x) for 0<x<1. (y ranges from x to 1 since x<y<1.)"},
  ],
  t3:[
    {q:"Prove: if X and Y have joint PDF that factors as f(x,y)=g(x)h(y), then X and Y are independent.",a:"Proof.",sol:"Marginal f_X(x)=∫g(x)h(y)dy=g(x)·∫h(y)dy=g(x)·C₁. Similarly f_Y(y)=h(y)·C₂. Since ∫∫f(x,y)dxdy=1: C₁C₂·(∫g(x)dx)(∫h(y)dy)... wait, C₁=∫h(y)dy and C₂=∫g(x)dx, so C₁C₂=1. Thus f(x,y)=g(x)h(y)=[g(x)/C₂]·[h(y)/C₁]=f_X(x)·f_Y(y). By definition, X⊥Y. □"},
  ],
  traps:["Marginal of joint: sum/integrate OUT the other variable. Don't confuse marginal with conditional.","Zero covariance only means no LINEAR dependence. Independent ⟹ Cov=0, but Cov=0 does NOT imply independence.","For continuous distributions, P(X=x)=0 for every specific x. Use intervals: P(a<X<b)=∫_a^b f(x)dx."],
  links:["cond.indep","prob.expvar","prob.clt","stat.mle"],
},
"prob.clt":{
  hook:"The Central Limit Theorem is the reason statistics works: averages of independent observations are approximately Normal, regardless of the original distribution. The LLN says averages converge; the CLT says how fast.",
  def:"LLN: X̄_n=Σᵢ Xᵢ/n →_p μ as n→∞ (weak LLN). CLT: √n(X̄_n−μ)/σ →_d N(0,1). Standardization: if X̄_n≈N(μ,σ²/n), then Z=(X̄_n−μ)/(σ/√n)~N(0,1) approximately.",
  insight:"CLT shows up in two common ways: (1) Normal approximation to Binomial/Poisson. (2) Hypothesis testing (Z-test). For Binomial(n,p): X≈N(np, np(1−p)) for large n. For Poisson(λ): X≈N(λ,λ) for large λ. The connection P(Poisson(n)≤n)→0.5 is a direct application.",
  t1:[
    {q:"X̄ is the mean of 100 observations from a distribution with μ=10, σ=5. Find P(9≤X̄≤11) approximately.",a:"≈0.9545",sol:"X̄~N(10, 25/100)=N(10, 0.25). σ_{X̄}=0.5. P(9≤X̄≤11)=P((9−10)/0.5≤Z≤(11−10)/0.5)=P(−2≤Z≤2)≈0.9545."},
    {q:"X~Binomial(400, 0.5). Approximate P(X≤210).",a:"≈0.8413",sol:"X≈N(200, 100). P(X≤210)=P(Z≤(210−200)/10)=P(Z≤1)≈0.8413."},
  ],
  t2:[
    {q:"Normal vs t-distribution: for testing μ with unknown σ and n=15, which distribution do you use? Why does the t-distribution have heavier tails?",a:"t-distribution with 14 df",sol:"With unknown σ, replace σ with sample s: T=(X̄−μ)/(s/√n)~t(n−1). t-distribution has heavier tails because s itself is random — there's additional uncertainty. As n→∞, t(n−1)→N(0,1). For n=15 (small sample), the difference from Normal is substantial."},
    {q:"LLN vs CLT: X₁,X₂,... i.i.d. Bernoulli(p). What does LLN say? What does CLT say?",a:"LLN: X̄_n→p; CLT: √n(X̄_n−p)/√(p(1−p))→N(0,1)",sol:"LLN: the sample proportion converges to the true proportion p — consistency. CLT: the fluctuations around p are Normal with std dev √(p(1−p)/n). This gives the margin of error for proportions in surveys: ±z_{α/2}·√(p̂(1−p̂)/n)."},
  ],
  t3:[
    {q:"Prove the weak LLN using Chebyshev's inequality (assuming finite variance σ²).",a:"Proof.",sol:"Want P(|X̄_n−μ|≥ε)→0. X̄_n has E[X̄_n]=μ and Var(X̄_n)=σ²/n. By Chebyshev: P(|X̄_n−μ|≥ε)≤Var(X̄_n)/ε²=σ²/(nε²)→0 as n→∞. □ This proves convergence in probability. Note: the CLT is much harder to prove (needs characteristic functions or Lindeberg condition)."},
  ],
  traps:["CLT applies to the MEAN (sum/n), not to individual observations. P(X≤x) for a single observation doesn't become Normal.","CLT requires finite variance. For heavy-tailed distributions (Cauchy), CLT fails and the sum follows a stable distribution.","Continuity correction: Binomial(n,p) approximated by Normal should use P(X≤k)≈P(Normal≤k+0.5). It is less common, but useful."],
  links:["prob.dists","prob.expvar","stat.mle","stat.ht"],
},

"stat.mle":{
  hook:"Maximum likelihood estimation finds the parameter value that makes the observed data most probable. It is the foundation of parametric statistics and nearly every ML model's training procedure.",
  def:"Given data x₁,...,xₙ i.i.d. from f(x;θ): Likelihood L(θ)=Πᵢf(xᵢ;θ). Log-likelihood ℓ(θ)=Σᵢ log f(xᵢ;θ). MLE: θ̂=argmax L(θ)=argmax ℓ(θ). MLE is consistent, asymptotically normal, and asymptotically efficient.",
  insight:"MLE for exponential family distributions always has a clean closed form: the sufficient statistic equals its expected value. For Normal: μ̂=X̄, σ̂²=(1/n)Σ(xᵢ−X̄)² (biased!). For Bernoulli: p̂=X̄. For Exponential: λ̂=1/X̄. Pattern: set ∂ℓ/∂θ=0, solve.",
  t1:[
    {q:"X₁,...,Xₙ i.i.d. Bernoulli(p). Find the MLE of p.",a:"p̂=X̄=(1/n)Σxᵢ",sol:"ℓ(p)=Σxᵢ·log(p)+(n−Σxᵢ)·log(1−p). ∂ℓ/∂p=Σxᵢ/p−(n−Σxᵢ)/(1−p)=0. Solving: p̂=Σxᵢ/n=X̄."},
    {q:"X₁,...,Xₙ i.i.d. Exponential(λ). Find MLE of λ.",a:"λ̂=1/X̄",sol:"ℓ(λ)=n·log(λ)−λΣxᵢ. ∂ℓ/∂λ=n/λ−Σxᵢ=0 ⟹ λ̂=n/Σxᵢ=1/X̄."},
  ],
  t2:[
    {q:"X₁,...,Xₙ i.i.d. N(μ,σ²) with σ² unknown. Find MLE of (μ,σ²). Is σ̂² biased?",a:"μ̂=X̄, σ̂²=(1/n)Σ(xᵢ−X̄)² (biased)",sol:"ℓ(μ,σ²)=−n/2·log(2πσ²)−Σ(xᵢ−μ)²/(2σ²). ∂ℓ/∂μ=0 ⟹ μ̂=X̄. ∂ℓ/∂σ²=0 ⟹ σ̂²=(1/n)Σ(xᵢ−X̄)². Biased: E[σ̂²]=(n−1)σ²/n≠σ². Unbiased estimator: s²=Σ(xᵢ−X̄)²/(n−1)."},
    {q:"What does 'asymptotically efficient' mean for MLE? State the Cramér-Rao bound.",a:"MLE achieves the lowest possible asymptotic variance",sol:"Cramér-Rao: for any unbiased estimator T of θ: Var(T)≥1/(n·I(θ)) where I(θ)=E[(∂log f/∂θ)²] is the Fisher information. MLE is asymptotically efficient: √n(θ̂_MLE−θ)→N(0,1/I(θ)), achieving this bound. No consistent estimator has lower asymptotic variance."},
  ],
  t3:[
    {q:"Prove MLE for the Normal distribution: show that X̄ is MLE for μ and (1/n)Σ(xᵢ−X̄)² is MLE for σ².",a:"Derivation.",sol:"Log-likelihood: ℓ(μ,σ²)=−n/2·log(2π)−n/2·log(σ²)−1/(2σ²)·Σ(xᵢ−μ)². ∂ℓ/∂μ=1/σ²·Σ(xᵢ−μ)=0 ⟹ Σxᵢ=nμ ⟹ μ̂=X̄. Substituting μ=X̄: ∂ℓ/∂σ²=−n/(2σ²)+Σ(xᵢ−X̄)²/(2σ⁴)=0 ⟹ σ̂²=Σ(xᵢ−X̄)²/n. Second derivatives confirm maximum (not saddle). □"},
  ],
  traps:["MLE σ̂² divides by n (biased). Unbiased sample variance s² divides by n−1. Check which estimator the prompt defines.","MLE maximizes L(θ), which means it's equivalent to minimizing the negative log-likelihood (NLL). NLL minimization = MLE.","For complex models, MLE may not have a closed form — then we use gradient descent on the NLL (this IS what neural net training does)."],
  links:["prob.dists","prob.expvar","stat.ci","stat.ht"],
},
"stat.ci":{
  hook:"A 95% confidence interval means: if we repeated this experiment many times, 95% of the constructed intervals would contain the true parameter. It is NOT the probability that θ lies in this particular interval.",
  def:"95% CI for μ (σ known): X̄ ± z_{0.025}·σ/√n = X̄ ± 1.96·σ/√n. With unknown σ: X̄ ± t_{n−1,0.025}·s/√n. Margin of error: E=z·σ/√n. Sample size for margin E: n=⌈(z·σ/E)²⌉.",
  insight:"The interval is random (it changes with each sample); the parameter θ is fixed. 'There is a 95% probability that θ is in this interval' is wrong — once computed, the interval either contains θ or doesn't. The correct interpretation: the PROCEDURE produces intervals that cover θ 95% of the time.",
  t1:[
    {q:"n=100, X̄=50, σ=10 (known). Find the 95% CI for μ.",a:"[48.04, 51.96]",sol:"CI: 50 ± 1.96·(10/√100)=50 ± 1.96=50±1.96. Interval: [48.04, 51.96]."},
    {q:"To estimate μ within ±2 with 95% confidence, σ=10. Find minimum n.",a:"n=97",sol:"n≥(z·σ/E)²=(1.96·10/2)²=9.8²=96.04. Round up: n=97."},
  ],
  t2:[
    {q:"n=25, X̄=42, s=8 (σ unknown). Construct a 95% CI for μ.",a:"[38.7, 45.3] (approx)",sol:"Use t(24) distribution. t_{24,0.025}≈2.064. CI: 42±2.064·(8/5)=42±3.30=[38.70, 45.30]."},
    {q:"A CI is wider when: (a) n increases (b) σ increases (c) confidence level increases. Which makes it wider?",a:"(b) and (c)",sol:"Width=2·z·σ/√n. Larger σ → wider. Higher confidence level → larger z → wider. Larger n → narrower (more data = more precision). (a) is wrong."},
  ],
  t3:[
    {q:"Show that the t-confidence interval X̄ ± t_{n−1,α/2}·s/√n has exact coverage 1−α when sampling from a Normal distribution.",a:"Proof.",sol:"X̄~N(μ,σ²/n) and (n−1)s²/σ²~χ²(n−1), independently. Then T=(X̄−μ)/(s/√n)~t(n−1) (by definition of t-distribution: Normal/√(χ²/df)). So P(−t_{α/2}≤T≤t_{α/2})=1−α. Rearranging: P(X̄−t_{α/2}·s/√n≤μ≤X̄+t_{α/2}·s/√n)=1−α. □"},
  ],
  traps:["Once the CI is computed, DO NOT say 'P(θ∈[a,b])=0.95'. The probability is 0 or 1 — θ is fixed.","t-CI uses t_{n−1}, NOT z. For n≥30, t≈z but for small n the difference matters.","CI width scales as 1/√n. Halving the width requires 4× the sample size."],
  links:["prob.clt","stat.mle","stat.ht","stat.pval"],
},
"stat.ht":{
  hook:"Hypothesis testing is a decision procedure: reject H₀ or fail to reject H₀. The structure is fixed: state hypotheses, choose test statistic, find critical region, compute p-value, decide.",
  def:"H₀ (null) vs H₁ (alternative). Test statistic T under H₀. Reject H₀ if |T|>t_{critical} (significance level α). p-value = P(|T|≥|t_observed| | H₀). Reject H₀ if p-value < α.",
  insight:"The p-value is NOT the probability that H₀ is true. It is the probability of observing data at least as extreme as what we got, assuming H₀ is true. A small p-value means our data is unusual under H₀ — it is evidence against H₀, not proof of H₁.",
  t1:[
    {q:"Z=(X̄−μ₀)/(σ/√n)=2.3 for a two-sided test. Is H₀ rejected at α=0.05?",a:"Yes (|Z|=2.3>1.96)",sol:"Critical value for α=0.05 two-sided: z_{0.025}=1.96. Since 2.3>1.96, reject H₀. The p-value=2·P(Z>2.3)≈2·0.0107=0.0214<0.05."},
