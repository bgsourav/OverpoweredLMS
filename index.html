<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Wabi — Learning System</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Manrope:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

:root {
  --bone: #EFEAE0; --bone-2: #E8E2D5; --paper: #F7F3EA;
  --ink: #14130F; --ink-2: #2E2B23; --ink-3: #5C574B; --ink-4: #94907F;
  --hair: rgba(20,19,15,0.10); --hair-2: rgba(20,19,15,0.06);
  --moss: #6F8267; --moss-2: #4D6347;
  --persimmon: #C75A3F; --gold: #B7944E;
  --page-glow-1: rgba(111,130,103,0.06); --page-glow-2: rgba(199,90,63,0.04);
  --nav-bg: rgba(239,234,224,0.85); --surface-hover: #fff;
  --hover-border: rgba(20,19,15,0.18); --muted-fill: rgba(20,19,15,0.04);
  --on-ink: #EFEAE0; --on-ink-2: rgba(239,234,224,0.85); --on-ink-3: rgba(239,234,224,0.55);
  --on-ink-hair: rgba(255,255,255,0.12); --on-ink-glow: rgba(255,255,255,0.06);
  --feature-bg: #14130F; --feature-border: #14130F;
  --feature-fg: #EFEAE0; --feature-fg-2: rgba(239,234,224,0.85); --feature-fg-3: rgba(239,234,224,0.55);
  --feature-hair: rgba(255,255,255,0.12); --feature-glow: rgba(255,255,255,0.06);
  --toast-shadow: rgba(20,19,15,0.35); --profile-shadow: rgba(20,19,15,0.20);
  --r-sm: 6px; --r-md: 14px; --r-lg: 22px;
}
[data-theme="dark"] {
  --bone: #0D1110; --bone-2: #171D1A; --paper: #121815;
  --ink: #F4EFE3; --ink-2: #DCD5C6; --ink-3: #A7A091; --ink-4: #747C72;
  --hair: rgba(244,239,227,0.12); --hair-2: rgba(244,239,227,0.07);
  --moss: #9BB58F; --moss-2: #C3D7B9;
  --persimmon: #E07B5F; --gold: #D6B86A;
  --page-glow-1: rgba(155,181,143,0.12); --page-glow-2: rgba(224,123,95,0.08);
  --nav-bg: rgba(13,17,16,0.82); --surface-hover: #18201C;
  --hover-border: rgba(244,239,227,0.22); --muted-fill: rgba(244,239,227,0.06);
  --on-ink: #0D1110; --on-ink-2: rgba(13,17,16,0.86); --on-ink-3: rgba(13,17,16,0.58);
  --on-ink-hair: rgba(13,17,16,0.14); --on-ink-glow: rgba(13,17,16,0.06);
  --feature-bg: #151B18; --feature-border: rgba(244,239,227,0.11);
  --feature-fg: #F4EFE3; --feature-fg-2: rgba(244,239,227,0.84); --feature-fg-3: rgba(244,239,227,0.52);
  --feature-hair: rgba(244,239,227,0.12); --feature-glow: rgba(155,181,143,0.10);
  --toast-shadow: rgba(0,0,0,0.45); --profile-shadow: rgba(0,0,0,0.36);
}
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; min-height: 100%; }
html { color-scheme: light; }
html[data-theme="dark"] { color-scheme: dark; }
body {
  background: radial-gradient(800px 600px at 90% 0%, var(--page-glow-1), transparent 60%),
              radial-gradient(700px 500px at 0% 100%, var(--page-glow-2), transparent 70%), var(--bone);
  background-attachment: fixed;
  color: var(--ink); font-family: "Manrope", system-ui, sans-serif;
  font-weight: 400; font-size: 14px; line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  transition: background-color 220ms ease, color 220ms ease;
}
#root { position: relative; z-index: 1; }
::selection { background: rgba(111,130,103,0.22); color: var(--ink); }

/* ── Type ── */
.display { font-family: "Space Grotesk", sans-serif; font-weight: 500; letter-spacing: -0.02em; }
.mono    { font-family: "JetBrains Mono", monospace; letter-spacing: 0.04em; }
.eyebrow { font-family: "JetBrains Mono", monospace; font-size: 11px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--ink-3); }
.eyebrow.a { color: var(--moss); }
.eyebrow .dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: var(--moss); margin-right: 8px; vertical-align: middle; }

/* ── Nav ── */
.nav {
  position: sticky; top: 0; z-index: 30;
  display: grid; grid-template-columns: 1fr auto 1fr; gap: 24px;
  padding: 22px 40px; align-items: center;
  background: var(--nav-bg); backdrop-filter: blur(14px);
  border-bottom: 1px solid var(--hair);
}
.brand { display: flex; align-items: center; gap: 14px; cursor: pointer; }
.brand .mark { width: 32px; height: 32px; border-radius: 50%; background: var(--ink); color: var(--bone); display: grid; place-items: center; font-family: "Space Grotesk", sans-serif; font-weight: 700; font-size: 14px; }
.brand .b1 { font-family: "Space Grotesk", sans-serif; font-weight: 600; font-size: 16px; letter-spacing: -0.01em; line-height: 1; }
.brand .b2 { font-family: "JetBrains Mono", monospace; font-size: 10px; color: var(--ink-3); letter-spacing: 0.22em; text-transform: uppercase; margin-top: 3px; }
.nav-links { display: flex; gap: 4px; }
.nav-link { padding: 9px 16px; font-family: "Manrope", sans-serif; font-weight: 500; font-size: 13px; cursor: pointer; color: var(--ink-2); position: relative; transition: color 200ms; }
.nav-link::after { content: ""; position: absolute; left: 16px; right: 16px; bottom: 4px; height: 1px; background: var(--ink); transform: scaleX(0); transform-origin: left; transition: transform 240ms cubic-bezier(.2,.7,.2,1); }
.nav-link:hover::after { transform: scaleX(1); }
.nav-link.active { color: var(--ink); }
.nav-link.active::after { transform: scaleX(1); background: var(--moss); }
.nav-right { display: flex; gap: 14px; justify-content: flex-end; align-items: center; }
.chip { display: inline-flex; align-items: center; gap: 8px; padding: 7px 14px; border: 1px solid var(--hair); border-radius: 999px; background: var(--paper); font-size: 12.5px; }
.chip .num { font-family: "Space Grotesk", sans-serif; font-weight: 600; }
.chip .lbl { color: var(--ink-3); }
.theme-toggle {
  width: 96px; height: 34px; padding: 0 10px; border: 1px solid var(--hair);
  border-radius: 999px; background: var(--paper); color: var(--ink-3);
  display: grid; grid-template-columns: 1fr 1fr; align-items: center;
  position: relative; cursor: pointer; font-family: "JetBrains Mono", monospace;
  font-size: 9.5px; letter-spacing: 0.14em; text-transform: uppercase;
  transition: border-color 200ms, background 200ms, color 200ms;
}
.theme-toggle:hover { border-color: var(--hover-border); color: var(--ink); }
.theme-toggle .mode { position: relative; z-index: 2; text-align: center; transition: color 200ms; }
.theme-toggle .mode.active { color: var(--bone); }
.theme-toggle .knob {
  position: absolute; z-index: 1; top: 4px; left: 4px; width: 43px; height: 24px;
  border-radius: 999px; background: var(--ink);
  box-shadow: 0 10px 20px rgba(0,0,0,0.12);
  transition: transform 240ms cubic-bezier(.2,.7,.2,1), background 200ms;
}
.theme-toggle.dark .knob { transform: translateX(43px); }
.theme-toggle.dark .mode.active { color: var(--bone); }

/* ── Shell ── */
.page { padding: 80px 40px 120px; }
.wrap { max-width: 1240px; margin: 0 auto; }
.crumbs { font-family: "JetBrains Mono", monospace; font-size: 10.5px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--ink-3); margin-bottom: 36px; }
.crumbs a { color: var(--moss); text-decoration: none; cursor: pointer; }
.crumbs a:hover { color: var(--ink); }
.crumbs .sep { margin: 0 10px; opacity: 0.5; }
.foot { padding: 60px 40px; text-align: center; color: var(--ink-3); font-size: 12.5px; }
.foot .display { font-family: "Space Grotesk", sans-serif; font-weight: 500; color: var(--ink); font-size: 16px; }

/* ── Buttons ── */
.btn { display: inline-flex; align-items: center; gap: 12px; padding: 13px 26px; border-radius: 999px; font-family: "Manrope", sans-serif; font-weight: 500; font-size: 14px; background: var(--ink); color: var(--bone); border: 1px solid var(--ink); cursor: pointer; transition: transform 220ms cubic-bezier(.2,.7,.2,1), background 220ms, color 220ms; }
.btn:hover { background: var(--moss-2); border-color: var(--moss-2); transform: translateY(-1px); }
.btn .arrow { transition: transform 220ms; }
.btn:hover .arrow { transform: translateX(3px); }
.btn.ghost { background: transparent; color: var(--ink); border-color: var(--ink); }
.btn.ghost:hover { background: var(--ink); color: var(--bone); }
.btn.moss { background: var(--moss); border-color: var(--moss); }
.btn.moss:hover { background: var(--moss-2); border-color: var(--moss-2); }
.btn.persimmon { background: var(--persimmon); border-color: var(--persimmon); color: var(--bone); }
.btn.persimmon:hover { background: #A4452B; border-color: #A4452B; }
.btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }
.stone { width: 12px; height: 12px; border-radius: 50%; background: var(--moss); display: inline-block; box-shadow: 0 0 0 4px rgba(111,130,103,0.12); }
.stone.pending { background: var(--ink-4); box-shadow: 0 0 0 4px var(--muted-fill); }
.stone.empty { background: transparent; border: 1px dashed var(--ink-4); box-shadow: none; }

/* ── HOME: Foundation layer ── */
.home-hero { padding: 30px 0 80px; display: grid; grid-template-columns: 1.6fr 1fr; gap: 60px; align-items: end; }
.home-hero .l-tag { display: flex; gap: 16px; align-items: center; margin-bottom: 32px; }
.home-hero .l-tag .line { flex: 1; max-width: 60px; height: 1px; background: var(--ink); }
.home-hero h1 { font-family: "Space Grotesk", sans-serif; font-weight: 500; font-size: clamp(48px, 6.5vw, 112px); line-height: 0.92; margin: 0; letter-spacing: -0.035em; }
.home-hero h1 .br { display: block; }
.home-hero h1 .moss { color: var(--moss); }
.home-hero .lead { font-size: 16px; color: var(--ink-3); margin: 32px 0 0; max-width: 460px; line-height: 1.75; }
.home-hero .lead em { font-style: normal; color: var(--ink); border-bottom: 1px solid var(--moss); }
.hero-ctas { margin-top: 32px; display: flex; gap: 12px; flex-wrap: wrap; }
.home-hero .aside { display: flex; flex-direction: column; gap: 24px; }

.continue-tile { padding: 28px 30px; border-radius: var(--r-lg); background: var(--paper); border: 1px solid var(--hair); cursor: pointer; transition: transform 260ms cubic-bezier(.2,.7,.2,1), background 240ms; }
.continue-tile:hover { transform: translateY(-3px); background: var(--surface-hover); }
.continue-tile .ct-tag { display: flex; align-items: center; justify-content: space-between; }
.continue-tile h3 { font-family: "Space Grotesk", sans-serif; font-weight: 500; font-size: 24px; letter-spacing: -0.02em; line-height: 1.1; margin: 12px 0 6px; }
.continue-tile .ct-sub { color: var(--ink-3); font-size: 13px; }
.continue-tile .ct-bar { height: 1px; background: var(--hair); margin: 18px 0 10px; position: relative; }
.continue-tile .ct-bar > span { position: absolute; left: 0; top: -1px; height: 3px; width: var(--p, 0%); background: var(--moss); transition: width 700ms cubic-bezier(.2,.7,.2,1); }
.continue-tile .ct-foot { display: flex; justify-content: space-between; font-family: "JetBrains Mono", monospace; font-size: 11px; letter-spacing: 0.1em; color: var(--ink-3); }
.continue-tile .ct-foot .pct { color: var(--moss); font-weight: 500; }
.tiles { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
.tile { padding: 18px; border-radius: var(--r-md); background: var(--paper); border: 1px solid var(--hair); }
.tile .l { font-family: "JetBrains Mono", monospace; font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--ink-3); }
.tile .v { font-family: "Space Grotesk", sans-serif; font-weight: 600; font-size: 26px; letter-spacing: -0.02em; line-height: 1; margin-top: 6px; }
.tile .v.moss { color: var(--moss); }
.tile .v .suffix { font-size: 14px; color: var(--ink-3); }

/* Foundation pillars grid */
.section-label { display: flex; align-items: center; gap: 16px; margin-bottom: 28px; }
.section-label .sl-title { font-family: "Space Grotesk", sans-serif; font-weight: 500; font-size: 13px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--ink-3); }
.section-label::after { content: ""; flex: 1; height: 1px; background: var(--hair); }

.foundation-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 14px; margin-bottom: 64px; }
.found-card { 
  padding: 22px 20px 20px; border-radius: var(--r-md);
  background: var(--feature-bg); color: var(--feature-fg); border: 1px solid var(--feature-border);
  cursor: pointer; position: relative; overflow: hidden;
  transition: transform 260ms cubic-bezier(.2,.7,.2,1);
}
.found-card::before { content: ""; position: absolute; right: -30%; top: -30%; width: 80%; height: 80%; background: radial-gradient(circle, var(--feature-glow), transparent 60%); pointer-events: none; }
.found-card:hover { transform: translateY(-3px); }
.found-card .fc-num { font-family: "JetBrains Mono", monospace; font-size: 10px; letter-spacing: 0.22em; color: var(--feature-fg-3); margin-bottom: 12px; }
.found-card .fc-glyph { font-family: "Space Grotesk", sans-serif; font-weight: 700; font-size: 36px; letter-spacing: -0.03em; color: var(--feature-fg); line-height: 1; margin-bottom: 10px; }
.found-card .fc-name { font-family: "Space Grotesk", sans-serif; font-weight: 500; font-size: 13px; letter-spacing: -0.01em; color: var(--feature-fg-2); line-height: 1.3; }
.found-card .fc-tag { font-size: 11px; color: var(--feature-fg-3); margin-top: 6px; line-height: 1.4; }
.found-card .fc-bar { height: 1px; background: var(--feature-hair); margin: 14px 0 8px; position: relative; }
.found-card .fc-bar > span { position: absolute; left: 0; top: -1px; height: 2px; width: var(--p, 0%); background: var(--moss); transition: width 700ms cubic-bezier(.2,.7,.2,1); }
.found-card .fc-pct { font-family: "JetBrains Mono", monospace; font-size: 10px; color: var(--feature-fg-3); }

/* Subject index rows */
.tilde { display: flex; align-items: center; gap: 16px; padding: 0 0 32px; color: var(--ink-3); font-family: "JetBrains Mono", monospace; font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; }
.tilde::before, .tilde::after { content: ""; flex: 1; height: 1px; background: var(--hair); }
.subjects { border-top: 1px solid var(--hair); }
.subj-row { display: grid; grid-template-columns: 90px 1fr 240px 100px 60px; gap: 32px; align-items: center; padding: 28px 8px; border-bottom: 1px solid var(--hair); cursor: pointer; position: relative; transition: padding 320ms cubic-bezier(.2,.7,.2,1); }
.subj-row::before { content: ""; position: absolute; inset: 0; background: var(--paper); transform: scaleX(0); transform-origin: left; transition: transform 480ms cubic-bezier(.2,.7,.2,1); z-index: 0; border-radius: var(--r-md); }
.subj-row:hover::before { transform: scaleX(1); }
.subj-row > * { position: relative; z-index: 1; }
.subj-row:hover { padding-left: 28px; padding-right: 28px; }
.subj-row .idx { font-family: "JetBrains Mono", monospace; font-size: 12px; color: var(--ink-3); letter-spacing: 0.18em; }
.subj-row .name { font-family: "Space Grotesk", sans-serif; font-weight: 500; font-size: clamp(28px, 3.2vw, 48px); line-height: 1; letter-spacing: -0.025em; color: var(--ink); transition: color 280ms; }
.subj-row:hover .name { color: var(--moss-2); }
.subj-row .row-tag { color: var(--ink-3); font-size: 13px; line-height: 1.55; margin-top: 5px; }
.subj-row .pct { font-family: "Space Grotesk", sans-serif; font-weight: 500; font-size: 20px; letter-spacing: -0.02em; }
.subj-row .pct .suffix { font-size: 13px; color: var(--ink-3); }
.subj-row .pct small { display: block; margin-top: 4px; font-family: "JetBrains Mono", monospace; font-weight: 400; font-size: 10px; color: var(--ink-3); letter-spacing: 0.18em; }
.subj-row .arr { display: grid; place-items: center; width: 44px; height: 44px; border-radius: 50%; border: 1px solid var(--hair); color: var(--ink-2); transition: background 240ms, border-color 240ms, color 240ms, transform 280ms cubic-bezier(.2,.7,.2,1); font-size: 18px; }
.subj-row:hover .arr { background: var(--ink); border-color: var(--ink); color: var(--bone); transform: rotate(-45deg); }
.subj-row.done .pct { color: var(--moss); }

/* ── SECTOR page ── */
.sec-hero { padding: 16px 0 70px; }
.sec-hero .l-tag { display: flex; gap: 16px; align-items: center; margin-bottom: 26px; color: var(--ink-3); }
.sec-hero .l-tag .line { flex: 0 0 80px; height: 1px; background: var(--ink); }
.sec-hero h1 { font-family: "Space Grotesk", sans-serif; font-weight: 500; font-size: clamp(56px, 8vw, 140px); line-height: 0.88; margin: 0; letter-spacing: -0.04em; }
.sec-hero .sec-tag { font-size: 17px; color: var(--ink-3); max-width: 580px; margin: 26px 0 0; line-height: 1.6; }
.sec-meta { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr auto; gap: 32px; padding: 32px 0; margin-top: 44px; border-top: 1px solid var(--hair); border-bottom: 1px solid var(--hair); align-items: end; }
.sec-meta .stones { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
.sec-meta .stones .l, .sec-meta .m .l { font-family: "JetBrains Mono", monospace; font-size: 10.5px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--ink-3); }
.sec-meta .stones .l { margin-right: 14px; }
.sec-meta .m .l { margin-bottom: 8px; }
.sec-meta .m .v { font-family: "Space Grotesk", sans-serif; font-weight: 500; font-size: 32px; letter-spacing: -0.025em; line-height: 1; }
.sec-meta .m .v.moss { color: var(--moss); }
.sec-meta .m .v.small { font-size: 20px; }
.sec-meta .m .v .of { color: var(--ink-4); font-size: 20px; }

/* Foundation sector hero variant */
.sec-hero.foundation-hero h1 { color: var(--ink); }
.found-badge { display: inline-flex; align-items: center; gap: 8px; padding: 5px 14px; border-radius: 999px; background: var(--ink); color: var(--bone); font-family: "JetBrains Mono", monospace; font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; margin-bottom: 18px; }
.prereq-note { display: flex; align-items: flex-start; gap: 12px; padding: 16px 20px; background: rgba(111,130,103,0.08); border: 1px solid rgba(111,130,103,0.18); border-radius: var(--r-md); margin-top: 24px; font-size: 13px; color: var(--ink-3); }
.prereq-note strong { color: var(--moss); }

/* Mission rows */
.missions { margin-top: 8px; }
.m-row { display: grid; grid-template-columns: 80px 1fr 200px 90px 60px; gap: 28px; align-items: center; padding: 26px 8px; border-bottom: 1px solid var(--hair); cursor: pointer; position: relative; transition: padding 320ms cubic-bezier(.2,.7,.2,1); }
.m-row::before { content: ""; position: absolute; inset: 0; background: var(--paper); transform: scaleX(0); transform-origin: left; transition: transform 480ms cubic-bezier(.2,.7,.2,1); z-index: 0; border-radius: var(--r-md); }
.m-row:hover::before { transform: scaleX(1); }
.m-row > * { position: relative; z-index: 1; }
.m-row:hover:not(.locked) { padding-left: 28px; padding-right: 28px; }
.m-row .idx { font-family: "JetBrains Mono", monospace; font-size: 12px; color: var(--ink-3); letter-spacing: 0.18em; }
.m-row .body .title { font-family: "Space Grotesk", sans-serif; font-weight: 500; font-size: 24px; letter-spacing: -0.02em; line-height: 1.1; color: var(--ink); transition: color 280ms; }
.m-row:hover:not(.locked) .body .title { color: var(--moss-2); }
.m-row .body .sub { color: var(--ink-3); font-size: 13px; margin-top: 6px; line-height: 1.5; }
.m-row .body .tag-pill { display: inline-block; padding: 2px 10px; border-radius: 999px; background: var(--bone-2); color: var(--ink-2); font-family: "JetBrains Mono", monospace; font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; margin-bottom: 8px; }
.m-row.elite .body .tag-pill { background: rgba(199,90,63,0.10); color: var(--persimmon); }
.m-row .meta { font-family: "Space Grotesk", sans-serif; font-weight: 500; font-size: 16px; letter-spacing: -0.01em; text-align: right; color: var(--ink-2); }
.m-row .meta small { display: block; margin-top: 4px; font-family: "JetBrains Mono", monospace; font-weight: 400; font-size: 10.5px; color: var(--ink-3); letter-spacing: 0.18em; }
.m-row .state { font-family: "JetBrains Mono", monospace; font-size: 10.5px; letter-spacing: 0.18em; text-transform: uppercase; text-align: right; color: var(--ink-3); }
.m-row.done .state { color: var(--moss); }
.m-row .state-min { font-family: "Space Grotesk", sans-serif; font-weight: 500; font-size: 16px; color: var(--ink); margin-top: 4px; }
.m-row .arr { display: grid; place-items: center; width: 44px; height: 44px; border-radius: 50%; border: 1px solid var(--hair); color: var(--ink-2); transition: background 240ms, border-color 240ms, color 240ms, transform 280ms cubic-bezier(.2,.7,.2,1); font-size: 18px; justify-self: end; }
.m-row:hover:not(.locked) .arr { background: var(--ink); border-color: var(--ink); color: var(--bone); transform: rotate(-45deg); }
.m-row.done .arr { border-color: var(--moss); color: var(--moss); }
.m-row.locked { cursor: not-allowed; opacity: 0.45; }
.m-row.locked .arr { opacity: 0; }
.boss-row { display: grid; grid-template-columns: 80px 1fr 200px 100px 60px; gap: 28px; align-items: center; padding: 48px 8px; margin-top: 16px; border-top: 1px solid var(--feature-border); border-bottom: 1px solid var(--feature-border); background: var(--feature-bg); color: var(--feature-fg); cursor: pointer; transition: padding 320ms cubic-bezier(.2,.7,.2,1); position: relative; overflow: hidden; }
.boss-row::before { content: ""; position: absolute; right: -20%; top: -50%; width: 60%; height: 200%; background: radial-gradient(circle, rgba(199,90,63,0.40), transparent 65%); pointer-events: none; transition: transform 600ms cubic-bezier(.2,.7,.2,1); }
.boss-row > * { position: relative; z-index: 1; }
.boss-row:hover { padding-left: 28px; padding-right: 28px; }
.boss-row:hover::before { transform: scale(1.2); }
.boss-row .idx { font-family: "JetBrains Mono", monospace; font-size: 12px; color: var(--persimmon); letter-spacing: 0.2em; }
.boss-row .body .tag-pill {
  display: inline-block; width: fit-content; padding: 3px 12px; margin-bottom: 10px;
  border-radius: 999px; background: var(--feature-hair); color: var(--persimmon);
  border: 1px solid rgba(199,90,63,0.40); font-family: "JetBrains Mono", monospace;
  font-size: 10.75px; letter-spacing: 0.18em; line-height: 1.4; text-transform: uppercase;
}
.boss-row .body .title { font-family: "Space Grotesk", sans-serif; font-weight: 600; font-size: 32px; letter-spacing: -0.025em; line-height: 1.05; color: var(--feature-fg); }
.boss-row .body .sub { color: var(--feature-fg-3); }
.boss-row .meta { color: var(--feature-fg); }
.boss-row .meta small { color: var(--feature-fg-3); }
.boss-row .state { color: var(--persimmon); }
.boss-row .arr { background: transparent; border-color: var(--feature-hair); color: var(--feature-fg); }
.boss-row:hover .arr { background: var(--persimmon); border-color: var(--persimmon); transform: rotate(-45deg); }
.boss-row.locked { cursor: not-allowed; opacity: 0.55; }
.boss-row.locked:hover { padding-left: 8px; padding-right: 8px; }

/* ── LESSON page ── */
.miss-hero { padding: 20px 0 50px; }
.miss-hero .l-tag { display: flex; gap: 16px; align-items: center; color: var(--ink-3); margin-bottom: 24px; }
.miss-hero .l-tag .line { flex: 0 0 60px; height: 1px; background: var(--ink); }
.miss-hero h1 { font-family: "Space Grotesk", sans-serif; font-weight: 500; font-size: clamp(40px, 6vw, 82px); line-height: 0.96; margin: 0; letter-spacing: -0.035em; }
.miss-hero .lead { font-size: 17px; color: var(--ink-3); margin: 24px 0 0; max-width: 640px; line-height: 1.7; }
.miss-hero .lead em { font-style: normal; border-bottom: 1px solid var(--moss); color: var(--ink); }
.miss-grid { display: grid; grid-template-columns: 1.6fr 1fr; gap: 56px; margin-top: 28px; }

/* Lesson content */
.lesson-hook { font-size: 18px; line-height: 1.7; color: var(--ink-2); margin-bottom: 36px; padding-bottom: 36px; border-bottom: 1px solid var(--hair); }
.definition-box { background: var(--paper); border: 1px solid var(--hair); border-left: 3px solid var(--ink); border-radius: var(--r-md); padding: 20px 24px; margin-bottom: 36px; }
.definition-box .db-label { font-family: "JetBrains Mono", monospace; font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--ink-3); margin-bottom: 8px; }
.definition-box .db-content { font-family: "JetBrains Mono", monospace; font-size: 14px; color: var(--ink); line-height: 1.65; }
.insight-block { margin-bottom: 36px; padding-bottom: 36px; border-bottom: 1px solid var(--hair); }
.insight-block .ib-label { font-family: "Space Grotesk", sans-serif; font-weight: 500; font-size: 12px; text-transform: uppercase; letter-spacing: 0.22em; color: var(--moss); margin-bottom: 10px; }
.insight-block p { font-size: 15.5px; line-height: 1.72; color: var(--ink-2); margin: 0; }
.insight-block p em { font-style: normal; border-bottom: 1px solid var(--moss); color: var(--ink); }

/* Three-tier problem sections */
.tier-section { margin-bottom: 40px; }
.tier-header { display: flex; align-items: center; gap: 14px; margin-bottom: 18px; }
.tier-badge { display: inline-flex; align-items: center; gap: 7px; padding: 4px 12px; border-radius: 999px; font-family: "JetBrains Mono", monospace; font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; font-weight: 500; }
.tier-badge.t1 { background: rgba(111,130,103,0.12); color: var(--moss); border: 1px solid rgba(111,130,103,0.25); }
.tier-badge.t2 { background: rgba(183,148,78,0.12); color: var(--gold); border: 1px solid rgba(183,148,78,0.25); }
.tier-badge.t3 { background: rgba(199,90,63,0.10); color: var(--persimmon); border: 1px solid rgba(199,90,63,0.25); }
.tier-desc { font-family: "JetBrains Mono", monospace; font-size: 10.5px; color: var(--ink-4); letter-spacing: 0.12em; }

.problem-card { border: 1px solid var(--hair); border-radius: var(--r-md); margin-bottom: 12px; overflow: hidden; transition: border-color 240ms; }
.problem-card:hover { border-color: var(--hover-border); }
.problem-card .pc-q { padding: 18px 20px; font-size: 14.5px; line-height: 1.65; color: var(--ink-2); cursor: pointer; display: flex; justify-content: space-between; align-items: flex-start; gap: 16px; }
.problem-card .pc-q .q-text { flex: 1; }
.problem-card .pc-q .q-toggle { flex-shrink: 0; width: 28px; height: 28px; border-radius: 50%; border: 1px solid var(--hair); display: grid; place-items: center; font-size: 12px; color: var(--ink-3); transition: background 200ms, color 200ms, transform 200ms; margin-top: 1px; }
.problem-card.open .pc-q .q-toggle { background: var(--ink); color: var(--bone); transform: rotate(45deg); }
.problem-card .pc-answer { display: none; padding: 0 20px 18px; border-top: 1px solid var(--hair); margin-top: 0; }
.problem-card.open .pc-answer { display: block; }
.pc-answer .ans-label { font-family: "JetBrains Mono", monospace; font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--moss); margin: 14px 0 6px; }
.pc-answer .ans-value { font-family: "Space Grotesk", sans-serif; font-weight: 600; font-size: 18px; letter-spacing: -0.01em; margin-bottom: 10px; }
.pc-answer .ans-sol { font-size: 13.5px; line-height: 1.68; color: var(--ink-3); }
.pc-answer .ans-sol em { font-style: normal; color: var(--ink); }

/* Traps & Connections */
.traps-section { margin-bottom: 36px; padding-bottom: 36px; border-bottom: 1px solid var(--hair); }
.traps-section .ts-label { font-family: "Space Grotesk", sans-serif; font-weight: 500; font-size: 12px; text-transform: uppercase; letter-spacing: 0.22em; color: var(--persimmon); margin-bottom: 14px; }
.trap-item { display: flex; gap: 12px; padding: 11px 0; border-top: 1px solid var(--hair-2); font-size: 13.5px; color: var(--ink-3); line-height: 1.58; }
.trap-item::before { content: "⚠"; font-size: 11px; color: var(--persimmon); flex-shrink: 0; margin-top: 2px; }

.connections-section .cs-label { font-family: "Space Grotesk", sans-serif; font-weight: 500; font-size: 12px; text-transform: uppercase; letter-spacing: 0.22em; color: var(--gold); margin-bottom: 14px; }
.conn-chips { display: flex; flex-wrap: wrap; gap: 8px; }
.conn-chip { padding: 6px 14px; border-radius: 999px; border: 1px solid var(--hair); background: var(--paper); font-family: "JetBrains Mono", monospace; font-size: 10.5px; letter-spacing: 0.12em; color: var(--ink-3); cursor: pointer; transition: background 200ms, color 200ms, border-color 200ms; }
.conn-chip:hover { background: var(--ink); color: var(--bone); border-color: var(--ink); }

/* Side panel */
.miss-side { padding: 26px 28px; border-radius: var(--r-lg); background: var(--paper); border: 1px solid var(--hair); align-self: start; position: sticky; top: 110px; }
.miss-side .row { display: flex; justify-content: space-between; align-items: baseline; padding: 13px 0; border-top: 1px solid var(--hair); }
.miss-side .row:first-of-type { border-top: 0; padding-top: 0; }
.miss-side .row .l { font-family: "JetBrains Mono", monospace; font-size: 10.5px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--ink-3); }
.miss-side .row .v { font-family: "Space Grotesk", sans-serif; font-weight: 500; font-size: 17px; letter-spacing: -0.01em; }
.miss-side .row .v.moss { color: var(--moss); }
.miss-side .cta-stack { display: flex; flex-direction: column; gap: 10px; margin-top: 22px; }
.miss-side .cta-stack .btn { width: 100%; justify-content: center; }
.diff { display: inline-flex; gap: 5px; }
.diff i { width: 8px; height: 1px; background: var(--ink-4); }
.diff i.on { background: var(--moss); height: 2px; }

/* Progress mini-bar inside side panel */
.tier-progress { margin-top: 18px; padding-top: 16px; border-top: 1px solid var(--hair); }
.tier-progress .tp-label { font-family: "JetBrains Mono", monospace; font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--ink-3); margin-bottom: 10px; }
.tier-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
.tier-row .tr-badge { font-family: "JetBrains Mono", monospace; font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase; padding: 2px 8px; border-radius: 999px; }
.tier-row .tr-badge.t1 { background: rgba(111,130,103,0.12); color: var(--moss); }
.tier-row .tr-badge.t2 { background: rgba(183,148,78,0.12); color: var(--gold); }
.tier-row .tr-badge.t3 { background: rgba(199,90,63,0.10); color: var(--persimmon); }
.tier-row .tr-dots { display: flex; gap: 4px; }
.tier-row .tr-dot { width: 7px; height: 7px; border-radius: 50%; border: 1px solid var(--hair); background: transparent; cursor: pointer; transition: background 180ms; }
.tier-row .tr-dot.seen { background: var(--ink-4); border-color: var(--ink-4); }

/* ── PROFILE ── */
.profile-hero { padding: 8px 0 52px; }
.profile-hero .l-row { display: flex; gap: 28px; align-items: flex-end; }
.profile-hero .stone-av { width: 110px; height: 110px; border-radius: 50%; flex-shrink: 0; background: var(--ink); display: grid; place-items: center; position: relative; box-shadow: 0 20px 40px var(--profile-shadow); }
.profile-hero .stone-av::after { content: ""; position: absolute; inset: 0; border-radius: 50%; background: radial-gradient(circle at 35% 30%, var(--on-ink-hair), transparent 50%); }
.profile-hero .stone-av .letter { position: relative; z-index: 2; font-family: "Space Grotesk", sans-serif; font-weight: 500; font-size: 48px; color: var(--on-ink); letter-spacing: -0.02em; }
.profile-hero h1 { font-family: "Space Grotesk", sans-serif; font-weight: 500; font-size: clamp(48px, 5.5vw, 80px); margin: 8px 0 0; letter-spacing: -0.035em; line-height: 0.96; }
.profile-hero .tag { color: var(--ink-3); margin-top: 12px; font-size: 15px; }
.stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1px; margin: 48px 0; background: var(--hair); border-top: 1px solid var(--ink); border-bottom: 1px solid var(--ink); }
.stat-card { background: var(--bone); padding: 28px 26px; }
.stat-card .l { font-family: "JetBrains Mono", monospace; font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--ink-3); }
.stat-card .v { font-family: "Space Grotesk", sans-serif; font-weight: 500; font-size: 46px; margin-top: 16px; letter-spacing: -0.035em; line-height: 1; }
.stat-card .v.moss { color: var(--moss); }
.stat-card .v .small { font-size: 20px; color: var(--ink-4); }
.stat-card .d { color: var(--ink-3); font-size: 12px; margin-top: 12px; }
.mastery-section h3 { font-family: "Space Grotesk", sans-serif; font-weight: 500; font-size: 36px; letter-spacing: -0.03em; margin: 0 0 28px; }
.mastery-section h3 .moss { color: var(--moss); }
.mastery-row { display: grid; grid-template-columns: 60px 1fr 1.4fr 70px; gap: 24px; align-items: center; padding: 20px 0; border-top: 1px solid var(--hair); }
.mastery-row:last-child { border-bottom: 1px solid var(--hair); }
.mastery-row .idx { font-family: "JetBrains Mono", monospace; font-size: 11px; letter-spacing: 0.18em; color: var(--ink-3); }
.mastery-row .name { font-family: "Space Grotesk", sans-serif; font-weight: 500; font-size: 22px; letter-spacing: -0.02em; }
.mastery-row .bar { height: 1px; background: var(--hair); position: relative; }
.mastery-row .bar > div { position: absolute; left: 0; top: -1px; height: 3px; width: var(--p, 0%); background: var(--moss); transition: width 700ms cubic-bezier(.2,.7,.2,1); }
.mastery-row .pct { font-family: "Space Grotesk", sans-serif; font-weight: 500; font-size: 20px; text-align: right; letter-spacing: -0.02em; color: var(--ink-3); }
.mastery-row.full .pct { color: var(--moss); }

/* ── MASTERY REVIEW ── */
.test-page { padding: 60px 40px 120px; }
.test-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 40px; flex-wrap: wrap; gap: 16px; }
.test-header h2 { font-family: "Space Grotesk", sans-serif; font-weight: 500; font-size: 28px; letter-spacing: -0.025em; margin: 0; }
.test-header .tq-count { font-family: "JetBrains Mono", monospace; font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--ink-3); }
.test-progress { display: flex; gap: 6px; margin-bottom: 36px; flex-wrap: wrap; }
.test-dot { width: 9px; height: 9px; border-radius: 50%; border: 1px solid var(--hair); background: transparent; cursor: pointer; transition: background 180ms, border-color 180ms; flex-shrink: 0; }
.test-dot.active { border-color: var(--ink); background: var(--ink); }
.test-dot.answered { border-color: var(--ink-3); background: var(--ink-3); }
.test-dot.correct { border-color: var(--moss); background: var(--moss); }
.test-dot.wrong { border-color: var(--persimmon); background: var(--persimmon); }
.test-qcard { border: 1px solid var(--hair); border-radius: var(--r-lg); padding: 36px 40px; background: var(--paper); margin-bottom: 28px; }
.test-qmeta { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
.test-qnum { font-family: "JetBrains Mono", monospace; font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--ink-3); }
.test-type-badge { display: inline-flex; align-items: center; padding: 3px 10px; border-radius: 999px; font-family: "JetBrains Mono", monospace; font-size: 9.5px; letter-spacing: 0.18em; text-transform: uppercase; }
.test-type-badge.mcq { background: rgba(111,130,103,0.10); color: var(--moss); border: 1px solid rgba(111,130,103,0.2); }
.test-type-badge.msq { background: rgba(183,148,78,0.10); color: var(--gold); border: 1px solid rgba(183,148,78,0.2); }
.test-type-badge.nat { background: rgba(199,90,63,0.08); color: var(--persimmon); border: 1px solid rgba(199,90,63,0.2); }
.test-marking { font-family: "JetBrains Mono", monospace; font-size: 9.5px; color: var(--ink-4); letter-spacing: 0.12em; }
.test-qtext { font-family: "Manrope", sans-serif; font-size: 17px; line-height: 1.7; color: var(--ink); margin-bottom: 28px; }
.test-opts { display: flex; flex-direction: column; gap: 10px; }
.test-opt { display: flex; align-items: flex-start; gap: 16px; padding: 14px 18px; border-radius: var(--r-md); border: 1px solid var(--hair); background: var(--bone); cursor: pointer; transition: border-color 200ms, background 200ms; font-size: 14.5px; line-height: 1.55; color: var(--ink-2); }
.test-opt:hover { border-color: var(--hover-border); background: var(--paper); }
.test-opt.selected { border-color: var(--ink); background: var(--muted-fill); color: var(--ink); }
.test-opt.correct-reveal { border-color: var(--moss); background: rgba(111,130,103,0.08); color: var(--ink); }
.test-opt.wrong-reveal { border-color: var(--persimmon); background: rgba(199,90,63,0.06); color: var(--ink); }
.test-opt .opt-key { font-family: "Space Grotesk", sans-serif; font-weight: 600; font-size: 13px; min-width: 22px; color: var(--ink-3); flex-shrink: 0; padding-top: 1px; }
.test-opt.selected .opt-key { color: var(--ink); }
.test-nat-wrap { display: flex; flex-direction: column; gap: 10px; }
.test-nat-wrap label { font-family: "JetBrains Mono", monospace; font-size: 10.5px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--ink-3); }
.test-nat { width: 200px; padding: 12px 16px; border: 1px solid var(--hair); border-radius: var(--r-sm); background: var(--bone); font-family: "JetBrains Mono", monospace; font-size: 15px; color: var(--ink); outline: none; transition: border-color 200ms; }
.test-nat:focus { border-color: var(--ink); }
.test-nav { display: flex; align-items: center; justify-content: space-between; gap: 16px; flex-wrap: wrap; }
.test-nav .score-preview { font-family: "JetBrains Mono", monospace; font-size: 11px; letter-spacing: 0.15em; color: var(--ink-3); }
/* Results */
.test-results { padding: 40px 0; text-align: center; }
.test-score-ring { display: inline-flex; flex-direction: column; align-items: center; justify-content: center; width: 160px; height: 160px; border-radius: 50%; border: 2px solid var(--ink); margin-bottom: 28px; }
.test-score-ring .tscore { font-family: "Space Grotesk", sans-serif; font-weight: 500; font-size: 52px; letter-spacing: -0.04em; line-height: 1; }
.test-score-ring .tmax { font-family: "JetBrains Mono", monospace; font-size: 11px; color: var(--ink-3); letter-spacing: 0.15em; margin-top: 4px; }
.test-results h2 { font-family: "Space Grotesk", sans-serif; font-weight: 500; font-size: 32px; letter-spacing: -0.03em; margin: 0 0 8px; }
.test-results .res-sub { color: var(--ink-3); margin-bottom: 36px; }
.review-list { text-align: left; border-top: 1px solid var(--hair); margin-top: 40px; }
.review-item { padding: 24px 0; border-bottom: 1px solid var(--hair); }
.review-item .ri-meta { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.review-item .ri-qtext { font-size: 15px; line-height: 1.65; color: var(--ink); margin-bottom: 12px; }
.review-item .ri-verdict { font-family: "JetBrains Mono", monospace; font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; padding: 3px 10px; border-radius: 999px; }
.review-item .ri-verdict.correct { background: rgba(111,130,103,0.12); color: var(--moss); }
.review-item .ri-verdict.wrong { background: rgba(199,90,63,0.10); color: var(--persimmon); }
.review-item .ri-verdict.skip { background: var(--muted-fill); color: var(--ink-3); }
.review-item .ri-ans { font-size: 13px; color: var(--ink-3); line-height: 1.6; }
.review-item .ri-ans em { font-style: normal; color: var(--ink); }
.review-item .ri-expl { margin-top: 10px; font-size: 13px; line-height: 1.65; color: var(--ink-3); padding: 12px 16px; background: var(--paper); border-radius: var(--r-sm); border-left: 2px solid var(--moss); }
/* Mastery review banner */
.test-cta-banner { margin-top: 32px; padding: 28px 32px; border-radius: var(--r-lg); border: 1px solid var(--hair); background: var(--paper); display: flex; align-items: center; justify-content: space-between; gap: 24px; }
.test-cta-banner .tcb-left .tcb-label { font-family: "JetBrains Mono", monospace; font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--moss); margin-bottom: 6px; }
.test-cta-banner .tcb-left h4 { font-family: "Space Grotesk", sans-serif; font-weight: 500; font-size: 22px; letter-spacing: -0.02em; margin: 0 0 4px; }
.test-cta-banner .tcb-left p { font-size: 13px; color: var(--ink-3); margin: 0; }
.test-result-chip { display: inline-flex; align-items: center; gap: 8px; padding: 6px 14px; border-radius: 999px; font-family: "JetBrains Mono", monospace; font-size: 11px; letter-spacing: 0.15em; color: var(--moss); background: rgba(111,130,103,0.10); border: 1px solid rgba(111,130,103,0.22); margin-right: 10px; }

/* ── OVERLAYS ── */
.toast { position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%); display: flex; align-items: center; gap: 16px; padding: 16px 26px; border-radius: 999px; background: var(--ink); color: var(--on-ink); box-shadow: 0 24px 48px var(--toast-shadow); z-index: 60; animation: toastIn 320ms cubic-bezier(.2,.7,.2,1); }
.toast .em { font-family: "Space Grotesk", sans-serif; font-weight: 600; color: var(--moss); }
.toast .lbl { font-size: 13.5px; }
@keyframes toastIn { from { transform: translate(-50%, 24px); opacity: 0; } to { transform: translate(-50%, 0); opacity: 1; } }
.celebrate { position: fixed; inset: 0; z-index: 80; display: grid; place-items: center; padding: 24px; background: rgba(20,19,15,0.85); backdrop-filter: blur(8px); animation: cFade 280ms ease-out; }
.celebrate .panel { width: min(580px, 100%); padding: 60px 52px; text-align: center; border-radius: var(--r-lg); background: var(--bone); }
.celebrate .panel .em { font-family: "JetBrains Mono", monospace; font-size: 12px; letter-spacing: 0.3em; text-transform: uppercase; color: var(--persimmon); }
.celebrate .panel h1 { font-family: "Space Grotesk", sans-serif; font-weight: 500; font-size: 52px; margin: 16px 0 12px; letter-spacing: -0.035em; line-height: 0.96; }
.celebrate .panel p { color: var(--ink-3); margin: 0 0 28px; }
.celebrate .panel .ctas { display: flex; gap: 10px; justify-content: center; }
@keyframes cFade { from { opacity: 0; } to { opacity: 1; } }

/* ── UX scale pass ── */
body { font-size: 15.5px; line-height: 1.68; }
.nav { padding: 24px 52px; gap: 30px; }
.brand .mark { width: 36px; height: 36px; font-size: 15px; }
.brand .b1 { font-size: 18px; }
.brand .b2 { font-size: 10.5px; }
.nav-link { font-size: 14.5px; padding: 10px 18px; }
.chip { padding: 8px 16px; font-size: 13.5px; }
.theme-toggle { width: 104px; height: 38px; font-size: 10px; }
.theme-toggle .knob { width: 47px; height: 28px; }
.theme-toggle.dark .knob { transform: translateX(47px); }
.page, .test-page { padding: 92px 56px 136px; }
.wrap { max-width: 1360px; }
.crumbs { font-size: 11px; margin-bottom: 42px; }
.btn { min-height: 46px; padding: 14px 28px; font-size: 15px; }

.subj-row .idx { font-size: 12.5px; }

.sec-hero { padding: 22px 0 78px; }
.sec-hero h1 { font-size: clamp(72px, 8vw, 152px); }

.sec-meta { gap: 38px; padding: 38px 0; }
.sec-meta .m .v { font-size: 36px; }
.sec-meta .m .v.small { font-size: 23px; }
.missions { margin-top: 16px; }

.m-row.locked { opacity: 0.68; }
.m-row.locked .arr { opacity: 0.35; }
.boss-row {
  grid-template-columns: 96px minmax(0, 1fr) 220px 112px 64px;
  gap: 34px; padding: 42px 32px; margin: 28px 0 8px;
  border: 1px solid var(--feature-border); border-radius: var(--r-lg);
  box-shadow: 0 22px 60px rgba(0,0,0,0.10);
  isolation: isolate;
}
.boss-row::before {
  inset: 0; width: auto; height: auto; right: 0; top: 0;
  background:
    linear-gradient(90deg, transparent 0%, rgba(199,90,63,0.08) 100%),
    radial-gradient(circle at 84% 50%, rgba(199,90,63,0.34), transparent 42%);

}

.boss-row .body .sub { font-size: 14.5px; }

}

  def:"Kolmogorov axioms: (1) P(A)≥0, (2) P(Ω)=1, (3) P(A∪B)=P(A)+P(B) for disjoint A,B. Inclusion-exclusion: P(A∪B)=P(A)+P(B)−P(A∩B). Complement: P(Aᶜ)=1−P(A).",
  insight:"Every probability question reduces to counting when outcomes are uniform: P(A)=|A|/|Ω|. The binomial coefficient C(n,k)=n!/k!(n−k)! counts unordered selections; P(n,k)=n!/(n−k)! counts ordered ones. These two formulas differ by exactly k!, and choosing the wrong one breaks the solution.",
  t1:[
    {q:"How many ways can a 3-person committee be chosen from 8 candidates?",a:"56",sol:"C(8,3) = 8!/(3!·5!) = (8·7·6)/(3·2·1) = 56. Unordered selection without replacement."},
